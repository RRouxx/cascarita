  <style>
    .sub { text-align:center; color:var(--texto-tenue); margin:-14px 0 14px; font-size:.9rem; }
    .chips { display:flex; justify-content:center; gap:10px; flex-wrap:wrap; margin-bottom:14px; }
    .chip { background:var(--card); border:1px solid var(--borde); border-radius:12px; padding:8px 14px; text-align:center; min-width:82px; }
    .chip .v { font-size:1.35rem; font-weight:800; line-height:1.1; }
    .chip .e { font-size:.66rem; color:var(--texto-tenue); text-transform:uppercase; letter-spacing:.04em; }
    .chip.verde .v { color:var(--verde); }
    .chip.amarillo .v { color:var(--amarillo); }
    #marco {
      position:relative; max-width:400px; margin:0 auto;
      border-radius:var(--radio); overflow:hidden; border:1px solid var(--borde);
      box-shadow:var(--sombra); touch-action:none; user-select:none; -webkit-user-select:none;
    }
    #lienzo { display:block; width:100%; height:auto; background:#17693a; }
    .pantalla {
      position:absolute; inset:0; z-index:5; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:10px; text-align:center;
      background:rgba(8,12,10,.74); backdrop-filter:blur(2px); color:#fff; padding:20px;
    }
    .pantalla h2 { margin:0; font-size:1.5rem; letter-spacing:-.02em; }
    .pantalla p { margin:0; color:#cfd8d3; font-size:.9rem; line-height:1.5; }
    .pantalla .grande { font-size:2.6rem; font-weight:800; line-height:1.1; }
    .pantalla .etiq { font-size:.72rem; text-transform:uppercase; letter-spacing:.04em; color:#9fb0a7; }
    .pantalla .emojis { font-size:1.5rem; letter-spacing:2px; }
    .pantalla .acciones { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-top:8px; }
    .reglas { display:flex; gap:12px; justify-content:center; font-size:.82rem; color:#cfd8d3; flex-wrap:wrap; }
    .reglas span { background:rgba(255,255,255,.12); border-radius:8px; padding:6px 10px; }
    .pasos {
      text-align:left; font-size:.85rem; color:#e6ede9; line-height:1.4;
      display:flex; flex-direction:column; gap:7px; max-width:300px; margin:2px auto;
      background:rgba(255,255,255,.08); border-radius:12px; padding:12px 14px;
    }
    .pasos b { color:#ffd76a; }
    .oficial-tag { background:var(--verde); color:#04150b; font-weight:800; font-size:.72rem; padding:3px 10px; border-radius:99px; text-transform:uppercase; letter-spacing:.04em; }
    .libre-tag { background:rgba(255,255,255,.16); color:#fff; font-weight:800; font-size:.72rem; padding:3px 10px; border-radius:99px; text-transform:uppercase; letter-spacing:.04em; }

</head>
<body>

  <header class="barra">
    <a class="logo" href="../"><span class="pelota">⚽</span> Cascarita</a>
    <span class="creced">Penales</span>
  </header>

  <main class="contenedor">
    <div class="encabezado"><h1>🥅 Penales del día</h1></div>
    <div class="sub">Tanda de 5: toca para parar la barra donde quieres tirar. El portero del día es el mismo para todos. ¿Metes 5/5?</div>

    <div class="chips">
      <div class="chip verde"><div class="v" id="chipGoles">0</div><div class="e">⚽ Goles</div></div>
      <div class="chip"><div class="v" id="chipPenal">1/5</div><div class="e">Penal</div></div>
      <div class="chip amarillo"><div class="v" id="chipMejor">0</div><div class="e">Mejor</div></div>
    </div>

    <div id="marco">
      <canvas id="lienzo" width="360" height="480"></canvas>
    </div>

    <div class="anuncio">Espacio para anuncio</div>
  </main>

  <footer class="pie">
    <a href="../">← Volver a Cascarita</a> · 🥅 la tanda es la misma para todos hoy
  </footer>

  <script src="../assets/hub.js"></script>
  <script>
  (function () {
    const $ = id => document.getElementById(id);

    /* ================== Constantes ================== */

    const W = 360, H = 480;
    const TIROS = 5;
    const ARCO = { x1: 48, x2: 312, techo: 92, piso: 218 };   // marco de la portería
    const BALON0 = { x: 180, y: 398 };
    const BARRA = { x: 56, w: 248, y: 442, h: 16 };
    const POSTE = 0.96;      // |aim| mayor = poste/fuera
    const ALCANCE = 0.28;    // radio que cubre el portero al lanzarse
    const VUELO = 0.5;       // segundos de vuelo del balón

    const nDia = Cascarita.numeroDia();
    const claveHoy = "penales:" + Cascarita.fechaHoy();

    let hoy = Cascarita.cargar(claveHoy, { hecho: false, goles: 0, marca: "" });
    function statsDefault() { return { dias: 0, mejor: 0, perfectos: 0, racha: 0, maxRacha: 0, ultimoDia: null }; }

    const juego = {
      fase: "inicio",     // inicio | apuntando | volando | resultado | fin
      oficial: !hoy.hecho,
      idx: 0, resultados: [],
      plan: [],           // por penal: { dive, speed }
      aim: 0, dir: 1, aimX: 0,
      t: 0, sacudida: 0
    };

    /* ================== Canvas ================== */

    const cv = $("lienzo");
    const ctx = cv.getContext("2d");
    const dpr = Math.min(2, window.devicePixelRatio || 1);
    cv.width = W * dpr; cv.height = H * dpr;
    ctx.scale(dpr, dpr);

    /* ================== Plan del día ================== */

    // El portero del día: a dónde se lanza en cada penal y qué tan rápida es tu barra.
    function armarPlan(rng) {
      const lados = [-0.65, 0, 0.65];
      return Array.from({ length: TIROS }, (_, i) => ({
        dive: lados[Math.floor(rng() * 3)],
        speed: 1.5 + i * 0.34 + rng() * 0.25
      }));
    }

    /* ================== Dibujo ================== */

    // escala tal que un tiro "pasado" (|aim| > POSTE) se estrella EN el poste, no adentro
    function xGol(aim) { return 180 + aim * 137; }

    function dibujaFondo() {
      ctx.fillStyle = "#17693a"; ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = "#145e34";
      for (let y = 0; y < H; y += 72) ctx.fillRect(0, y, W, 36);
      const sx = juego.sacudida > 0 ? Math.sin(juego.t * 60) * juego.sacudida * 4 : 0;
      // red
      ctx.strokeStyle = "rgba(255,255,255,.18)"; ctx.lineWidth = 1;
      for (let x = ARCO.x1; x <= ARCO.x2; x += 20) {
        ctx.beginPath(); ctx.moveTo(x + sx, ARCO.techo); ctx.lineTo(x + sx, ARCO.piso); ctx.stroke();
      }
      for (let y = ARCO.techo; y <= ARCO.piso; y += 20) {
        ctx.beginPath(); ctx.moveTo(ARCO.x1 + sx, y); ctx.lineTo(ARCO.x2 + sx, y); ctx.stroke();
      }
      // postes y travesaño
      ctx.fillStyle = "#f2f5f7";
      ctx.fillRect(ARCO.x1 - 8, ARCO.techo - 8, 8, ARCO.piso - ARCO.techo + 12);
      ctx.fillRect(ARCO.x2, ARCO.techo - 8, 8, ARCO.piso - ARCO.techo + 12);
      ctx.fillRect(ARCO.x1 - 8, ARCO.techo - 8, ARCO.x2 - ARCO.x1 + 16, 8);
      // área y punto penal
      ctx.strokeStyle = "rgba(255,255,255,.4)"; ctx.lineWidth = 2;
      ctx.strokeRect(ARCO.x1 - 30, ARCO.piso + 4, ARCO.x2 - ARCO.x1 + 60, 60);
      ctx.fillStyle = "rgba(255,255,255,.5)";
      ctx.beginPath(); ctx.arc(BALON0.x, BALON0.y, 3, 0, Math.PI * 2); ctx.fill();
    }

    // portero bloque (jersey amarillo); se lanza durante el vuelo y SE QUEDA
    // en su pose final durante el resultado (el reloj se reinicia ahí y sin
    // esto la animación del lance volvía a empezar)
    function dibujaPortero() {
      const p = juego.fase === "volando" ? Math.min(1, juego.t / (VUELO * 0.85))
              : juego.fase === "resultado" ? 1 : 0;
      const dive = juego.plan[juego.idx] ? juego.plan[juego.idx].dive : 0;
      const x = 180 + (juego.fase === "apuntando" ? Math.sin(juego.t * 3) * 6 : dive !== 0 ? dive * 150 * p : 0);
      const y = ARCO.piso - 44 + (dive !== 0 ? Math.sin(p * Math.PI) * -14 : 0);
      const rot = dive !== 0 ? dive * p * 1.1 : 0;
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(rot);
      ctx.fillStyle = "rgba(0,0,0,.25)";
      ctx.beginPath(); ctx.ellipse(0, 46, 20, 6, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#e3b183"; ctx.fillRect(-7, -34, 14, 12);            // cabeza
      ctx.fillStyle = "#17110c"; ctx.fillRect(-7, -36, 14, 5);
      ctx.fillStyle = "#f5c518"; ctx.fillRect(-12, -22, 24, 26);           // jersey
      ctx.fillStyle = "#111"; ctx.fillRect(-12, 4, 24, 9);                 // short
      ctx.fillStyle = "#e3b183"; ctx.fillRect(-10, 13, 7, 16); ctx.fillRect(3, 13, 7, 16);
      // brazos abiertos (guantes)
      ctx.fillStyle = "#f5c518";
      ctx.fillRect(-26, -20, 14, 7); ctx.fillRect(12, -20, 14, 7);
      ctx.fillStyle = "#fff"; ctx.fillRect(-30, -21, 6, 9); ctx.fillRect(24, -21, 6, 9);
      ctx.restore();
    }

    function dibujaBalon() {
      let bx = BALON0.x, by = BALON0.y, esc = 1;
      if (juego.fase === "volando" || juego.fase === "resultado") {
        // en "resultado" el reloj se reinicia: congela el balón en su destino
        // (si no, vuelve a volar desde el punto penal en cada resultado)
        const p = juego.fase === "resultado" ? 1 : Math.min(1, juego.t / VUELO);
        const gx = xGol(juego.aimX), gy = ARCO.piso - 52;
        bx = BALON0.x + (gx - BALON0.x) * p;
        by = BALON0.y + (gy - BALON0.y) * p - Math.sin(p * Math.PI) * 46;
        esc = 1 - p * 0.45;
      }
      ctx.font = (26 * esc) + "px serif"; ctx.textAlign = "center";
      ctx.fillText("⚽", bx, by + 9 * esc);
    }

    // barra de puntería con marcador que va y viene
    function dibujaBarra() {
      if (juego.fase !== "apuntando") return;
      const b = BARRA;
      const grad = ctx.createLinearGradient(b.x, 0, b.x + b.w, 0);
      grad.addColorStop(0, "#e23b3b"); grad.addColorStop(0.18, "#f5c518"); grad.addColorStop(0.38, "#17c964");
      grad.addColorStop(0.5, "#0e8a44"); grad.addColorStop(0.62, "#17c964"); grad.addColorStop(0.82, "#f5c518"); grad.addColorStop(1, "#e23b3b");
      ctx.fillStyle = "rgba(0,0,0,.4)"; ctx.fillRect(b.x - 4, b.y - 4, b.w + 8, b.h + 8);
      ctx.fillStyle = grad; ctx.fillRect(b.x, b.y, b.w, b.h);
      const mx = b.x + (juego.aim + 1) / 2 * b.w;
      ctx.fillStyle = "#fff";
      ctx.fillRect(mx - 2.5, b.y - 7, 5, b.h + 14);
      ctx.beginPath(); ctx.moveTo(mx, b.y - 12); ctx.lineTo(mx - 6, b.y - 20); ctx.lineTo(mx + 6, b.y - 20); ctx.closePath(); ctx.fill();
      ctx.fillStyle = "rgba(255,255,255,.85)";
      ctx.font = "bold 11px system-ui, sans-serif";
      ctx.fillText("TOCA PARA TIRAR", 180, b.y + b.h + 18);
    }

    // marcador de la tanda arriba
    function dibujaTanda() {
      ctx.font = "17px serif"; ctx.textAlign = "center";
      for (let i = 0; i < TIROS; i++) {
        const r = juego.resultados[i];
        const sim = r === "gol" ? "⚽" : r === "atajado" ? "🧤" : r === "fuera" ? "❌" : "▫️";
        ctx.fillText(sim, 110 + i * 35, 42);
      }
    }

    function dibujaAviso() {
      if (juego.fase !== "resultado") return;
      const r = juego.resultados[juego.idx];
      const txt = r === "gol" ? "¡GOOOL! 🎉" : r === "atajado" ? "¡ATAJADO! 🧤" : "¡POSTE! 😖";
      ctx.fillStyle = r === "gol" ? "#7dffb0" : "#ffb0b0";
      ctx.font = "bold 26px system-ui, sans-serif"; ctx.textAlign = "center";
      ctx.fillText(txt, 180, 300);
    }

    function dibuja() {
      dibujaFondo();
      dibujaPortero();
      dibujaBalon();
      dibujaBarra();
      dibujaTanda();
      dibujaAviso();
    }

    /* ================== Lógica ================== */

    function paso(dt) {
      juego.t += dt;
      if (juego.sacudida > 0) juego.sacudida = Math.max(0, juego.sacudida - dt * 2);
      if (juego.fase === "apuntando") {
        const v = juego.plan[juego.idx].speed * 2;   // recorridos por segundo
        juego.aim += juego.dir * v * dt;
        if (juego.aim > 1) { juego.aim = 1; juego.dir = -1; }
        if (juego.aim < -1) { juego.aim = -1; juego.dir = 1; }
      } else if (juego.fase === "volando") {
        if (juego.t >= VUELO) resolver();
      } else if (juego.fase === "resultado") {
        if (juego.t >= 1.0) siguiente();
      }
    }

    function tirar() {
      if (juego.fase !== "apuntando") return;
      juego.aimX = juego.aim;
      juego.fase = "volando";
      juego.t = 0;
    }

    function resolver() {
      const d = juego.plan[juego.idx].dive;
      let r;
      if (Math.abs(juego.aimX) > POSTE) r = "fuera";
      else if (Math.abs(juego.aimX - d) < ALCANCE) r = "atajado";
      else { r = "gol"; juego.sacudida = 1; }
      juego.resultados[juego.idx] = r;
      juego.fase = "resultado";
      juego.t = 0;
      pintarChips();
    }

    function siguiente() {
      if (juego.idx >= TIROS - 1) { terminar(); return; }
      juego.idx++;
      juego.fase = "apuntando";
      juego.aim = 0; juego.dir = 1; juego.t = 0;
      pintarChips();
    }

    const goles = () => juego.resultados.filter(r => r === "gol").length;

    function pintarChips() {
      $("chipGoles").textContent = goles();
      $("chipPenal").textContent = Math.min(TIROS, juego.idx + 1) + "/" + TIROS;
      $("chipMejor").textContent = Cascarita.cargar("penales:stats", statsDefault()).mejor;
    }

    /* ================== Ciclo ================== */

    let ultimo = 0, rafId = null;
    function ciclo(ts) {
      if (juego.fase === "inicio" || juego.fase === "fin") return;
      const dt = Math.min(0.05, (ts - ultimo) / 1000 || 0.016);
      ultimo = ts;
      paso(dt);
      if (juego.fase !== "fin") { dibuja(); rafId = requestAnimationFrame(ciclo); }
    }

    /* ================== Fases ================== */

    function empezar() {
      juego.oficial = !hoy.hecho;
      const rng = juego.oficial ? Cascarita.rngDelDia("penales") : Math.random;
      juego.plan = armarPlan(rng);
      juego.idx = 0; juego.resultados = [];
      juego.fase = "apuntando";
      juego.aim = 0; juego.dir = 1; juego.t = 0; juego.sacudida = 0;
      quitarPantalla();
      pintarChips();
      ultimo = performance.now();
      rafId = requestAnimationFrame(ciclo);
    }

    function terminar() {
      juego.fase = "fin";
      if (rafId) cancelAnimationFrame(rafId);
      const g = goles();
      const marca = juego.resultados.map(r => r === "gol" ? "🟩" : "⬛").join("");
      const s = Cascarita.cargar("penales:stats", statsDefault());
      if (g > s.mejor) s.mejor = g;
      if (juego.oficial) {
        hoy = { hecho: true, goles: g, marca };
        Cascarita.guardar(claveHoy, hoy);
        s.dias++;
        if (g === TIROS) s.perfectos++;
        s.racha = (s.ultimoDia === nDia - 1) ? s.racha + 1 : 1;
        if (s.racha > s.maxRacha) s.maxRacha = s.racha;
        s.ultimoDia = nDia;
        Cascarita.guardar("penales:stats", s);
        Cascarita.guardarResultado("penales", { fecha: Cascarita.fechaHoy(), dia: nDia, puntaje: g, gano: g >= 4 });
      } else {
        Cascarita.guardar("penales:stats", s);
      }
      pintarChips();
      pantallaFin(g, marca);
    }

    /* ================== Pantallas ================== */

    function quitarPantalla() { const p = document.querySelector(".pantalla"); if (p) p.remove(); }

    function pantallaInicio() {
      quitarPantalla();
      const p = document.createElement("div");
      p.className = "pantalla"; p.id = "pantallaInicio";
      const oficial = !hoy.hecho;
      p.innerHTML = `
        <span class="${oficial ? "oficial-tag" : "libre-tag"}">${oficial ? "Tanda oficial del día #" + nDia : "Tanda libre"}</span>
        <h2>🥅 Penales del día</h2>
        <p>${oficial ? "El portero del día es el mismo para todos." : "Hoy oficial: " + hoy.goles + "/5 " + hoy.marca}</p>
        <div class="pasos">
          <div>1️⃣ La <b>barra va y viene</b> bajo el balón: <b>toca</b> para fijar a dónde tiras.</div>
          <div>2️⃣ Orillas de la barra = <b>esquinas</b> (más gol)… pero si la paras <b>hasta el fondo</b>, la estrellas en el poste ❌.</div>
          <div>3️⃣ El portero <b>ya decidió</b> a dónde volar: si tiras a sus manos, te ataja 🧤.</div>
          <div>4️⃣ La barra <b>se acelera</b> penal a penal 🔥</div>
        </div>
        <button class="boton boton-primario" id="btnJugar">⚽ Al manchón</button>`;
      $("marco").appendChild(p);
      $("btnJugar").addEventListener("click", empezar);
    }

    function pantallaFin(g, marca) {
      quitarPantalla();
      const frase = g === 5 ? "¡TANDA PERFECTA! 🐐" : g === 4 ? "¡Frialdad de crack! 🥶" : g === 3 ? "¡Se sufre pero se gana! 💪" : g >= 1 ? "El portero te leyó... 🧤" : "Tanda para el olvido 😅";
      const p = document.createElement("div");
      p.className = "pantalla"; p.id = "pantallaFin";
      p.innerHTML = `
        <span class="${juego.oficial ? "oficial-tag" : "libre-tag"}">${juego.oficial ? "Oficial del día" : "Tanda libre"}</span>
        <h2>${frase}</h2>
        <div class="grande">${g}/5</div>
        <div class="emojis">${marca}</div>
        <div class="acciones">
          <button class="boton boton-primario" id="btnCompartir">📤 Compartir</button>
          <button class="boton" id="btnOtra">🔁 Otra tanda</button>
        </div>`;
      $("marco").appendChild(p);
      $("btnCompartir").addEventListener("click", () => {
        const t = `Cascarita 🥅 Penales #${nDia}  ${g}/5\n${marca}\n¿Aguantas la presión?`;
        Cascarita.compartir(t, location.origin + location.pathname);
      });
      $("btnOtra").addEventListener("click", empezar);
    }

    /* ================== Controles ================== */

    $("marco").addEventListener("pointerdown", e => {
      if (e.target.closest(".pantalla")) return;
      tirar();
    });
    document.addEventListener("keydown", e => {
      if (e.key === " " || e.key === "Enter") {
        if (document.querySelector(".pantalla")) return;
        tirar(); e.preventDefault();
      }
    });
    document.addEventListener("visibilitychange", () => {
      if (!document.hidden && juego.fase !== "inicio" && juego.fase !== "fin") {
        ultimo = performance.now(); rafId = requestAnimationFrame(ciclo);
      } else if (document.hidden && rafId) cancelAnimationFrame(rafId);
    });

    /* ================== Arranque ================== */

    pintarChips();
    dibuja();
    pantallaInicio();

    // gancho mínimo para pruebas automatizadas
    window.__pen = { juego, tirar, resolver, empezar };
  })();
  </script>
</body>
</html>
