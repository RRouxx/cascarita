    .chip { background:var(--card); border:1px solid var(--borde); border-radius:12px; padding:8px 14px; text-align:center; min-width:78px; }
    .chip .v { font-size:1.35rem; font-weight:800; line-height:1.1; }
    .chip .e { font-size:.66rem; color:var(--texto-tenue); text-transform:uppercase; letter-spacing:.04em; }

    .chip.amarillo .v { color:var(--amarillo); }

    #marco {
      position:relative; max-width:400px; margin:0 auto;

<body>

  <header class="barra">
    <a class="logo" href="../"><span class="pelota">⚽</span> Cascarita</a>
    <span class="creced">Tiro al Ángulo</span>
  </header>

  <main class="contenedor">
    <div class="encabezado"><h1>🎯 Tiro al Ángulo</h1></div>
    <div class="sub">45 segundos de puntería en la portería. Dale a las dianas y a los balones voladores... pero NO al árbitro.</div>

    <div class="chips">
      <div class="chip verde"><div class="v" id="chipPuntos">0</div><div class="e">Puntos</div></div>
      <div class="chip amarillo"><div class="v" id="chipTiempo">45</div><div class="e">⏱️ Seg</div></div>
      <div class="chip"><div class="v" id="chipBalas">6</div><div class="e">⚽ Balas</div></div>
      <div class="chip"><div class="v" id="chipRecord">0</div><div class="e">Récord</div></div>
    </div>

    <div id="marco">
      <canvas id="lienzo" width="360" height="520"></canvas>
      <div class="credito">Para Don Rogelio 🎯</div>
    </div>

    <div class="anuncio">Espacio para anuncio</div>
  </main>

  <footer class="pie">
    <a href="../">← Volver a Cascarita</a> · 🎯 Tiro al Ángulo, para Don Rogelio
  </footer>

  <script src="../assets/hub.js"></script>
  <script>
  (function () {
    const $ = id => document.getElementById(id);

    /* ================== Constantes ================== */

    const W = 360, H = 520;
    const DUR = 45;             // segundos por ronda
    const BALAS_MAX = 6;
    const RECARGA_SEG = 1.1;
    // zona de la portería donde aparecen los blancos
    const ZONA = { x1: 52, y1: 120, x2: 308, y2: 380 };

    const nDia = Cascarita.numeroDia();
    const claveHoy = "tiro:" + Cascarita.fechaHoy();

    let hoy = Cascarita.cargar(claveHoy, { hecho: false, puntos: 0 });
    function statsDefault() { return { record: 0, dias: 0, mejorPrecision: 0 }; }

    const juego = {
      fase: "inicio",           // inicio | jugando | fin
      oficial: !hoy.hecho,
      rng: null,
      t: 0, proxSpawn: 0.6,
      puntos: 0, disparos: 0, aciertos: 0,
      combo: 0, mejorCombo: 0,
      balas: BALAS_MAX, recargando: 0,
      blancos: [], efectos: [],
      mira: { x: W / 2, y: H / 2, activa: false }
    };

    /* ================== Canvas ================== */

    const cv = $("lienzo");
    const ctx = cv.getContext("2d");
    const dpr = Math.min(2, window.devicePixelRatio || 1);
    cv.width = W * dpr; cv.height = H * dpr;
    ctx.scale(dpr, dpr);

    /* ================== Blancos ================== */

    // tipos: diana (quieta), volador (balón que cruza), arbitro (¡NO dispararle!)
    function spawn() {
      const r = juego.rng;
      const tr = r();
      if (tr < 0.58) {
        juego.blancos.push({
          tipo: "diana", r: 26 + r() * 12,
          x: ZONA.x1 + 30 + r() * (ZONA.x2 - ZONA.x1 - 60),
          y: ZONA.y1 + 20 + r() * (ZONA.y2 - ZONA.y1 - 40),
          vida: 1.5 + r() * 1.1, edad: 0
        });
      } else if (tr < 0.83) {
        const izq = r() < 0.5;
        juego.blancos.push({
          tipo: "volador", r: 17,
          x: izq ? ZONA.x1 - 20 : ZONA.x2 + 20,
          y: ZONA.y1 + 20 + r() * (ZONA.y2 - ZONA.y1 - 60),
          vx: (izq ? 1 : -1) * (120 + r() * 80),
          vida: 9, edad: 0
        });
      } else {
        juego.blancos.push({
          tipo: "arbitro", r: 26,
          x: ZONA.x1 + 35 + r() * (ZONA.x2 - ZONA.x1 - 70),
          y: ZONA.y2 - 40 - r() * 90,
          vida: 1.5 + r() * 0.6, edad: 0
        });
      }
      // se acelera conforme corre el reloj
      juego.proxSpawn = juego.t + Math.max(0.34, 0.85 - juego.t * 0.01) + r() * 0.35;
    }

    /* ================== Dibujo ================== */

    function dibujaFondo() {
      // pasto
      ctx.fillStyle = "#17693a"; ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = "#145e34";
      for (let y = 0; y < H; y += 80) ctx.fillRect(0, y, W, 40);
      // portería: postes y travesaño
      ctx.fillStyle = "#f2f5f7";
      ctx.fillRect(ZONA.x1 - 26, ZONA.y1 - 26, 10, ZONA.y2 - ZONA.y1 + 66);
      ctx.fillRect(ZONA.x2 + 16, ZONA.y1 - 26, 10, ZONA.y2 - ZONA.y1 + 66);
      ctx.fillRect(ZONA.x1 - 26, ZONA.y1 - 30, ZONA.x2 - ZONA.x1 + 52, 10);
      // red
      ctx.strokeStyle = "rgba(255,255,255,.16)"; ctx.lineWidth = 1;
      for (let x = ZONA.x1 - 16; x <= ZONA.x2 + 16; x += 22) {
        ctx.beginPath(); ctx.moveTo(x, ZONA.y1 - 20); ctx.lineTo(x, ZONA.y2 + 40); ctx.stroke();
      }
      for (let y = ZONA.y1 - 20; y <= ZONA.y2 + 40; y += 22) {
        ctx.beginPath(); ctx.moveTo(ZONA.x1 - 16, y); ctx.lineTo(ZONA.x2 + 16, y); ctx.stroke();
      }
      // línea de meta
      ctx.fillStyle = "rgba(255,255,255,.5)";
      ctx.fillRect(0, ZONA.y2 + 46, W, 3);
    }

    function dibujaBlanco(b) {
      const puff = Math.min(1, b.edad * 5);          // aparece creciendo
      const fade = Math.min(1, (b.vida - b.edad) * 3); // se desvanece al final
      const esc = puff * (b.tipo === "volador" ? 1 : fade > 0 ? 1 : 0);
      if (esc <= 0) return;
      ctx.save();
      ctx.globalAlpha = b.tipo === "volador" ? 1 : Math.max(0.15, fade);
      if (b.tipo === "diana") {
        const anillos = [[1, "#e23b3b"], [0.7, "#ffffff"], [0.35, "#e23b3b"]];
        anillos.forEach(a => {
          ctx.fillStyle = a[1];
          ctx.beginPath(); ctx.arc(b.x, b.y, b.r * a[0] * esc, 0, Math.PI * 2); ctx.fill();
        });
        ctx.fillStyle = "#2a2107";
        ctx.beginPath(); ctx.arc(b.x, b.y, 2.5, 0, Math.PI * 2); ctx.fill();
      } else if (b.tipo === "volador") {
        ctx.font = (30 * esc) + "px serif"; ctx.textAlign = "center";
        ctx.fillText("⚽", b.x, b.y + 10);
        ctx.fillStyle = "rgba(245,197,24,.85)";
        ctx.beginPath(); ctx.arc(b.x, b.y - 14 * esc, 3, 0, Math.PI * 2); ctx.fill();
      } else { // árbitro (bloquecito de negro con tarjeta amarilla)
        const s = esc;
        ctx.translate(b.x, b.y);
        ctx.scale(s, s);
        ctx.fillStyle = "#e3b183"; ctx.fillRect(-8, -30, 16, 14);
        ctx.fillStyle = "#111111"; ctx.fillRect(-8, -32, 16, 5);
        ctx.fillStyle = "#1a1a1a"; ctx.fillRect(-13, -15, 26, 22);
        ctx.fillStyle = "#e3b183"; ctx.fillRect(-9, 7, 7, 12); ctx.fillRect(2, 7, 7, 12);
        ctx.fillStyle = "#f5c518"; ctx.fillRect(12, -22, 9, 13);   // tarjeta
        ctx.fillStyle = "#e3b183"; ctx.fillRect(10, -10, 6, 6);
      }
      ctx.restore();
    }

    function dibujaEfectos(dt) {
      juego.efectos = juego.efectos.filter(e => (e.edad += dt) < e.dur);
      juego.efectos.forEach(e => {
        const p = e.edad / e.dur;
        ctx.save();
        ctx.globalAlpha = 1 - p;
        if (e.tipo === "anillo") {
          ctx.strokeStyle = e.color; ctx.lineWidth = 3;
          ctx.beginPath(); ctx.arc(e.x, e.y, 6 + p * 26, 0, Math.PI * 2); ctx.stroke();
        } else {
          ctx.fillStyle = e.color;
          ctx.font = "bold " + e.tam + "px system-ui, sans-serif"; ctx.textAlign = "center";
          ctx.fillText(e.texto, e.x, e.y - p * 28);
        }
        ctx.restore();
      });
    }

    function dibujaMira() {
      if (!juego.mira.activa || juego.fase !== "jugando") return;
      const m = juego.mira;
      ctx.strokeStyle = "rgba(255,255,255,.85)"; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.arc(m.x, m.y, 13, 0, Math.PI * 2); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(m.x - 19, m.y); ctx.lineTo(m.x - 7, m.y);
      ctx.moveTo(m.x + 7, m.y); ctx.lineTo(m.x + 19, m.y);
      ctx.moveTo(m.x, m.y - 19); ctx.lineTo(m.x, m.y - 7);
      ctx.moveTo(m.x, m.y + 7); ctx.lineTo(m.x, m.y + 19);
      ctx.stroke();
    }

    function dibujaHudCanvas() {
      // balas como balones abajo
      ctx.font = "15px serif"; ctx.textAlign = "left";
      for (let i = 0; i < BALAS_MAX; i++) {
        ctx.globalAlpha = i < juego.balas ? 1 : 0.22;
        ctx.fillText("⚽", 12 + i * 20, H - 14);
      }
      ctx.globalAlpha = 1;
      if (juego.recargando > 0) {
        ctx.fillStyle = "rgba(245,197,24,.95)";
        ctx.font = "bold 13px system-ui, sans-serif";
        ctx.fillText("RECARGANDO…", 140, H - 16);
      }
      if (juego.combo >= 5) {
        ctx.fillStyle = "#f5c518"; ctx.font = "bold 15px system-ui, sans-serif"; ctx.textAlign = "right";
        ctx.fillText("🔥 COMBO ×2 (" + juego.combo + ")", W - 12, H - 14);
      }
    }

    function dibuja(dt) {
      dibujaFondo();
      juego.blancos.forEach(dibujaBlanco);
      dibujaEfectos(dt);
      dibujaMira();
      dibujaHudCanvas();
    }

    /* ================== Lógica ================== */

    function efecto(tipo, x, y, extra) {
      juego.efectos.push(Object.assign({ tipo, x, y, edad: 0, dur: 0.6, color: "#fff", tam: 16 }, extra));
    }

    function paso(dt) {
      juego.t += dt;
      if (juego.recargando > 0) {
        juego.recargando -= dt;
        if (juego.recargando <= 0) { juego.balas = BALAS_MAX; juego.recargando = 0; }
      }
      while (juego.t >= juego.proxSpawn) spawn();
      juego.blancos.forEach(b => {
        b.edad += dt;
        if (b.vx) b.x += b.vx * dt;
      });
      juego.blancos = juego.blancos.filter(b =>
        !b.golpeado && b.edad < b.vida && b.x > -40 && b.x < W + 40);
      pintarChips();
      if (juego.t >= DUR) terminar();
    }

    function disparar(x, y) {
      if (juego.fase !== "jugando" || juego.balas <= 0 || juego.recargando > 0) return;
      juego.balas--;
      juego.disparos++;
      if (juego.balas === 0) juego.recargando = RECARGA_SEG;

      // el blanco más cercano alcanzado (los voladores dan un poco de gracia)
      let dado = null, mejor = 1e9;
      for (const b of juego.blancos) {
        const margen = b.tipo === "volador" ? 8 : 0;
        const d = Math.hypot(x - b.x, y - b.y);
        if (d <= b.r + margen && d < mejor) { mejor = d; dado = b; }
      }

      if (!dado) {
        juego.combo = 0;
        efecto("anillo", x, y, { color: "rgba(255,255,255,.6)" });
        efecto("texto", x, y, { texto: "✖", color: "rgba(255,255,255,.7)", tam: 14 });
        return;
      }

      dado.golpeado = true;
      if (dado.tipo === "arbitro") {
        juego.puntos = Math.max(0, juego.puntos - 25);
        juego.combo = 0;
        efecto("anillo", dado.x, dado.y, { color: "#e23b3b" });
        efecto("texto", dado.x, dado.y - 20, { texto: "¡AL ÁRBITRO NO! −25", color: "#ff8080", tam: 15, dur: 1 });
        return;
      }

      juego.aciertos++;
      juego.combo++;
      if (juego.combo > juego.mejorCombo) juego.mejorCombo = juego.combo;
      let pts, txt;
      if (dado.tipo === "volador") { pts = 15; txt = "+15 ¡volea!"; }
      else {
        const d = mejor / dado.r;
        if (d < 0.35) { pts = 25; txt = "+25 ¡AL ÁNGULO!"; }
        else if (d < 0.7) { pts = 10; txt = "+10"; }
        else { pts = 5; txt = "+5"; }
      }
      if (juego.combo >= 5) { pts *= 2; txt += " ×2"; }
      juego.puntos += pts;
      efecto("anillo", dado.x, dado.y, { color: "#17c964" });
      efecto("texto", dado.x, dado.y - 16, { texto: txt, color: "#7dffb0", tam: 16, dur: 0.8 });
    }

    function pintarChips() {
      $("chipPuntos").textContent = juego.puntos;
      $("chipTiempo").textContent = Math.max(0, Math.ceil(DUR - juego.t));
      $("chipBalas").textContent = juego.recargando > 0 ? "…" : juego.balas;
      $("chipRecord").textContent = Cascarita.cargar("tiro:stats", statsDefault()).record;
    }

    /* ================== Ciclo ================== */

    let ultimo = 0, rafId = null;
    function ciclo(ts) {
      if (juego.fase !== "jugando") return;
      const dt = Math.min(0.05, (ts - ultimo) / 1000 || 0.016);
      ultimo = ts;
      paso(dt);
      if (juego.fase === "jugando") { dibuja(dt); rafId = requestAnimationFrame(ciclo); }
    }

    /* ================== Fases ================== */

    function empezar() {
      juego.fase = "jugando";
      juego.oficial = !hoy.hecho;
      juego.rng = juego.oficial ? Cascarita.rngDelDia("tiro") : Math.random;
      juego.t = 0; juego.proxSpawn = 0.6;
      juego.puntos = 0; juego.disparos = 0; juego.aciertos = 0;
      juego.combo = 0; juego.mejorCombo = 0;
      juego.balas = BALAS_MAX; juego.recargando = 0;
      juego.blancos = []; juego.efectos = [];
      quitarPantalla();
      ultimo = performance.now();
      rafId = requestAnimationFrame(ciclo);
    }

    function terminar() {
      if (juego.fase !== "jugando") return;
      juego.fase = "fin";
      if (rafId) cancelAnimationFrame(rafId);

      const precision = juego.disparos ? Math.round(juego.aciertos / juego.disparos * 100) : 0;
      const s = Cascarita.cargar("tiro:stats", statsDefault());
      const esRecord = juego.puntos > s.record;
      if (esRecord) s.record = juego.puntos;
      if (precision > s.mejorPrecision && juego.disparos >= 10) s.mejorPrecision = precision;

      if (juego.oficial) {
        hoy = { hecho: true, puntos: juego.puntos };
        Cascarita.guardar(claveHoy, hoy);
        s.dias++;
        Cascarita.guardar("tiro:stats", s);
        Cascarita.guardarResultado("tiro", { fecha: Cascarita.fechaHoy(), dia: nDia, puntaje: juego.puntos, gano: juego.puntos >= 250 });
      } else {
        Cascarita.guardar("tiro:stats", s);
      }
      pintarChips();
      pantallaFin(precision, esRecord);
    }

    /* ================== Pantallas ================== */

    function quitarPantalla() { const p = document.querySelector(".pantalla"); if (p) p.remove(); }

    function pantallaInicio() {
      quitarPantalla();
      const p = document.createElement("div");
      p.className = "pantalla"; p.id = "pantallaInicio";
      const oficial = !hoy.hecho;
      p.innerHTML = `
        <span class="${oficial ? "oficial-tag" : "libre-tag"}">${oficial ? "Ronda oficial del día #" + nDia : "Ronda libre"}</span>
        <h2>🎯 Tiro al Ángulo</h2>
        <p>${oficial ? "La misma ronda para todos hoy. 45 segundos: haz que cuenten." : "Hoy oficial: " + hoy.puntos + " pts. A pulir la puntería."}</p>
        <div class="reglas">
          <span>🎯 diana: 5-25 pts</span><span>⚽ volador: 15</span>
          <span>5 seguidos: 🔥 ×2</span><span>👨‍⚖️ árbitro: −25</span>
        </div>
        <p>6 balas por cargador · recarga sola en 1 segundo</p>
        <button class="boton boton-primario" id="btnJugar">🎯 Disparar</button>`;
      $("marco").appendChild(p);
      $("btnJugar").addEventListener("click", empezar);
    }

    function pantallaFin(precision, esRecord) {
      quitarPantalla();
      const s = Cascarita.cargar("tiro:stats", statsDefault());
      const frase = esRecord ? "🏆 ¡RÉCORD NUEVO!" : juego.puntos >= 400 ? "¡Francotirador! 🎯🔥" : juego.puntos >= 250 ? "¡Buena mira! 💪" : "A la próxima caen... 😅";
      const p = document.createElement("div");
      p.className = "pantalla"; p.id = "pantallaFin";
      p.innerHTML = `
        <span class="${juego.oficial ? "oficial-tag" : "libre-tag"}">${juego.oficial ? "Oficial del día" : "Ronda libre"}</span>
        <h2>${frase}</h2>
        <div class="fila-res">
          <div><div class="grande">${juego.puntos}</div><div class="etiq">Puntos</div></div>
          <div><div class="grande">${precision}%</div><div class="etiq">Puntería</div></div>
          <div><div class="grande">${juego.mejorCombo}</div><div class="etiq">Mejor racha</div></div>
        </div>
        <p class="etiq">Récord: ${s.record}</p>
        <div class="acciones">
          <button class="boton boton-primario" id="btnCompartir">📤 Compartir</button>
          <button class="boton" id="btnOtra">🔁 Otra ronda</button>
        </div>`;
      $("marco").appendChild(p);
      $("btnCompartir").addEventListener("click", () => {
        const t = `Cascarita 🎯 Tiro al Ángulo #${nDia}\n${juego.puntos} pts · ${precision}% puntería · racha de ${juego.mejorCombo}${esRecord ? " · ¡récord! 🏆" : ""}\n¿Tienes mejor mira?`;
        Cascarita.compartir(t, location.origin + location.pathname);
      });
      $("btnOtra").addEventListener("click", empezar);
    }

    /* ================== Controles ================== */

    function coordsCanvas(e) {
      const rect = cv.getBoundingClientRect();
      return {
        x: (e.clientX - rect.left) * (W / rect.width),
        y: (e.clientY - rect.top) * (H / rect.height)
      };
    }
    $("marco").addEventListener("pointerdown", e => {
      if (e.target.closest(".pantalla")) return; // botones de las pantallas
      const c = coordsCanvas(e);
      juego.mira.x = c.x; juego.mira.y = c.y;
      disparar(c.x, c.y);
    });
    $("marco").addEventListener("pointermove", e => {
      const c = coordsCanvas(e);
      juego.mira.x = c.x; juego.mira.y = c.y;
      juego.mira.activa = e.pointerType !== "touch";
    });

    document.addEventListener("visibilitychange", () => {
      // el tiempo corre con dt acumulado: al ocultarse simplemente se congela el ciclo
      if (!document.hidden && juego.fase === "jugando") { ultimo = performance.now(); rafId = requestAnimationFrame(ciclo); }
      else if (document.hidden && rafId) cancelAnimationFrame(rafId);
    });

    /* ================== Arranque ================== */

    pintarChips();
    dibuja(0);
    pantallaInicio();

    // gancho mínimo para pruebas automatizadas
    window.__ta = { juego, disparar, terminar, empezar };
  })();
  </script>
</body>
</html>
