  <script src="../assets/hub.js"></script>
  <script>
  (function () {
    const $ = id => document.getElementById(id);

    /* ================== Constantes del juego ================== */

    const W = 360, H = 560;
    const CARRILES = [60, 180, 300];
    const JUG_Y = 448;                 // dónde corre el jugador
    const V_INI = 320, V_MAX = 640;    // velocidad de scroll px/s
    const RAMPA = 7;                   // +px/s por segundo
    const DUR_SALTO = 0.55;            // segundos en el aire
    const PX_POR_METRO = 40;
    const PUNTOS_BALON = 10;           // 1 balón dorado = 10 m de puntaje

    const nDia = Cascarita.numeroDia();
    const claveHoy = "contragolpe:" + Cascarita.fechaHoy();

    // ── Condiciones del día (v2): la cancha cambia cada día, igual para todos ──
    const CONDICIONES = [
      { id: "clasico",  ic: "☀️", nom: "Clásico de mediodía", desc: "Cancha limpia: puro reflejo." },
      { id: "nocturno", ic: "🌙", nom: "Partido nocturno",    desc: "Bajo los reflectores del estadio.", noche: true },
      { id: "aguacero", ic: "🌧️", nom: "Aguacero",            desc: "Cancha rápida y mojada: todo corre más.", vel: 1.14, rampa: 1.25, lluvia: true },
      { id: "muralla",  ic: "🛡️", nom: "Defensa alta",        desc: "Salen a presionarte: más rivales al paso.", dobles: 0.62, gap: 0.9 },
      { id: "cosecha",  ic: "💰", nom: "Lluvia de dorados",   desc: "Día de cosecha: más balones dorados.", dorados: 0.85, linea: 4 },
      { id: "vendaval", ic: "🌪️", nom: "Vendaval",            desc: "El viento te frena el cambio de carril: anticípate.", agarre: 8, rampa: 1.1 }
    ];
    const rCond = Cascarita.rngDelDia("contragolpe-cond");
    const COND = CONDICIONES[Math.floor(rCond() * CONDICIONES.length)];

    /* ================== Estado ================== */

    // hoy: { hecho, metros, balones } — la corrida oficial del día
    let hoy = Cascarita.cargar(claveHoy, { hecho: false, metros: 0, balones: 0 });
    function statsDefault() { return { record: 0, dias: 0, totalMetros: 0 }; }

    const juego = {
      fase: "inicio",        // inicio | corriendo | pausa | fin
      oficial: !hoy.hecho,   // la primera corrida del día es la oficial
      rng: null,
      t: 0, scroll: 0, v: V_INI,
      carril: 1, x: CARRILES[1],
      salto: -1,             // -1 = en piso; 0..DUR_SALTO = en el aire
      obst: [], balones: [], polvo: [],
      proxFila: 400,         // scroll al que aparece la siguiente fila
      metros: 0, dorados: 0
    };

    /* ================== Canvas ================== */

    const cv = $("lienzo");
    const ctx = cv.getContext("2d");
    const dpr = Math.min(2, window.devicePixelRatio || 1);
    cv.width = W * dpr; cv.height = H * dpr;
    ctx.scale(dpr, dpr);

    /* ================== Generación de la cancha (filas) ================== */

    // tipos: "defensa" (esquivar), "barrida" (saltar o esquivar), "cono" (esquivar)
    // proxFila es la coordenada de MUNDO donde nace la siguiente fila (siempre crece).
    function generarFila() {
      const r = juego.rng;
      const y = juego.proxFila;
      const libres = [0, 1, 2];
      const cuantos = r() < (COND.dobles || 0.42) ? 2 : 1;   // defensa alta = más dobles

      for (let k = 0; k < cuantos; k++) {
        const li = Math.floor(r() * libres.length);
        const carril = libres.splice(li, 1)[0];
        const tr = r();
        const tipo = tr < 0.44 ? "defensa" : tr < 0.78 ? "barrida" : "cono";
        juego.obst.push({ tipo, carril, y });
      }
      // balones dorados en un carril libre: línea rumbo a la siguiente fila
      if (libres.length && r() < (COND.dorados || 0.6)) {
        const carril = libres[Math.floor(r() * libres.length)];
        const linea = COND.linea || 3;
        for (let b = 0; b < linea; b++) juego.balones.push({ carril, y: y + 58 + b * 44, tomado: false });
      }
      const gap = (250 - Math.min(70, (juego.v - V_INI) * 0.3)) * (COND.gap || 1); // se aprieta con la velocidad
      juego.proxFila = y + gap + r() * 90;
    }

    /* ================== Proyección pseudo-3D ================== */
    // El MUNDO sigue siendo el mismo de siempre (carriles + distancia lineal:
    // colisiones y generación intactas); solo la CÁMARA cambió. Un punto a
    // dWorld px "adelante" se proyecta con p = C/(C+z): y baja hacia el
    // horizonte y la escala se encoge. El jugador (dWorld=112) queda a y≈461
    // con escala 1, así que el contacto visual coincide con la colisión real.
    const HORIZONTE = 148, CX = 180;
    const P_JUG = 0.72, PY = (468 - HORIZONTE) / P_JUG;
    const C_PERSP = 386, Z_JUG = 150;
    const D_JUG = H - JUG_Y;                    // 112: distancia lógica del jugador
    const VISTA = 1400;                         // hasta dónde se dibuja el mundo
    function proy(dWorld) {
      const z = Math.max(6, dWorld - D_JUG + Z_JUG);
      const p = C_PERSP / (C_PERSP + z);
      return { p, y: HORIZONTE + PY * p, esc: p / P_JUG, alpha: Math.max(0, Math.min(1, (p - 0.2) * 9)) };
    }
    const laneX = (carril, esc) => CX + (carril - 1) * 118 * esc;
    const xDe = (xMundo, esc) => CX + (xMundo - CX) * esc;   // para la x continua del jugador

    /* ================== Dibujo ================== */

    const PAL = COND.noche
      ? { cieloA: "#0b1026", cieloB: "#1c2a4a", pastoA: "#0e4426", pastoB: "#0c3a21", grada: "#141a2c", gente: ["#3a4a6b", "#57648a", "#8a93b0", "#2e3a58"] }
      : COND.lluvia
        ? { cieloA: "#5c6b78", cieloB: "#8fa0ab", pastoA: "#14603a", pastoB: "#115434", grada: "#2a3138", gente: ["#4a555e", "#6b7680", "#9aa5ad", "#3a444c"] }
        : { cieloA: "#7cc7e8", cieloB: "#cfeadf", pastoA: "#1a7a42", pastoB: "#156737", grada: "#26303c", gente: ["#e8654f", "#f0b429", "#61c8e8", "#eaf1ea", "#34d17f"] };

    function dibujaEstadio() {
      // cielo
      const g = ctx.createLinearGradient(0, 0, 0, HORIZONTE);
      g.addColorStop(0, PAL.cieloA); g.addColorStop(1, PAL.cieloB);
      ctx.fillStyle = g; ctx.fillRect(0, 0, W, HORIZONTE);
      if (COND.noche) {  // estrellas fijas
        ctx.fillStyle = "rgba(255,255,255,.5)";
        for (let i = 0; i < 24; i++) ctx.fillRect((i * 97) % W, (i * 53) % 70, 1.6, 1.6);
      }
      // gradas con público (patrón fijo, parallax suave)
      ctx.fillStyle = PAL.grada; ctx.fillRect(0, 84, W, HORIZONTE - 84);
      const off = Math.floor(juego.scroll * 0.02) % 14;
      for (let f = 0; f < 4; f++) {
        for (let i = -1; i < 27; i++) {
          ctx.fillStyle = PAL.gente[(i * 7 + f * 3) % PAL.gente.length];
          ctx.globalAlpha = 0.85;
          // la ola: el público bota en cadena
          const ola = Math.sin(juego.t * 2.2 + i * 0.42 + f) * 1.4;
          ctx.fillRect(i * 14 - off + (f % 2) * 7, 90 + f * 13 + ola, 4, 4);
        }
      }
      ctx.globalAlpha = 1;
      // techo de la tribuna + reflectores
      ctx.fillStyle = COND.noche ? "#2c3654" : "#3a4450";
      ctx.fillRect(0, 80, W, 6);
      for (const lx of [40, 140, 220, 320]) {
        ctx.fillStyle = "#222b38"; ctx.fillRect(lx - 2, 38, 4, 44);
        ctx.fillStyle = COND.noche ? "#ffe9a8" : "#9aa5ad";
        ctx.fillRect(lx - 9, 30, 18, 9);
        if (COND.noche) {   // halo encendido
          ctx.fillStyle = "rgba(255,233,168,.16)";
          ctx.beginPath(); ctx.moveTo(lx, 40); ctx.lineTo(lx - 26, 84); ctx.lineTo(lx + 26, 84); ctx.closePath(); ctx.fill();
        }
      }
      // vallas publicitarias de la casa
      ctx.fillStyle = "#0d5c31"; ctx.fillRect(0, HORIZONTE - 12, W, 12);
      ctx.fillStyle = "rgba(255,255,255,.85)";
      ctx.font = "bold 9px system-ui, sans-serif"; ctx.textAlign = "left";
      const offV = Math.floor(juego.scroll * 0.12) % 120;
      for (let x = -offV; x < W; x += 120) ctx.fillText("⚽ CASCARITA", x + 8, HORIZONTE - 3);
    }

    function dibujaCancha() {
      dibujaEstadio();
      // pasto base con luz que cae hacia el frente
      const g = ctx.createLinearGradient(0, HORIZONTE, 0, H);
      g.addColorStop(0, PAL.pastoB); g.addColorStop(1, PAL.pastoA);
      ctx.fillStyle = g; ctx.fillRect(0, HORIZONTE, W, H - HORIZONTE);
      // franjas de podado en perspectiva (bandas del MUNDO proyectadas)
      const FR = 150;
      const desde = Math.floor((juego.scroll - 200) / FR) * FR;
      for (let s = desde; s < juego.scroll + VISTA; s += FR) {
        if (Math.floor(s / FR) % 2) continue;
        const a = proy(s - juego.scroll), b = proy(s - juego.scroll + FR);
        ctx.fillStyle = "rgba(0,0,0,.10)";
        ctx.fillRect(0, b.y, W, Math.max(1, a.y - b.y));
      }
      // líneas de banda convergentes (rectas en pantalla: x e y son lineales en p)
      const cerca = proy(-40), lejos = proy(VISTA);
      ctx.strokeStyle = "rgba(255,255,255,.55)"; ctx.lineWidth = 3;
      for (const lado of [-1, 1]) {
        ctx.beginPath();
        ctx.moveTo(CX + lado * 118 * 1.62 * cerca.esc, cerca.y);
        ctx.lineTo(CX + lado * 118 * 1.62 * lejos.esc, lejos.y);
        ctx.stroke();
      }
      // rayas de medio campo cada 600 del mundo
      ctx.lineWidth = 2;
      for (let s = Math.ceil(juego.scroll / 600) * 600; s < juego.scroll + VISTA; s += 600) {
        const q = proy(s - juego.scroll);
        ctx.strokeStyle = `rgba(255,255,255,${0.35 * q.alpha})`;
        ctx.beginPath();
        ctx.moveTo(CX - 118 * 1.62 * q.esc, q.y);
        ctx.lineTo(CX + 118 * 1.62 * q.esc, q.y);
        ctx.stroke();
      }
      // lluvia del día
      if (COND.lluvia) {
        ctx.strokeStyle = "rgba(210,230,245,.35)"; ctx.lineWidth = 1;
        const rOff = (juego.t * 520) % 90;
        for (let i = 0; i < 34; i++) {
          const rx = (i * 61) % W, ry = ((i * 131) + rOff * (1 + i % 3)) % H;
          ctx.beginPath(); ctx.moveTo(rx, ry); ctx.lineTo(rx - 3, ry + 13); ctx.stroke();
        }
      }
      // líneas de velocidad al ir a tope
      if (juego.v > 500 && juego.fase === "corriendo") {
        ctx.strokeStyle = "rgba(255,255,255,.18)"; ctx.lineWidth = 2;
        const so = (juego.scroll * 1.6) % 130;
        for (const [sx, sy] of [[16, 300 - so], [W - 16, 380 - so], [26, 520 - so + 130]]) {
          ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(sx, sy + 44); ctx.stroke();
        }
      }
    }

    // "Voxel" 2.5D: cada bloque lleva extrusión (cara trasera oscura), cuerpo
    // y una línea de luz arriba → los personajes se ven modelados, no planos.
    function vox(x, y, an, al, col) {
      ctx.fillStyle = col; ctx.fillRect(x + 2.4, y - 2.4, an, al);
      ctx.fillStyle = "rgba(0,0,0,.34)"; ctx.fillRect(x + 2.4, y - 2.4, an, al);
      ctx.fillStyle = col; ctx.fillRect(x, y, an, al);
      ctx.fillStyle = "rgba(255,255,255,.16)"; ctx.fillRect(x, y, an, 1.8);
    }

    // polvo que levanta el corredor (partículas baratas en espacio de MUNDO)
    function soltarPolvo(n, fuerte) {
      for (let i = 0; i < n; i++) {
        juego.polvo.push({
          x: juego.x + (Math.random() - 0.5) * 18, d: D_JUG - 4 - Math.random() * 8,
          vx: (Math.random() - 0.5) * (fuerte ? 70 : 26), vy: 12 + Math.random() * 22,
          vida: 0.4 + Math.random() * 0.25, edad: 0
        });
      }
    }
    function dibujaPolvo() {
      const col = COND.lluvia ? "rgba(190,220,235," : "rgba(210,200,170,";
      for (const q of juego.polvo) {
        const pr = proy(q.d);
        const f = 1 - q.edad / q.vida;
        if (f <= 0) continue;
        ctx.fillStyle = col + (0.5 * f) + ")";
        ctx.beginPath();
        ctx.arc(xDe(q.x, pr.esc), pr.y - q.vy * q.edad * 2.2 * pr.esc, (2.6 + (1 - f) * 3) * pr.esc, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // jugador estilo bloque (verde de local), en espacio LOCAL (pies en 0,0)
    // proyectado con la cámara: se inclina al cambiar de carril y crece al saltar.
    function dibujaJugador() {
      const pr = proy(D_JUG);
      const enAire = juego.salto >= 0;
      const prog = enAire ? juego.salto / DUR_SALTO : 0;
      const alza = enAire ? Math.sin(prog * Math.PI) * 46 : 0;
      const f = Math.sin(juego.t * 16);
      const x = xDe(juego.x, pr.esc);
      const lean = Math.max(-0.3, Math.min(0.3, (CARRILES[juego.carril] - juego.x) * 0.006));
      // sombra en el piso (no salta contigo)
      ctx.fillStyle = "rgba(0,0,0,.32)";
      ctx.beginPath();
      ctx.ellipse(x, pr.y + 4, (19 - (enAire ? 7 : 0)) * pr.esc, 6 * pr.esc, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.save();
      ctx.translate(x, pr.y - alza * pr.esc);
      ctx.scale(pr.esc * 1.22, pr.esc * 1.22);
      ctx.rotate(lean);
      // balón pegado al pie
      ctx.font = "15px serif"; ctx.textAlign = "center";
      ctx.fillText("⚽", 13, 6);
      const z = enAire ? 0 : f * 4;
      // piernas con calceta y tache (zancada)
      vox(-9, -14, 7, 9 + z, "#e3b183"); vox(2, -14, 7, 9 - z, "#e3b183");
      vox(-9, -6 + z, 7, 4, "#0f8a46"); vox(2, -6 - z, 7, 4, "#0f8a46");     // calcetas
      vox(-10, -2 + z, 9, 3, "#17110c"); vox(1, -2 - z, 9, 3, "#17110c");    // taches
      // shorts + jersey verde (visto de espaldas) con mangas y NÚMERO
      vox(-11, -24, 22, 10, "#f2f5f7");
      vox(-13, -44, 26, 22, "#0f8a46");
      vox(-13, -44, 5, 14, "#0b6b36"); vox(8, -44, 5, 14, "#0b6b36");        // mangas
      // brazos al ritmo de la zancada, con puño
      vox(-18, -40 + (enAire ? -4 : f * 3), 5, 13, "#e3b183");
      vox(13, -40 - (enAire ? -4 : f * 3), 5, 13, "#e3b183");
      ctx.fillStyle = "#fff"; ctx.font = "bold 10px system-ui, sans-serif";
      ctx.fillText("10", 0, -29);                                            // dorsal
      // cabeza con nuca y pelo
      vox(-8, -60, 16, 15, "#e3b183");
      vox(-8, -63, 16, 7, "#17110c");
      ctx.fillStyle = "rgba(0,0,0,.12)"; ctx.fillRect(-8, -50, 16, 2);       // nuca
      ctx.restore();
    }

    function dibujaObst(o) {
      const d = o.y - juego.scroll;
      const pr = proy(d);
      if (pr.y > H + 80 || pr.alpha <= 0) return;
      const x = xDe(CARRILES[o.carril], pr.esc);
      const f = Math.sin(juego.t * 12 + o.y);   // trote del rival
      ctx.save();
      ctx.globalAlpha = pr.alpha;
      // sombra
      ctx.fillStyle = "rgba(0,0,0,.30)";
      ctx.beginPath();
      ctx.ellipse(x, pr.y + 3, (o.tipo === "barrida" ? 30 : 16) * pr.esc, 5.5 * pr.esc, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.translate(x, pr.y);
      ctx.scale(pr.esc * 1.22, pr.esc * 1.22);
      if (o.tipo === "defensa") {
        // te encara: piernas trotando, brazos abiertos para cerrarte el paso
        vox(-9, -14, 7, 14 + f * 3, "#c68a54"); vox(2, -14, 7, 14 - f * 3, "#c68a54");
        vox(-11, -24, 22, 10, "#1a1a1a");
        vox(-13, -44, 26, 22, "#b01e23");
        vox(-13, -44, 4, 12, "#f2f5f7"); vox(9, -44, 4, 12, "#f2f5f7");
        vox(-19, -42 - f * 2, 6, 12, "#c68a54"); vox(13, -42 + f * 2, 6, 12, "#c68a54");
        vox(-8, -60, 16, 15, "#c68a54");
        vox(-8, -63, 16, 7, "#0d0d0d");
        ctx.fillStyle = "#17110c"; ctx.fillRect(-5, -55, 3, 2.6); ctx.fillRect(2, -55, 3, 2.6); // ojos
      } else if (o.tipo === "barrida") {
        // barriéndose hacia ti: acostado, se salta
        vox(-30, -16, 34, 14, "#b01e23");
        vox(4, -13, 26, 8, "#c68a54");                                 // piernas estiradas
        vox(24, -15, 8, 4, "#0d0d0d");                                 // tache al frente
        vox(-38, -18, 10, 12, "#c68a54");
        vox(-40, -21, 12, 5, "#0d0d0d");
        ctx.fillStyle = "rgba(255,255,255,.5)"; ctx.fillRect(-34, -2, 66, 2);  // rastro en el pasto
        ctx.fillStyle = "rgba(210,200,170,.4)";                        // tierra que levanta
        ctx.beginPath(); ctx.arc(30 + f * 3, -8, 4, 0, Math.PI * 2); ctx.fill();
      } else { // cono con volumen
        ctx.fillStyle = "#b35110";
        ctx.beginPath(); ctx.moveTo(2.4, -36); ctx.lineTo(15, -2); ctx.lineTo(-10, -2); ctx.closePath(); ctx.fill();
        ctx.fillStyle = "#ff7a1a";
        ctx.beginPath(); ctx.moveTo(0, -34); ctx.lineTo(13, 0); ctx.lineTo(-13, 0); ctx.closePath(); ctx.fill();
        ctx.fillStyle = "#fff"; ctx.fillRect(-8, -16, 16, 5);
        ctx.fillStyle = "rgba(255,255,255,.25)"; ctx.fillRect(-3, -30, 3, 26); // brillo
      }
      ctx.restore();
    }

    function dibujaBalon(b) {
      const d = b.y - juego.scroll;
      const pr = proy(d);
      if (pr.y > H + 30 || pr.alpha <= 0) return;
      const x = xDe(CARRILES[b.carril], pr.esc);
      const brillo = Math.sin(juego.t * 6 + b.y) * 2;
      const flote = Math.sin(juego.t * 3 + b.y) * 3 * pr.esc;
      ctx.save();
      ctx.globalAlpha = pr.alpha;
      ctx.fillStyle = COND.noche ? "rgba(255,220,90,.5)" : "rgba(245,197,24,.35)";
      ctx.beginPath(); ctx.arc(x, pr.y - 10 * pr.esc + flote, (14 + brillo) * pr.esc, 0, Math.PI * 2); ctx.fill();
      ctx.font = (18 * pr.esc) + "px serif"; ctx.textAlign = "center";
      ctx.fillText("⚽", x, pr.y - 4 * pr.esc + flote);
      ctx.fillStyle = "rgba(245,197,24,.9)";
      ctx.beginPath(); ctx.arc(x, pr.y - 17 * pr.esc + flote, 3 * pr.esc, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }

    function dibuja() {
      dibujaCancha();
      dibujaPolvo();
      // pintar de LEJOS a CERCA (el jugador se intercala por su profundidad)
      const items = [];
      for (const o of juego.obst) items.push({ d: o.y - juego.scroll, f: () => dibujaObst(o) });
      for (const b of juego.balones) if (!b.tomado) items.push({ d: b.y - juego.scroll, f: () => dibujaBalon(b) });
      items.push({ d: D_JUG, f: dibujaJugador });
      items.sort((a, b) => b.d - a.d);
      for (const it of items) it.f();
    }

    /* ================== Lógica ================== */

    function paso(dt) {
      juego.t += dt;
      juego.v = Math.min(V_MAX, juego.v + RAMPA * (COND.rampa || 1) * dt);
      juego.scroll += juego.v * dt;
      juego.metros = Math.floor(juego.scroll / PX_POR_METRO);

      // deslizamiento suave hacia el carril (el vendaval del día te frena)
      const destino = CARRILES[juego.carril];
      juego.x += (destino - juego.x) * Math.min(1, dt * (COND.agarre || 14));

      // salto (al aterrizar levanta polvo)
      if (juego.salto >= 0) {
        juego.salto += dt;
        if (juego.salto >= DUR_SALTO) { juego.salto = -1; soltarPolvo(5, true); }
      }

      // polvo de la zancada
      if (juego.salto < 0 && Math.random() < dt * 11) soltarPolvo(1, false);
      for (const q of juego.polvo) { q.edad += dt; q.x += q.vx * dt; }
      juego.polvo = juego.polvo.filter(q => q.edad < q.vida);

      // nuevas filas: mantiene generado hasta el fondo de la vista en perspectiva
      while (juego.proxFila < juego.scroll + VISTA + 100) generarFila();

      // colisiones y recolección
      const px = juego.x, enAire = juego.salto >= 0;
      for (const o of juego.obst) {
        const oy = H - (o.y - juego.scroll);
        if (oy > JUG_Y - 24 && oy < JUG_Y + 18 && Math.abs(px - CARRILES[o.carril]) < 52) {
          if (o.tipo === "barrida" && enAire) continue;  // la saltaste
          morir();
          return;
        }
      }
      for (const b of juego.balones) {
        if (b.tomado) continue;
        const by = H - (b.y - juego.scroll);
        if (by > JUG_Y - 30 && by < JUG_Y + 24 && Math.abs(px - CARRILES[b.carril]) < 46) {
          b.tomado = true;
          juego.dorados++;
        }
      }

      // limpieza de lo que ya pasó
      juego.obst = juego.obst.filter(o => (H - (o.y - juego.scroll)) < H + 120);
      juego.balones = juego.balones.filter(b => !b.tomado && (H - (b.y - juego.scroll)) < H + 60);

      pintarChips();
    }

    function pintarChips() {
      $("chipMetros").textContent = juego.metros;
      $("chipBalones").textContent = juego.dorados;
      $("chipRecord").textContent = Cascarita.cargar("contragolpe:stats", statsDefault()).record;
    }

    /* ================== Ciclo ================== */

    let ultimo = 0, rafId = null;
    function ciclo(ts) {
      if (juego.fase !== "corriendo") return;
      const dt = Math.min(0.05, (ts - ultimo) / 1000 || 0.016);
      ultimo = ts;
      paso(dt);
      dibuja();
      rafId = requestAnimationFrame(ciclo);
    }

    /* ================== Fases ================== */

    function empezar() {
      juego.fase = "corriendo";
      juego.oficial = !hoy.hecho;
      juego.rng = juego.oficial ? Cascarita.rngDelDia("contragolpe") : Math.random;
      juego.t = 0; juego.scroll = 0; juego.v = V_INI * (COND.vel || 1);
      juego.carril = 1; juego.x = CARRILES[1]; juego.salto = -1;
      juego.obst = []; juego.balones = [];
      juego.proxFila = 900;   // pista limpia ~2.4 s antes del primer obstáculo
      juego.metros = 0; juego.dorados = 0;
      quitarPantalla();
      ultimo = performance.now();
      rafId = requestAnimationFrame(ciclo);
    }

    function morir() {
      if (juego.fase === "fin") return;   // nunca dos veces por corrida
      juego.fase = "fin";
      if (rafId) cancelAnimationFrame(rafId);

      const puntaje = juego.metros + juego.dorados * PUNTOS_BALON;
      const s = Cascarita.cargar("contragolpe:stats", statsDefault());
      const esRecord = puntaje > s.record;
      if (esRecord) s.record = puntaje;
      s.totalMetros += juego.metros;

      if (juego.oficial) {
        hoy = { hecho: true, metros: juego.metros, balones: juego.dorados };
        Cascarita.guardar(claveHoy, hoy);
        s.dias++;
        Cascarita.guardar("contragolpe:stats", s);
        Cascarita.guardarResultado("contragolpe", { fecha: Cascarita.fechaHoy(), dia: nDia, puntaje, gano: puntaje >= 300 });
      } else {
        Cascarita.guardar("contragolpe:stats", s);
      }
      pintarChips();
      pantallaFin(puntaje, esRecord);
    }

    /* ================== Pantallas (overlays DOM) ================== */

    function quitarPantalla() { const p = document.querySelector(".pantalla"); if (p) p.remove(); }

    function pantallaInicio() {
      quitarPantalla();
      const p = document.createElement("div");
      p.className = "pantalla"; p.id = "pantallaInicio";
      const oficial = !hoy.hecho;
      p.innerHTML = `
        <span class="${oficial ? "oficial-tag" : "libre-tag"}">${oficial ? "Corrida oficial del día #" + nDia : "Corrida libre"}</span>
        <h2>🏃 ¡Contragolpe!</h2>
        <p><b style="color:#ffd76a">${COND.ic} Hoy: ${COND.nom}.</b> ${COND.desc}</p>
        <p>${oficial ? "La misma cancha para todos hoy. Una sola oficial: hazla contar." : "Hoy oficial: " + hoy.metros + " m. Sigue entrenando."}</p>
        <div class="controles"><span>⬅➡ deslizar / flechas</span><span>⬆ tocar / espacio: saltar</span></div>
        <p>Esquiva <b>defensas</b> y <b>conos</b> · salta las <b>barridas</b> 🔥 · junta <b>⚽ dorados</b></p>
        <button class="boton boton-primario" id="btnJugar">▶️ Correr</button>`;
      $("marco").appendChild(p);
      $("btnJugar").addEventListener("click", empezar);
    }

    function pantallaFin(puntaje, esRecord) {
      quitarPantalla();
      const s = Cascarita.cargar("contragolpe:stats", statsDefault());
      const p = document.createElement("div");
      p.className = "pantalla"; p.id = "pantallaFin";
      const frase = esRecord ? "🏆 ¡RÉCORD NUEVO!" : puntaje >= 400 ? "¡Corrida de crack! 🔥" : puntaje >= 200 ? "¡Bien ahí! 💪" : "Te barrieron... 😅";
      p.innerHTML = `
        <span class="${juego.oficial ? "oficial-tag" : "libre-tag"}">${juego.oficial ? "Oficial del día" : "Corrida libre"}</span>
        <h2>${frase}</h2>
        <div class="fila-res">
          <div><div class="grande">${juego.metros}</div><div class="etiq">Metros</div></div>
          <div><div class="grande">${juego.dorados}</div><div class="etiq">⚽ Dorados</div></div>
          <div><div class="grande">${puntaje}</div><div class="etiq">Puntaje</div></div>
        </div>
        <p class="etiq">Récord: ${s.record}</p>
        <div class="acciones">
          <button class="boton boton-primario" id="btnCompartir">📤 Compartir</button>
          <button class="boton" id="btnOtra">🔁 Otra corrida</button>
        </div>`;
      $("marco").appendChild(p);
      $("btnCompartir").addEventListener("click", () => {
        const t = `Cascarita 🏃⚽ Contragolpe #${nDia} ${COND.ic}\n${juego.metros} m · ${juego.dorados} dorados · ${puntaje} pts${esRecord ? " · ¡récord! 🏆" : ""}\nHoy: ${COND.nom}. ¿Me alcanzas?`;
        Cascarita.compartir(t, location.origin + location.pathname);
      });
      $("btnOtra").addEventListener("click", empezar);
    }

    function pantallaPausa() {
      if (juego.fase !== "corriendo") return;
      juego.fase = "pausa";
      if (rafId) cancelAnimationFrame(rafId);
      const p = document.createElement("div");
      p.className = "pantalla"; p.id = "pantallaPausa";
      p.innerHTML = `<h2>⏸️ Pausa</h2><button class="boton boton-primario" id="btnSeguir">▶️ Seguir</button>`;
      $("marco").appendChild(p);
      $("btnSeguir").addEventListener("click", () => {
        quitarPantalla();
        juego.fase = "corriendo";
        ultimo = performance.now();
        rafId = requestAnimationFrame(ciclo);
      });
    }

    /* ================== Controles ================== */

    function irIzq() { if (juego.fase === "corriendo" && juego.carril > 0) { juego.carril--; soltarPolvo(4, true); } }
    function irDer() { if (juego.fase === "corriendo" && juego.carril < 2) { juego.carril++; soltarPolvo(4, true); } }
    function saltar() { if (juego.fase === "corriendo" && juego.salto < 0) juego.salto = 0; }

    document.addEventListener("keydown", e => {
      if (e.key === "ArrowLeft" || e.key === "a") { irIzq(); e.preventDefault(); }
      else if (e.key === "ArrowRight" || e.key === "d") { irDer(); e.preventDefault(); }
      else if (e.key === "ArrowUp" || e.key === " " || e.key === "w") { saltar(); e.preventDefault(); }
    });

    let toque = null;
    $("marco").addEventListener("touchstart", e => {
      const t = e.changedTouches[0];
      toque = { x: t.clientX, y: t.clientY };
    }, { passive: true });
    $("marco").addEventListener("touchmove", e => { if (juego.fase === "corriendo") e.preventDefault(); }, { passive: false });
    $("marco").addEventListener("touchend", e => {
      if (!toque) return;
      const t = e.changedTouches[0];
      const dx = t.clientX - toque.x, dy = t.clientY - toque.y;
      toque = null;
      if (juego.fase !== "corriendo") return;
      if (Math.abs(dx) < 22 && Math.abs(dy) < 22) { saltar(); return; }  // tap = salto
      if (Math.abs(dx) > Math.abs(dy)) { if (dx > 0) irDer(); else irIzq(); }
      else if (dy < 0) saltar();
    }, { passive: true });

    document.addEventListener("visibilitychange", () => { if (document.hidden) pantallaPausa(); });

    /* ================== Arranque ================== */

    pintarChips();
    $("chipCond").textContent = COND.ic;
    $("chipCond").title = COND.nom + " — " + COND.desc;
    dibujaCancha();
    dibujaJugador();
    pantallaInicio();

    // gancho mínimo para pruebas automatizadas
    window.__cg = { juego, morir, empezar, COND, proy, D_JUG };
  })();
  </script>
</body>
</html>
