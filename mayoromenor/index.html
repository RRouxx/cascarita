<!doctype html>
<html lang="es-MX">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2452147421495188" crossorigin="anonymous"></script>
  <title>Mayor o menor — goleadores de la Liga MX | Cascarita</title>
  <meta name="description" content="¿Quién metió más goles en la Liga MX? Adivina si el siguiente jugador marcó más o menos. Encadena aciertos y bate tu récord.">
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/assets/icon-180.png">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Cascarita">
  <meta property="og:title" content="Mayor o menor — goleadores de la Liga MX">
  <meta property="og:description" content="¿Quién metió más goles? Adivina y encadena aciertos.">
  <meta property="og:image" content="https://cascaritas.com.mx/assets/og.png">
  <meta property="og:url" content="https://cascaritas.com.mx/mayoromenor/">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Mayor o menor — goleadores de la Liga MX">
  <meta name="twitter:description" content="¿Quién metió más goles? Adivina y encadena aciertos.">
  <meta name="twitter:image" content="https://cascaritas.com.mx/assets/og.png">
  <link rel="stylesheet" href="../assets/hub.css">
  <style>
    .sub { text-align:center; color:var(--texto-tenue); margin:-14px 0 14px; font-size:.9rem; }
    .modos { display:flex; justify-content:center; gap:8px; margin-bottom:14px; }
    .modo-btn {
      border:1px solid var(--borde); background:var(--card); color:var(--texto-tenue);
      border-radius:999px; font-weight:800; font-size:.85rem; padding:8px 18px; cursor:pointer;
      transition:filter .1s ease;
    }
    .modo-btn:hover { filter:brightness(1.1); }
    .modo-btn.on { background:var(--verde); border-color:var(--verde); color:#04150b; }
    .marcador { text-align:center; font-weight:800; font-size:1.05rem; margin-bottom:16px; }
    .marcador span { color:var(--verde); }

    .duelo {
      display:grid; grid-template-columns:1fr 1fr; gap:12px; align-items:stretch;
      max-width:600px; margin:0 auto; position:relative;
    }
    @media (max-width:520px){ .duelo { grid-template-columns:1fr; } }

    .jcard {
      background:var(--card); border:1px solid var(--borde); border-radius:var(--radio);
      padding:20px 16px; text-align:center; display:flex; flex-direction:column; gap:6px;
      justify-content:center; min-height:190px;
    }
    .jcard .equipo { color:var(--texto-tenue); font-size:.8rem; font-weight:700; text-transform:uppercase; letter-spacing:.03em; }
    .jcard .nombre { font-size:1.25rem; font-weight:800; line-height:1.2; }
    .jcard .pos { color:var(--texto-tenue); font-size:.82rem; }
    .jcard .goles { font-size:2.6rem; font-weight:800; color:var(--verde); margin-top:4px; line-height:1; }
    .jcard .goles small { display:block; font-size:.8rem; color:var(--texto-tenue); font-weight:700; margin-top:4px; }
    .jcard .qmark { font-size:2.6rem; font-weight:800; color:var(--texto-tenue); margin-top:4px; }

    .vs {
      position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
      background:var(--acento); color:#fff; font-weight:800; font-size:.85rem;
      width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center;
      border:3px solid var(--bg); z-index:2;
    }
    @media (max-width:520px){ .vs { left:50%; top:calc(50% - 6px); } }

    .botones { display:flex; flex-direction:column; gap:8px; margin-top:8px; }
    .btn-mm {
      width:100%; padding:12px; border-radius:10px; border:1px solid var(--borde);
      background:var(--bg-elev); color:var(--texto); font-weight:800; font-size:.95rem; cursor:pointer;
    }
    .btn-mm:hover:not(:disabled){ filter:brightness(1.1); }
    .btn-mm:disabled { opacity:.45; cursor:default; }
    .btn-mm.mas { border-color:var(--verde); }
    .btn-mm.menos { border-color:var(--acento); }

    .aviso { text-align:center; margin:16px 0 6px; font-weight:800; min-height:1.4em; }
    .aviso.ok { color:var(--verde); } .aviso.mal { color:var(--acento); }

    .acciones { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin:16px 0; }
    .stats { display:flex; justify-content:center; gap:22px; flex-wrap:wrap; margin:16px 0 4px; }
    .stat { text-align:center; }
    .stat .n { font-size:1.6rem; font-weight:800; }
    .stat .e { font-size:.72rem; color:var(--texto-tenue); text-transform:uppercase; letter-spacing:.03em; }

    .gameover { text-align:center; max-width:520px; margin:0 auto; }
    .gameover .marca { font-size:3rem; font-weight:800; margin:2px 0; }
    .gameover .frase { color:var(--texto-tenue); margin-bottom:10px; }
  </style>
</head>
<body>

  <header class="barra">
    <a class="logo" href="../"><span class="pelota">⚽</span> Cascarita</a>
    <span class="creced">Mayor o menor</span>
  </header>

  <main class="contenedor">
    <div class="encabezado"><h1>⚖️ Mayor o menor</h1></div>
    <div class="sub" id="sub">¿Quién metió más goles en la Liga MX? · Clausura 2025</div>

    <div class="modos">
      <button class="modo-btn" id="modoMx">⚽ Liga MX</button>
      <button class="modo-btn" id="modoGlobal">🌍 Global</button>
    </div>

    <div class="marcador" id="marcador"></div>
    <div id="zona"></div>
    <div class="aviso" id="aviso"></div>

    <div class="anuncio">Espacio para anuncio</div>
  </main>

  <footer class="pie">
    <a href="../">← Volver a Cascarita</a> · datos de ESPN · Clausura 2025
  </footer>

  <script src="../assets/hub.js"></script>
  <script src="../data/jugadores.js"></script>
  <script src="../data/jugadores_global.js"></script>
  <script>
  (function () {
    const SITIO = "cascaritas.com.mx";
    const DATA_MX = window.CASCARITA_DATA;
    const DATA_GL = window.CASCARITA_DATA_GLOBAL;
    const $ = id => document.getElementById(id);
    const hayGlobal = !!(DATA_GL && DATA_GL.jugadores && DATA_GL.jugadores.length > 300);

    // Dos modos con reto diario propio: Liga MX y las 5 grandes ligas
    const MODOS = {
      mx: {
        datos: DATA_MX, clave: "mayoromenor:", semilla: "mayoromenor",
        stats: "mayoromenor:stats", juego: "mayoromenor", titulo: "Mayor o menor",
        sub: "¿Quién metió más goles en la Liga MX? · Clausura 2025"
      },
      global: {
        datos: DATA_GL, clave: "mayoromenorg:", semilla: "mayoromenorg",
        stats: "mayoromenorg:stats", juego: "mayoromenorg", titulo: "Mayor o menor Global",
        sub: "¿Quién metió más goles en las 5 grandes ligas? · 2025-26"
      }
    };

    const nDia = Cascarita.numeroDia();
    let modo, CFG, POOL, SEQ, claveHoy, estado;
    let modoLibre = false;
    let bloqueado = false;

    function mezclaCon(a, rng) {
      a = a.slice();
      for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(rng() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
      return a;
    }
    function mezclaAzar(a) { return mezclaCon(a, Math.random); }

    // Carga pozo, secuencia diaria y estado del modo elegido
    function iniciarModo(m) {
      modo = m; CFG = MODOS[m];
      Cascarita.guardar("mayoromenor:modo", m);
      const JUG = (CFG.datos && CFG.datos.jugadores) ? CFG.datos.jugadores : [];
      // Pozo: goleadores (>=1 gol en la campaña). Números con señal, sin trivialidades de 0-0.
      POOL = JUG.filter(j => j.goles != null && j.goles >= 1);
      claveHoy = CFG.clave + Cascarita.fechaHoy();
      SEQ = mezclaCon(POOL, Cascarita.rngDelDia(CFG.semilla));
      estado = Cascarita.cargar(claveHoy, { aciertos: 0, terminado: false });
      modoLibre = false;
      bloqueado = false;
      $("sub").textContent = CFG.sub;
    }

    const actual = () => SEQ[estado.aciertos];
    const retador = () => SEQ[estado.aciertos + 1];

    const gEtiqueta = n => n === 1 ? "gol" : "goles";

    // ---- Estadísticas ----
    function statsDefault() { return { jugados: 0, record: 0, ultimoDia: null }; }
    function registrar(score) {
      const s = Cascarita.cargar(CFG.stats, statsDefault());
      if (s.ultimoDia === nDia) return;
      s.jugados++;
      if (score > s.record) s.record = score;
      s.ultimoDia = nDia;
      Cascarita.guardar(CFG.stats, s);
    }

    // ---- Compartir ----
    function textoCompartir(score) {
      const fuego = score >= 15 ? "🔥🔥" : (score >= 7 ? "🔥" : "");
      return `Cascarita ⚽ ${CFG.titulo} #${nDia}\nRacha de hoy: ${score} ${fuego}\n¿Le llegas a mi racha? 👇\n${SITIO}`.trim();
    }

    function tarjetaActual(j) {
      return `<div class="jcard">
                <div class="equipo">${j.equipo}</div>
                <div class="nombre">${j.nombre}</div>
                <div class="pos">${j.pos}</div>
                <div class="goles">${j.goles}<small>${gEtiqueta(j.goles)}</small></div>
              </div>`;
    }
    function tarjetaRetador(j, revelado) {
      const cuerpo = revelado
        ? `<div class="goles" id="golesRet">${j.goles}<small>${gEtiqueta(j.goles)}</small></div>`
        : `<div class="qmark">?</div>
           <div class="botones">
             <button class="btn-mm mas" id="btnMas">⬆ Más goles</button>
             <button class="btn-mm menos" id="btnMenos">⬇ Menos goles</button>
           </div>`;
      return `<div class="jcard">
                <div class="equipo">${j.equipo}</div>
                <div class="nombre">${j.nombre}</div>
                <div class="pos">${j.pos}</div>
                ${cuerpo}
              </div>`;
    }

    function pintarMarcador() {
      $("marcador").innerHTML = `Racha: <span>${estado.aciertos}</span>` + (modoLibre ? ' · <span style="color:var(--texto-tenue)">libre</span>' : '');
    }

    function pintarDuelo(revelado) {
      const c = actual(), r = retador();
      $("zona").innerHTML =
        `<div class="duelo">${tarjetaActual(c)}<div class="vs">VS</div>${tarjetaRetador(r, revelado)}</div>`;
      pintarMarcador();
      if (!revelado) {
        $("btnMas").addEventListener("click", () => responder("mas"));
        $("btnMenos").addEventListener("click", () => responder("menos"));
      }
    }

    function responder(guess) {
      if (bloqueado || estado.terminado) return;
      bloqueado = true;
      const c = actual(), r = retador();
      const acierto = guess === "mas" ? (r.goles >= c.goles) : (r.goles <= c.goles);

      // Revelar goles del retador con conteo animado
      $("btnMas").disabled = true; $("btnMenos").disabled = true;
      pintarDuelo(true);
      const destino = r.goles;
      const el = $("golesRet");
      let v = 0;
      el.innerHTML = `0<small>${gEtiqueta(0)}</small>`;
      const iv = setInterval(() => {
        v++;
        el.innerHTML = `${v}<small>${gEtiqueta(v)}</small>`;
        if (v >= destino) {
          clearInterval(iv);
          setTimeout(() => resolver(acierto), 650);
        }
      }, Math.min(90, 500 / Math.max(1, destino)));
      if (destino === 0) { // por si acaso (no debería pasar en el pozo de goleadores)
        el.innerHTML = `0<small>goles</small>`;
        setTimeout(() => resolver(acierto), 650);
      }
    }

    function resolver(acierto) {
      const av = $("aviso");
      if (acierto) {
        estado.aciertos++;
        if (!modoLibre) Cascarita.guardar(claveHoy, estado);
        av.textContent = "¡Correcto!"; av.className = "aviso ok";
        if (!retador()) { terminar(true); return; }
        setTimeout(() => { av.textContent = ""; bloqueado = false; pintarDuelo(false); }, 500);
      } else {
        estado.terminado = true;
        if (!modoLibre) Cascarita.guardar(claveHoy, estado);
        av.textContent = "¡Fallaste!"; av.className = "aviso mal";
        setTimeout(() => terminar(false), 700);
      }
    }

    function terminar(completado) {
      if (!modoLibre) {
        registrar(estado.aciertos);
        Cascarita.guardarResultado(CFG.juego, { fecha: Cascarita.fechaHoy(), dia: nDia, puntaje: estado.aciertos, gano: estado.aciertos >= 7 });
      }
      const s = Cascarita.cargar(CFG.stats, statsDefault());
      $("aviso").textContent = "";
      const frase = completado
        ? "¡Te acabaste a todos los goleadores! 🐐"
        : (estado.aciertos >= 15 ? "¡Crack! 🔥" : estado.aciertos >= 7 ? "¡Bien ahí! 💪" : "¡A seguir practicando! ⚽");
      const stats = modoLibre ? "" :
        `<div class="stats"><div class="stat"><div class="n">${s.record}</div><div class="e">Récord</div></div><div class="stat"><div class="n">${s.jugados}</div><div class="e">Días</div></div></div>`;
      const compartirBtn = modoLibre ? "" : '<button class="boton boton-primario" id="btnCompartir">📤 Compartir</button>';
      const pie = modoLibre ? "🔄 Modo libre · no cuenta para el ranking" : "Vuelve mañana por una secuencia nueva.";
      $("zona").innerHTML =
        `<div class="gameover">
           <div class="marca">${estado.aciertos}</div>
           <div class="frase">${estado.aciertos === 1 ? "acierto" : "aciertos"} · ${frase}</div>
           <div class="acciones">${compartirBtn}<button class="boton" id="btnLibre">🔄 ${modoLibre ? "Otra ronda" : "Seguir jugando"}</button></div>
           ${stats}
           <p style="color:var(--texto-tenue);font-size:.85rem">${pie}</p>
         </div>`;
      $("marcador").innerHTML = "";
      const bc = $("btnCompartir");
      if (bc) bc.addEventListener("click", () => {
        Cascarita.compartir(textoCompartir(estado.aciertos).replace(/\n?cascaritas\.com\.mx\s*$/, ""), location.origin + location.pathname);
      });
      $("btnLibre").addEventListener("click", nuevaRondaLibre);
    }

    function nuevaRondaLibre() {
      modoLibre = true;
      SEQ = mezclaAzar(POOL);
      estado = { aciertos: 0, terminado: false };
      bloqueado = false;
      $("aviso").textContent = ""; $("aviso").className = "aviso";
      pintarDuelo(false);
    }

    // ---- Selector de modo y arranque ----
    function pintarSelector() {
      $("modoMx").classList.toggle("on", modo === "mx");
      $("modoGlobal").classList.toggle("on", modo === "global");
    }
    function arrancarVista() {
      pintarSelector();
      $("aviso").textContent = ""; $("aviso").className = "aviso";
      if (POOL.length < 20) {
        $("zona").innerHTML = "<p style='text-align:center'>No se pudieron cargar los datos.</p>";
        $("marcador").innerHTML = "";
        return;
      }
      if (estado.terminado || !retador()) terminar(!retador());
      else pintarDuelo(false);
    }
    function cambiarModo(m) {
      if (m === modo || !MODOS[m].datos) return;
      iniciarModo(m);
      arrancarVista();
    }
    $("modoMx").addEventListener("click", () => cambiarModo("mx"));
    $("modoGlobal").addEventListener("click", () => cambiarModo("global"));
    if (!hayGlobal) $("modoGlobal").style.display = "none";

    const modoGuardado = Cascarita.cargar("mayoromenor:modo", "mx");
    iniciarModo(hayGlobal && modoGuardado === "global" ? "global" : "mx");
    arrancarVista();
  })();
  </script>
</body>
</html>
