<head>

  <link rel="stylesheet" href="../assets/hub.css">
  <style>
    .sub { text-align:center; color:var(--texto-tenue); margin:-14px 0 16px; font-size:.9rem; }
    .banner { max-width:560px; margin:0 auto 14px; padding:10px 14px; border-radius:10px;
      background:color-mix(in srgb, var(--amarillo) 18%, transparent); color:var(--texto);
      border:1px solid color-mix(in srgb, var(--amarillo) 45%, transparent); font-size:.85rem; text-align:center; }

    .picker { max-width:560px; margin:0 auto 14px; }
    .nav-fecha { display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:12px; }
    .nav-fecha button { padding:6px 12px; }
    .fecha-col { display:flex; flex-direction:column; align-items:center; gap:3px; min-width:172px; }
    .fecha-input { font-weight:800; text-align:center; padding:7px 10px; border-radius:9px;
      border:1px solid var(--borde); background:var(--bg-elev); color:var(--texto); color-scheme:dark;
      font-family:inherit; font-size:.95rem; cursor:pointer; width:100%; }
    .fecha-input:focus { outline:2px solid var(--verde); border-color:var(--verde); }
    .fecha-dia { font-size:.75rem; color:var(--texto-tenue); font-weight:700; text-transform:capitalize; }
    .partidos { display:grid; gap:8px; }
    .partido {
      display:flex; align-items:center; gap:10px; padding:11px 14px; border-radius:11px;
      background:var(--card); border:1px solid var(--borde); cursor:pointer; transition:border-color .12s;
    }
    .partido:hover { border-color:var(--verde); }
    .partido.no-lineup { opacity:.6; cursor:not-allowed; }
    .partido.sel { border-color:var(--verde); background:var(--card-hover); }
    .partido .equipos { font-weight:800; flex:1; }
    .partido .estado { font-size:.75rem; color:var(--texto-tenue); text-align:right; }

    /* Cancha */
    .cancha-wrap { max-width:460px; margin:14px auto 0; }
    .equipo-label { display:flex; justify-content:space-between; font-size:.8rem; font-weight:700; color:var(--texto-tenue); margin:4px 2px; }
    .cancha {
      position:relative; width:100%; aspect-ratio:68/104;
      background:repeating-linear-gradient(#178a43 0 8.6%, #159040 8.6% 17.2%);
      border:2px solid rgba(255,255,255,.45); border-radius:12px; overflow:hidden;
    }
    .linea-media { position:absolute; left:0; right:0; top:50%; height:2px; background:rgba(255,255,255,.45); }
    .circulo { position:absolute; left:50%; top:50%; width:24%; aspect-ratio:1; transform:translate(-50%,-50%);
      border:2px solid rgba(255,255,255,.45); border-radius:50%; }
    .area { position:absolute; left:24%; width:52%; height:12%; border:2px solid rgba(255,255,255,.4); }
    .area.arr { top:0; border-top:none; } .area.aba { bottom:0; border-bottom:none; }

    .chip { position:absolute; transform:translate(-50%,-50%); width:60px; text-align:center; cursor:pointer; z-index:2; }
    .chip .num { width:32px; height:32px; border-radius:50%; margin:0 auto; display:flex; align-items:center; justify-content:center;
      font-weight:800; font-size:.82rem; border:2px solid rgba(255,255,255,.9); }
    .chip.home .num { background:#18c964; color:#04150b; }
    .chip.away .num { background:#ff5252; color:#fff; }
    .chip.sel .num { outline:3px solid var(--amarillo); outline-offset:1px; }
    .chip .nm { font-size:.62rem; color:#fff; margin-top:2px; text-shadow:0 1px 3px #000, 0 0 2px #000;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    .hint { text-align:center; color:var(--texto-tenue); font-size:.8rem; margin:12px 0 0; }

    /* Comparación */
    .compara { max-width:520px; margin:16px auto 0; }
    .cabezas { display:grid; grid-template-columns:1fr auto 1fr; gap:8px; align-items:end; margin-bottom:6px; }
    .cabeza { text-align:center; } .cabeza .nom { font-size:1.05rem; font-weight:800; line-height:1.15; }
    .cabeza .eq { color:var(--texto-tenue); font-size:.78rem; font-weight:700; }
    .fila { display:grid; grid-template-columns:1fr auto 1fr; gap:8px; align-items:center; margin-bottom:6px; }
    .val { text-align:center; padding:11px 6px; border-radius:10px; background:var(--card); border:1px solid var(--borde); font-weight:800; }
    .val.gana { background:var(--verde); border-color:var(--verde); color:#04150b; }
    .etq { text-align:center; color:var(--texto-tenue); font-size:.72rem; font-weight:700; text-transform:uppercase; min-width:74px; }
    .acciones { display:flex; justify-content:center; margin:12px 0; }

    .cargando, .aviso-cancha { text-align:center; color:var(--texto-tenue); padding:20px; }
  </style>
</head>
<body>

  <header class="barra">
    <a class="logo" href="../"><span class="pelota">⚽</span> Cascarita</a>
    <span class="creced">Cancha</span>
  </header>

  <main class="contenedor">
    <div class="encabezado"><h1>🟩 Cancha</h1></div>
    <div class="sub">Las alineaciones de la jornada · toca 2 jugadores para compararlos</div>

    <div id="banner"></div>

    <div class="picker">
      <div class="nav-fecha">
        <button class="boton" id="prev" aria-label="Día anterior">◀</button>
        <div class="fecha-col">
          <input type="date" id="fechaInput" class="fecha-input" aria-label="Elegir fecha">
          <div class="fecha-dia" id="fechaLbl">—</div>
        </div>
        <button class="boton" id="next" aria-label="Día siguiente">▶</button>
      </div>
      <div class="partidos" id="partidos"></div>
    </div>

    <div id="cancha"></div>
    <div id="compara"></div>

    <div class="anuncio">Espacio para anuncio</div>
  </main>

  <footer class="pie">
    <a href="../">← Volver a Cascarita</a> · datos de ESPN en vivo
  </footer>

  <script src="../assets/hub.js"></script>
  <script src="../data/jugadores.js"></script>
  <script>
  (function () {
    const LIGA = "mex.1";
    const SB = f => `https://site.api.espn.com/apis/site/v2/sports/soccer/${LIGA}/scoreboard?dates=${f}`;
    const SUM = id => `https://site.api.espn.com/apis/site/v2/sports/soccer/${LIGA}/summary?event=${id}`;

    const D = window.CASCARITA_DATA;
    const DIC = {};
    ((D && D.jugadores) || []).forEach(j => DIC[String(j.id)] = j);
    const paisES = Cascarita.paisES, bandera = Cascarita.bandera;
    const $ = id => document.getElementById(id);

    let fecha = new Date();
    let seleccion = []; // jugadores seleccionados para comparar (máx 2)
    let eventoActivo = null;

    const fmt = d => `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}`;
    const fmtLbl = d => d.toLocaleDateString("es-MX", { weekday:"short", day:"numeric", month:"short" });
    const fmtInput = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;

    async function fetchJson(url) {
      const r = await fetch(url);
      if (!r.ok) throw new Error("HTTP " + r.status);
      return r.json();
    }

    // ---- Selector de partidos ----
    async function cargarFecha(auto) {
      $("fechaLbl").textContent = fmtLbl(fecha);
      $("fechaInput").value = fmtInput(fecha);
      $("partidos").innerHTML = `<div class="cargando">Cargando partidos…</div>`;
      $("cancha").innerHTML = ""; $("compara").innerHTML = ""; seleccion = [];
      let sb;
      try { sb = await fetchJson(SB(fmt(fecha))); }
      catch (e) { $("partidos").innerHTML = `<div class="aviso-cancha">No se pudo conectar con ESPN.<br>(Si abriste el archivo local, prueba de nuevo o despliega el sitio.)</div>`; return; }

      const eventos = sb.events || [];
      const hayLineups = eventos.some(e => ["in","post"].includes(e.status?.type?.state));

      // La fecha por defecto es HOY. Si hoy no hay jornada en curso, lo avisamos
      // pero NO cambiamos la fecha: el usuario navega con el calendario o las flechas.
      if (auto && !hayLineups) {
        $("banner").innerHTML = `<div class="banner">Hoy no hay jornada de Liga MX en curso. Usa el <b>calendario 📅</b> o las flechas ◀ ▶ para ir a una jornada con alineaciones (por ejemplo, una fecha pasada o el próximo fin de semana).</div>`;
      } else if (!auto) {
        $("banner").innerHTML = "";
      }

      if (!eventos.length) { $("partidos").innerHTML = `<div class="aviso-cancha">No hay partidos este día. Usa el calendario 📅 o ◀ ▶ para cambiar de fecha.</div>`; return; }

      $("partidos").innerHTML = "";
      eventos.forEach(ev => {
        const comp = ev.competitions[0];
        const home = comp.competitors.find(c => c.homeAway === "home") || comp.competitors[0];
        const away = comp.competitors.find(c => c.homeAway === "away") || comp.competitors[1];
        const estado = ev.status?.type?.state;
        const conLineup = ["in","post"].includes(estado);
        const marcador = conLineup ? `${home.score ?? ""}–${away.score ?? ""}` : (ev.status?.type?.shortDetail || "");
        const div = document.createElement("div");
        div.className = "partido" + (conLineup ? "" : " no-lineup");
        div.innerHTML = `<div class="equipos">${home.team.abbreviation} <span style="color:var(--texto-tenue)">vs</span> ${away.team.abbreviation}</div>
                         <div class="estado">${conLineup ? marcador : "alineación no disp."}</div>`;
        if (conLineup) div.addEventListener("click", () => elegirPartido(ev.id, div));
        $("partidos").appendChild(div);
      });
    }

    // ---- Cargar alineaciones de un partido ----
    async function elegirPartido(eventId, card) {
      [...$("partidos").children].forEach(c => c.classList.remove("sel"));
      if (card) card.classList.add("sel");
      seleccion = []; $("compara").innerHTML = "";
      $("cancha").innerHTML = `<div class="cargando">Cargando alineaciones…</div>`;
      let s;
      try { s = await fetchJson(SUM(eventId)); }
      catch (e) { $("cancha").innerHTML = `<div class="aviso-cancha">No se pudieron cargar las alineaciones.</div>`; return; }

      const rosters = s.rosters || [];
      if (rosters.length < 2 || !rosters[0].roster?.some(r => r.starter)) {
        $("cancha").innerHTML = `<div class="aviso-cancha">Este partido aún no tiene alineaciones publicadas.</div>`; return;
      }
      const rHome = rosters.find(r => r.homeAway === "home") || rosters[0];
      const rAway = rosters.find(r => r.homeAway === "away") || rosters[1];
      eventoActivo = { home: mapEquipo(rHome), away: mapEquipo(rAway) };
      pintarCancha();
    }

    function mapEquipo(r) {
      const jugadores = (r.roster || []).map(p => ({
        id: String(p.athlete?.id),
        nombre: p.athlete?.displayName || "",
        dorsal: p.jersey,
        pos: (p.position?.abbreviation || "").toUpperCase(),
        starter: !!p.starter
      }));
      return { abbr: r.team?.abbreviation || "", nombre: r.team?.displayName || "", formacion: r.formation || "", jugadores };
    }

    // ---- Colocación por formación ----
    function grupo(pos) {
      if (pos === "G" || pos.startsWith("GK")) return "POR";
      if (/^(D|CB|CD|LB|RB|WB|LWB|RWB|SW|FB)/.test(pos)) return "DEF";
      if (/^(DM|CDM)/.test(pos)) return "MED";
      if (/^(AM|CAM)/.test(pos)) return "MED";
      if (/^(M|CM|LM|RM)/.test(pos)) return "MED";
      return "DEL";
    }
    function depth(pos) {
      const g = grupo(pos);
      if (g === "DEF") return 1;
      if (/^(DM|CDM)/.test(pos)) return 2;
      if (/^(AM|CAM)/.test(pos)) return 4;
      if (g === "MED") return 3;
      return 5;
    }
    function lateral(pos) {
      if (pos.includes("-L") || /^(L)/.test(pos)) return -1;
      if (pos.includes("-R") || /^(R)/.test(pos)) return 1;
      return 0;
    }
    function construirFilas(equipo) {
      const starters = equipo.jugadores.filter(j => j.starter);
      const gk = starters.find(j => grupo(j.pos) === "POR") || starters[0];
      const out = starters.filter(j => j !== gk);
      let nums = (equipo.formacion || "").split("-").map(n => parseInt(n)).filter(n => n > 0);
      const orden = out.slice().sort((a, b) => depth(a.pos) - depth(b.pos) || (a.dorsal||99) - (b.dorsal||99));
      let filas = [];
      if (nums.length && nums.reduce((a, b) => a + b, 0) === out.length) {
        let i = 0; for (const n of nums) { filas.push(orden.slice(i, i + n)); i += n; }
      } else {
        const g = t => orden.filter(j => grupo(j.pos) === t);
        filas = [g("DEF"), g("MED"), g("DEL")].filter(f => f.length);
      }
      filas.forEach(f => f.sort((a, b) => lateral(a.pos) - lateral(b.pos) || (a.dorsal||99) - (b.dorsal||99)));
      return { gk, filas };
    }

    function corto(nombre) { const p = nombre.trim().split(/\s+/); return p.length > 1 ? p[p.length - 1] : nombre; }

    function chipsEquipo(equipo, lado) {
      const { gk, filas } = construirFilas(equipo);
      const R = filas.length;
      const chips = [];
      const yGK = lado === "home" ? 93 : 7;
      const yBack = lado === "home" ? 79 : 21;
      const yFront = lado === "home" ? 55 : 45;
      const colocar = (j, x, y) => {
        chips.push(`<div class="chip ${lado}" data-id="${j.id}" style="left:${x}%;top:${y}%">
                      <div class="num">${j.dorsal ?? ""}</div><div class="nm">${corto(j.nombre)}</div></div>`);
      };
      colocar(gk, 50, yGK);
      filas.forEach((fila, r) => {
        const y = R > 1 ? yBack + (yFront - yBack) * (r / (R - 1)) : (yBack + yFront) / 2;
        fila.forEach((j, i) => colocar(j, (i + 1) * 100 / (fila.length + 1), y));
      });
      return chips.join("");
    }

    function pintarCancha() {
      const { home, away } = eventoActivo;
      $("cancha").innerHTML =
        `<div class="cancha-wrap">
           <div class="equipo-label"><span style="color:#ff8a8a">🔴 ${away.abbr} · ${away.formacion || "?"}</span></div>
           <div class="cancha">
             <div class="linea-media"></div><div class="circulo"></div>
             <div class="area arr"></div><div class="area aba"></div>
             ${chipsEquipo(away, "away")}
             ${chipsEquipo(home, "home")}
           </div>
           <div class="equipo-label"><span style="color:#7dffb0">🟢 ${home.abbr} · ${home.formacion || "?"}</span></div>
           <div class="hint">Toca dos jugadores para compararlos. (Posiciones aproximadas por formación.)</div>
         </div>`;
      $("cancha").querySelectorAll(".chip").forEach(ch => {
        ch.addEventListener("click", () => togglear(ch.dataset.id));
      });
      pintarSeleccion();
    }

    // ---- Selección y comparación ----
    function jugadorPorId(id) {
      const t = [eventoActivo.home, eventoActivo.away];
      for (const eq of t) { const j = eq.jugadores.find(x => x.id === id); if (j) return { ...j, equipoAbbr: eq.abbr }; }
      return null;
    }
    function togglear(id) {
      const i = seleccion.findIndex(s => s.id === id);
      if (i >= 0) seleccion.splice(i, 1);
      else { if (seleccion.length >= 2) seleccion.shift(); seleccion.push(jugadorPorId(id)); }
      pintarSeleccion();
    }
    function pintarSeleccion() {
      const ids = seleccion.map(s => s.id);
      $("cancha").querySelectorAll(".chip").forEach(ch => ch.classList.toggle("sel", ids.includes(ch.dataset.id)));
      if (seleccion.length === 2) pintarCompara(); else $("compara").innerHTML = "";
    }

    function gpp(st) { return (st && st.partidos > 0 && st.goles != null) ? st.goles / st.partidos : null; }
    function pintarCompara() {
      const [A, B] = seleccion;
      const sa = DIC[A.id], sb = DIC[B.id];
      const celda = (v, gana) => `<div class="val ${gana ? "gana" : ""}">${v}</div>`;
      const filaNum = (etq, va, vb, fmt) => {
        const f = fmt || (x => x);
        const ta = va == null ? "—" : f(va), tb = vb == null ? "—" : f(vb);
        return `<div class="fila">${celda(ta, va != null && vb != null && va > vb)}<div class="etq">${etq}</div>${celda(tb, va != null && vb != null && vb > va)}</div>`;
      };
      const filaTxt = (etq, ta, tb) => `<div class="fila">${celda(ta)}<div class="etq">${etq}</div>${celda(tb)}</div>`;
      const gA = gpp(sa), gB = gpp(sb);
      const nota = (!sa || !sb) ? `<div class="hint">Los números son de la temporada 2025 (Clausura). "—" = jugador sin datos de esa campaña.</div>` : "";
      $("compara").innerHTML =
        `<div class="compara">
           <div class="cabezas">
             <div class="cabeza"><div class="nom">${corto(A.nombre)}</div><div class="eq">${A.equipoAbbr} · ${A.pos}</div></div>
             <div class="etq">vs</div>
             <div class="cabeza"><div class="nom">${corto(B.nombre)}</div><div class="eq">${B.equipoAbbr} · ${B.pos}</div></div>
           </div>
           ${filaNum("⚽ Goles", sa?.goles, sb?.goles)}
           ${filaNum("🏟️ Partidos", sa?.partidos, sb?.partidos)}
           ${filaNum("🎯 Goles/partido", gA, gB, x => x.toFixed(2))}
           ${filaNum("🎂 Edad", sa?.edad, sb?.edad)}
           ${filaTxt("🌎 País", sa ? bandera(sa.nac) + paisES(sa.nac) : "—", sb ? bandera(sb.nac) + paisES(sb.nac) : "—")}
           <div class="acciones"><button class="boton" id="limpiar">Limpiar selección</button></div>
           ${nota}
         </div>`;
      $("limpiar").addEventListener("click", () => { seleccion = []; pintarSeleccion(); });
    }

    // ---- Navegación ----
    $("prev").addEventListener("click", () => { fecha.setDate(fecha.getDate() - 1); cargarFecha(false); });
    $("next").addEventListener("click", () => { fecha.setDate(fecha.getDate() + 1); cargarFecha(false); });
    $("fechaInput").addEventListener("change", e => {
      const v = e.target.value; if (!v) return;
      const [y, m, d] = v.split("-").map(Number);
      fecha = new Date(y, m - 1, d, 12, 0, 0);
      cargarFecha(false);
    });

    cargarFecha(true);
  })();
  </script>
</body>
