<!doctype html>
<html lang="es-MX">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2452147421495188" crossorigin="anonymous"></script>
  <title>Maneja y escucha — radio de tu ciudad | Cascarita</title>
  <meta name="description" content="Ponte la radio en vivo de tu ciudad mexicana con vibra de carretera, y deja tus comentarios.">
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/assets/icon-180.png">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Cascarita">
  <meta property="og:title" content="Maneja y escucha — radio de tu ciudad">
  <meta property="og:description" content="La radio en vivo de tu ciudad mexicana con vibra de carretera.">
  <meta property="og:image" content="https://cascaritas.com.mx/assets/og.png">
  <meta property="og:url" content="https://cascaritas.com.mx/maneja/">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Maneja y escucha — radio de tu ciudad">
  <meta name="twitter:image" content="https://cascaritas.com.mx/assets/og.png">
  <link rel="stylesheet" href="../assets/hub.css">
  <style>
    /* Encabezado compacto para que el video suba y ocupe mas pantalla */
    .contenedor { padding-top:10px; }
    .encabezado { margin:6px 0 8px; }
    .encabezado h1 { font-size:1.45rem; }
    .sub { text-align:center; color:var(--texto-tenue); margin:2px 0 10px; font-size:.9rem; }
    .ciudades { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; max-width:640px; margin:0 auto 10px; }
    .ciudad { padding:8px 14px; border-radius:999px; border:1px solid var(--borde); background:var(--card); color:var(--texto); font-weight:700; font-size:.88rem; cursor:pointer; }
    .ciudad.sel { background:var(--verde); border-color:var(--verde); color:#04150b; }

    html, body { overflow-x:hidden; }
    /* Escena a lo ancho de la pantalla (full-bleed) */
    .escena { position:relative; width:100vw; margin-left:calc(50% - 50vw); margin-bottom:14px; }
    .carretera { position:relative; height:clamp(340px, 76vh, 900px); overflow:hidden;
      display:flex; align-items:center; justify-content:center;
      background:radial-gradient(130% 90% at 50% 0%, #24303f 0%, #0b0f14 70%); }
    .carretera iframe { width:100%; height:100%; border:0; }
    /* Fondo borroso que llena la pantalla (misma toma, desenfocada) */
    .v-blur { position:absolute; inset:0; width:100%; height:100%; object-fit:cover;
      filter:blur(26px) brightness(.5); transform:scale(1.12); z-index:0; }
    /* Marco del tamano real del video: se ve COMPLETO, sin recorte */
    .v-marco { position:relative; z-index:2; max-width:100%; max-height:100%; overflow:hidden;
      box-shadow:0 10px 45px rgba(0,0,0,.55); }
    .v-real { display:block; width:100%; height:100%; object-fit:cover; background:#05070a; }
    .credito { position:absolute; bottom:76px; right:16px; background:rgba(0,0,0,.55); color:#fff; font-size:.74rem; font-weight:700; padding:4px 10px; border-radius:999px; z-index:4; }
    .linea { position:absolute; left:50%; top:-10%; bottom:-10%; width:10px; transform:translateX(-50%);
      background:repeating-linear-gradient(#f5c518 0 26px, transparent 26px 54px);
      animation:mover .55s linear infinite; opacity:.9; box-shadow:0 0 12px rgba(245,197,24,.4); }
    .borde-via { position:absolute; bottom:0; height:78%; width:3px; background:rgba(255,255,255,.35); }
    .borde-via.izq { left:26%; transform:skewX(20deg); transform-origin:bottom; }
    .borde-via.der { right:26%; transform:skewX(-20deg); transform-origin:bottom; }
    @keyframes mover { to { background-position-y:54px; } }
    .rotulo { position:absolute; top:16px; left:0; right:0; text-align:center; color:#fff; font-weight:800; text-shadow:0 2px 10px #000; font-size:1.25rem; z-index:3; }

    /* Barra de radio flotante sobre el video */
    .radio-bar { position:absolute; left:50%; bottom:16px; transform:translateX(-50%); z-index:5;
      display:flex; align-items:center; gap:9px; width:max-content; max-width:min(560px, 94vw);
      background:rgba(10,14,20,.55); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,.16); border-radius:999px; padding:8px 12px; box-shadow:0 8px 30px rgba(0,0,0,.4); }
    .btn-play { width:46px; height:46px; border-radius:50%; border:none; background:var(--verde); color:#04150b; font-size:1.15rem; cursor:pointer; flex:none; }
    .btn-play.sonando { background:var(--acento); color:#fff; }
    .btn-nav { width:40px; height:40px; border-radius:50%; border:none; background:rgba(255,255,255,.14); color:#fff; font-size:1rem; cursor:pointer; flex:none; }
    .btn-nav:hover { background:rgba(255,255,255,.28); }
    .radio-bar select { flex:1; min-width:0; max-width:210px; padding:9px 12px; border-radius:999px; border:1px solid rgba(255,255,255,.2); background:rgba(0,0,0,.4); color:#fff; font-weight:700; }
    .radio-bar input[type=range] { width:80px; flex:none; }
    .radio-estado { text-align:center; color:var(--texto-tenue); font-size:.82rem; margin-top:2px; min-height:1.1em; }
    @media (max-width:520px){
      .radio-bar input[type=range] { display:none; }
      .radio-bar { gap:7px; padding:7px 10px; }
      .rotulo { font-size:1.05rem; }
    }

    /* Comentarios */
    .coment { max-width:640px; margin:22px auto 0; }
    .coment h2 { font-size:1.1rem; margin:0 0 10px; }
    .c-form { display:flex; gap:8px; margin-bottom:12px; }
    .c-form textarea { flex:1; padding:10px 12px; border-radius:10px; border:1px solid var(--borde); background:var(--card); color:var(--texto); resize:vertical; min-height:44px; font-family:inherit; }
    .c-login { background:var(--card); border:1px solid var(--borde); border-radius:10px; padding:12px 14px; color:var(--texto-tenue); text-align:center; margin-bottom:12px; font-size:.9rem; }
    .c-lista { display:flex; flex-direction:column; gap:10px; }
    .c-item { display:flex; gap:10px; }
    .c-item img, .c-ini { width:32px; height:32px; border-radius:50%; flex:none; }
    .c-ini { background:var(--verde); color:#04150b; display:flex; align-items:center; justify-content:center; font-weight:800; }
    .c-cuerpo { background:var(--card); border:1px solid var(--borde); border-radius:12px; padding:8px 12px; flex:1; }
    .c-nom { font-weight:700; font-size:.85rem; }
    .c-txt { font-size:.92rem; margin-top:2px; overflow-wrap:anywhere; }
    .c-vacio { color:var(--texto-tenue); text-align:center; padding:14px; }
  </style>
</head>
<body>
  <header class="barra">
    <a class="logo" href="../"><span class="pelota">⚽</span> Cascarita</a>
    <span class="creced">Maneja y escucha</span>
  </header>

  <main class="contenedor">
    <div class="encabezado"><h1>🚗 Maneja y escucha</h1></div>
    <div class="sub">La radio en vivo de tu ciudad, con vibra de carretera · o pon el modo 🎧 Lo-Fi</div>

    <div class="ciudades" id="ciudades"></div>

    <div class="escena">
      <div class="carretera" id="carretera">
        <div class="linea"></div>
        <div class="borde-via izq"></div>
        <div class="borde-via der"></div>
        <div class="rotulo" id="rotulo">Elige una ciudad</div>
      </div>
      <div class="radio-bar">
        <button class="btn-nav" id="btnPrev" title="Estación anterior">⏮</button>
        <button class="btn-play" id="btnPlay" title="Reproducir">▶</button>
        <button class="btn-nav" id="btnNext" title="Estación siguiente">⏭</button>
        <select id="estaciones"><option>—</option></select>
        <input type="range" id="vol" min="0" max="1" step="0.05" value="0.8" title="Volumen">
      </div>
    </div>
    <div class="radio-estado" id="radioEstado"></div>

    <div class="anuncio">Espacio para anuncio</div>

    <div class="coment">
      <h2>💬 Comentarios</h2>
      <div id="cZona"></div>
      <div class="c-lista" id="cLista"></div>
    </div>
  </main>

  <footer class="pie">
    <a href="../">← Volver a Cascarita</a> · radio de radio-browser.info
  </footer>

  <audio id="audio"></audio>
  <script src="../assets/hub.js"></script>
  <script>
  (function () {
    const $ = id => document.getElementById(id);
    const api = (p, o) => fetch(p, Object.assign({ credentials: "same-origin" }, o)).then(r => r.json());
    const apiPost = (p, b) => api(p, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(b || {}) });

    // Config de ciudades. youtube: pega un ID de video de manejo embebible para reemplazar el fondo.
    const CIUDADES = [
      { key: "cdmx", nombre: "CDMX", estado: "Ciudad de México", video: "/videos/cdmx.mp4", credito: "C´est la Vue 💋🫵" },
      { key: "gdl", nombre: "Guadalajara", estado: "Jalisco", youtube: "" },
      { key: "mty", nombre: "Monterrey", estado: "Nuevo León", youtube: "" },
      { key: "pue", nombre: "Puebla", estado: "Puebla", youtube: "" },
      { key: "tij", nombre: "Tijuana", estado: "Baja California", youtube: "" },
      { key: "mid", nombre: "Mérida", estado: "Yucatán", youtube: "" },
      { key: "lofi", nombre: "🎧 Lo-Fi", lofi: true }
    ];
    const RB = ["https://de1.api.radio-browser.info", "https://nl1.api.radio-browser.info", "https://at1.api.radio-browser.info"];
    const audio = $("audio");
    let ciudad = null;
    let videoActual = null;

    // El video se ve COMPLETO (sin recorte) y llena toda la pantalla: el marco
    // real conserva la proporcion del video y los lados se rellenan con la copia
    // borrosa. Todo cabe sin scroll.
    function ajustarAltura() {
      const cont = $("carretera");
      const topDoc = cont.getBoundingClientRect().top + window.scrollY;
      const disponible = window.innerHeight - topDoc - 8;
      const altoCont = Math.max(Math.round(disponible), 300);
      cont.style.height = altoCont + "px";
      const marco = $("vMarco");
      if (marco && videoActual && videoActual.videoWidth) {
        const ratio = videoActual.videoHeight / videoActual.videoWidth;
        const availW = cont.clientWidth;
        let w = availW, h = availW * ratio;
        if (h > altoCont) { h = altoCont; w = altoCont / ratio; }
        marco.style.width = Math.round(w) + "px";
        marco.style.height = Math.round(h) + "px";
      }
    }
    window.addEventListener("resize", () => { if (videoActual) ajustarAltura(); });

    async function rbFetch(path) {
      for (const s of RB) { try { const r = await fetch(s + path, { signal: AbortSignal.timeout(6000) }); if (r.ok) return await r.json(); } catch (e) {} }
      return [];
    }

    // ---- Ciudades ----
    function pintarCiudades() {
      $("ciudades").innerHTML = "";
      CIUDADES.forEach(c => {
        const b = document.createElement("button");
        b.className = "ciudad" + (ciudad && ciudad.key === c.key ? " sel" : "");
        b.textContent = c.nombre;
        b.addEventListener("click", () => elegirCiudad(c));
        $("ciudades").appendChild(b);
      });
    }

    async function elegirCiudad(c) {
      ciudad = c;
      pintarCiudades();
      cargarComentarios(); // temprano: no depende de que cargue la radio
      // Fondo: video de YouTube si hay, si no la carretera animada
      const cont = $("carretera");
      const rotulo = c.lofi
        ? `<div class="rotulo">Modo Lo-Fi 🎧 · puro beat y carretera</div>`
        : `<div class="rotulo">Manejando por ${c.nombre}</div>`;
      const credito = c.credito ? `<div class="credito">🎥 ${escapar(c.credito)}</div>` : "";
      const road = '<div class="linea"></div><div class="borde-via izq"></div><div class="borde-via der"></div>';
      if (c.video) {
        // Reproductor propio (no depende de YouTube). El video se ve completo y
        // una copia borrosa rellena los lados. Si no carga, cae a la carretera.
        cont.innerHTML =
          `<video class="v-blur" src="${c.video}" autoplay muted loop playsinline preload="auto" aria-hidden="true"></video>
           <div class="v-marco" id="vMarco">
             <video class="v-real" src="${c.video}" autoplay muted loop playsinline preload="auto"></video>
             ${credito}${rotulo}
           </div>`;
        const v = cont.querySelector(".v-real");
        videoActual = v;
        ajustarAltura();
        v.addEventListener("loadedmetadata", ajustarAltura);
        v.addEventListener("error", () => { videoActual = null; cont.style.height = ""; cont.innerHTML = road + rotulo; });
      } else if (c.youtube) {
        videoActual = null; cont.style.height = "";
        cont.innerHTML = `<iframe src="https://www.youtube.com/embed/${c.youtube}?autoplay=1&mute=1&controls=0&loop=1&playlist=${c.youtube}&modestbranding=1&rel=0" allow="autoplay" allowfullscreen></iframe>${credito}${rotulo}`;
      } else {
        videoActual = null; cont.style.height = "";
        cont.innerHTML = road + rotulo;
      }
      // Radio
      $("radioEstado").textContent = "Buscando estaciones…";
      let est;
      if (c.lofi) {
        est = await rbFetch("/json/stations/search?tag=lofi&hidebroken=true&order=clickcount&reverse=true&limit=40");
        if (!est.length) est = await rbFetch("/json/stations/search?tag=chillout&hidebroken=true&order=clickcount&reverse=true&limit=40");
        if (!est.length) est = await rbFetch("/json/stations/search?tag=lounge&hidebroken=true&order=clickcount&reverse=true&limit=40");
      } else {
        est = await rbFetch("/json/stations/search?countrycode=MX&state=" + encodeURIComponent(c.estado) + "&hidebroken=true&order=clickcount&reverse=true&limit=30");
        if (!est.length) est = await rbFetch("/json/stations/search?countrycode=MX&hidebroken=true&order=clickcount&reverse=true&limit=30");
      }
      const vistos = new Set();
      const lista = est.filter(s => s.url_resolved && s.name && !vistos.has(s.name) && vistos.add(s.name)).slice(0, 20);
      const sel = $("estaciones");
      sel.innerHTML = lista.map((s, i) => `<option value="${s.url_resolved}">${s.name.trim().slice(0, 40)}</option>`).join("") || "<option>Sin estaciones</option>";
      $("radioEstado").textContent = lista.length ? "Dale ▶ para escuchar" : "No se encontraron estaciones ahora.";
    }

    // ---- Radio ----
    function hayEstaciones() {
      const v = $("estaciones").value;
      return !!v && v !== "—" && v !== "Sin estaciones";
    }
    function reproducirActual() {
      const url = $("estaciones").value;
      if (!url || url === "—" || url === "Sin estaciones") return;
      if (audio.src !== url) audio.src = url;
      audio.play().catch(() => { $("radioEstado").textContent = "No se pudo reproducir esta estación, prueba otra."; });
    }
    function cambiarEstacion(delta) {
      const sel = $("estaciones");
      const n = sel.options.length;
      if (!hayEstaciones() || n < 2) return;
      let i = sel.selectedIndex + delta;
      if (i < 0) i = n - 1;
      if (i >= n) i = 0;
      sel.selectedIndex = i;
      $("radioEstado").textContent = "Cambiando de estación…";
      reproducirActual();
    }
    $("btnPlay").addEventListener("click", () => {
      if (!hayEstaciones()) return;
      if (!audio.paused && audio.src) { audio.pause(); return; }
      reproducirActual();
    });
    $("btnPrev").addEventListener("click", () => cambiarEstacion(-1));
    $("btnNext").addEventListener("click", () => cambiarEstacion(1));
    $("estaciones").addEventListener("change", reproducirActual);
    $("vol").addEventListener("input", e => { audio.volume = parseFloat(e.target.value); });
    audio.volume = 0.8;
    audio.addEventListener("playing", () => { $("btnPlay").textContent = "⏸"; $("btnPlay").classList.add("sonando"); $("radioEstado").textContent = "🔊 En vivo"; });
    audio.addEventListener("pause", () => { $("btnPlay").textContent = "▶"; $("btnPlay").classList.remove("sonando"); });

    // ---- Comentarios ----
    const seccion = () => "maneja:" + (ciudad ? ciudad.key : "gen");
    let logueado = false;
    Cascarita.alCambiarSesion(u => { logueado = !!u; pintarFormComentario(); });

    function pintarFormComentario() {
      if (logueado) {
        $("cZona").innerHTML =
          `<div class="c-form"><textarea id="cTexto" maxlength="500" placeholder="Escribe un comentario…"></textarea>
           <button class="boton boton-primario" id="cEnviar">Enviar</button></div>`;
        $("cEnviar").addEventListener("click", enviarComentario);
      } else {
        $("cZona").innerHTML = `<div class="c-login">Entra con Google o Facebook (arriba a la derecha) para dejar un comentario.</div>`;
      }
    }
    async function enviarComentario() {
      const t = $("cTexto").value.trim();
      if (!t) return;
      const r = await apiPost("/api/comentario", { seccion: seccion(), texto: t });
      if (r && r.ok) { $("cTexto").value = ""; cargarComentarios(); }
      else alert(r && r.error ? r.error : "No se pudo publicar.");
    }
    async function cargarComentarios() {
      if (!ciudad) { $("cLista").innerHTML = ""; return; }
      const r = await api("/api/comentarios/" + encodeURIComponent(seccion()));
      const cs = (r && r.comentarios) || [];
      if (!cs.length) { $("cLista").innerHTML = `<div class="c-vacio">Sé el primero en comentar sobre ${ciudad.nombre}.</div>`; return; }
      $("cLista").innerHTML = cs.map(c =>
        `<div class="c-item">` +
        (c.avatar ? `<img src="${c.avatar}" referrerpolicy="no-referrer" alt="">` : `<span class="c-ini">${(c.nombre || "?").charAt(0)}</span>`) +
        `<div class="c-cuerpo"><div class="c-nom">${escapar(c.nombre || "Jugador")}</div><div class="c-txt">${escapar(c.texto)}</div></div></div>`
      ).join("");
    }
    function escapar(s) { return String(s).replace(/[&<>"']/g, m => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[m])); }

    // ---- Arranque ----
    pintarCiudades();
    pintarFormComentario();
    elegirCiudad(CIUDADES[0]);
  })();
  </script>
</body>
</html>
