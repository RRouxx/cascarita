  <link rel="stylesheet" href="../assets/hub.css">
  <style>
    .sub { text-align:center; color:var(--texto-tenue); margin:-14px 0 14px; font-size:.9rem; }
    .caja { max-width:560px; margin:0 auto; }

    /* ---- salón de la fama ---- */
    .salon-card { background:var(--card); border:1px solid var(--borde); border-left:4px solid var(--amarillo); border-radius:14px; padding:12px 14px; margin-bottom:16px; display:flex; align-items:center; gap:14px; }
    .salon-ovr { background:var(--amarillo); color:#150f00; font-weight:900; font-size:1.7rem; border-radius:12px; padding:6px 16px; flex:none; }
    .salon-txt .cab { font-size:.68rem; color:var(--texto-tenue); text-transform:uppercase; letter-spacing:.05em; font-weight:800; }
    .salon-txt .ver { font-weight:800; margin:1px 0; }
    .salon-txt .sub { font-size:.78rem; color:var(--texto-tenue); }
    .record-nuevo { background:var(--amarillo); color:#150f00; font-weight:850; border-radius:999px; padding:6px 16px; display:inline-block; margin:8px 0; animation:pop .5s ease; }
    .record-sub { color:var(--texto-tenue); font-size:.85rem; margin:6px 0; }

    /* ---- setup ---- */
    .paso-titulo { text-align:center; font-weight:800; margin:18px 0 10px; }
    .fila-pos { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:18px; }
    .pos-btn {
      background:var(--card); border:1px solid var(--borde); border-radius:12px; padding:14px 6px;
      text-align:center; cursor:pointer; font-weight:800; color:var(--texto);
      transition:transform .1s ease, border-color .12s ease;
    }
    .pos-btn:hover { border-color:var(--verde); }
    .pos-btn.sel { border-color:var(--verde); background:var(--card-hover); transform:scale(.97); }
    .pos-btn .em { font-size:1.6rem; display:block; margin-bottom:4px; }
    input#nombreJugador {
      width:100%; box-sizing:border-box; padding:12px 14px; border-radius:12px; border:1px solid var(--borde);
      background:var(--card); color:var(--texto); font-size:1rem; margin-bottom:14px; text-align:center;
    }
    .btn-grande {
      display:block; width:100%; padding:14px; border-radius:12px; border:0; background:var(--verde);
      color:#04140b; font-weight:800; font-size:1rem; cursor:pointer; margin-top:6px;
    }
    .btn-grande:disabled { opacity:.4; cursor:default; }
    .btn-grande:hover:not(:disabled) { background:var(--verde-hov); }

    /* ---- juego ---- */
    #pantalla-juego { display:none; }
    .barra-edad {
      display:flex; justify-content:space-between; align-items:center; background:var(--card);
      border:1px solid var(--borde); border-radius:12px; padding:10px 14px; margin-bottom:6px; font-size:.85rem;
    }
    .barra-edad b { font-size:1.05rem; }
    .barra-edad .club-actual { display:flex; align-items:center; gap:6px; }
    .barra-edad .club-actual img { width:24px; height:24px; object-fit:contain; }
    #progresoWrap { height:6px; background:var(--card); border-radius:6px; overflow:hidden; margin-bottom:14px; border:1px solid var(--borde); }
    #progreso { height:100%; width:0%; background:linear-gradient(90deg,var(--verde),var(--amarillo)); transition:width .5s ease; }

    #titular { text-align:center; min-height:20px; color:var(--amarillo); font-weight:700; font-size:.92rem; margin-bottom:12px; }
    #escena { min-height:200px; }

    /* resumen de temporadas (card con stats animadas) */
    .resumen { background:var(--card); border:1px solid var(--borde); border-radius:16px; padding:16px; text-align:center; animation:subir .3s ease; }
    @keyframes subir { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    .resumen .cab { display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:4px; font-weight:800; }
    .resumen .cab img { width:26px; height:26px; object-fit:contain; }
    .resumen .anios { color:var(--texto-tenue); font-size:.8rem; margin-bottom:14px; }
    .stat-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
    .stat { background:var(--bg-elev); border:1px solid var(--borde); border-radius:12px; padding:12px 6px; }
    .stat .em { font-size:1.5rem; }
    .stat .n { font-size:1.8rem; font-weight:850; margin:2px 0; }
    .stat .k { font-size:.66rem; color:var(--texto-tenue); text-transform:uppercase; letter-spacing:.03em; }
    .rival-strip {
      margin-top:12px; font-size:.82rem; font-weight:800; border-radius:10px; padding:8px 10px;
      background:var(--bg-elev); border:1px solid var(--borde);
    }
    .rival-strip.gan { color:var(--verde); border-color:color-mix(in srgb,var(--verde) 45%, var(--borde)); }
    .rival-strip.per { color:var(--acento); border-color:color-mix(in srgb,var(--acento) 45%, var(--borde)); }
    .fase-badge { display:inline-block; font-size:.72rem; font-weight:800; color:var(--amarillo); background:color-mix(in srgb,var(--amarillo) 14%, transparent); border-radius:999px; padding:1px 9px; letter-spacing:.02em; }
    .rival-hito { margin-top:8px; font-size:.82rem; font-weight:800; border-radius:10px; padding:8px 10px;
      background:color-mix(in srgb,var(--amarillo) 14%, var(--bg-elev)); border:1px solid color-mix(in srgb,var(--amarillo) 45%, var(--borde));
      color:var(--amarillo); animation:pop .45s ease; }
    /* Repaso de highlights antes de la pantalla final */
    .highlights { background:var(--card); border:1px solid var(--borde); border-radius:16px; padding:18px 16px; text-align:left; animation:subir .3s ease; }
    .highlights h3 { text-align:center; margin:0 0 4px; font-size:1.15rem; }
    .highlights .hl-sub { text-align:center; color:var(--texto-tenue); font-size:.8rem; margin:0 0 14px; }
    .hl-item { display:flex; align-items:center; gap:11px; padding:9px 11px; margin-bottom:7px; border-radius:11px;
      background:var(--bg-elev); border:1px solid var(--borde); font-size:.9rem; font-weight:700;
      opacity:0; animation:subir .4s ease forwards; }
    .hl-item .hl-em { font-size:1.35rem; flex:none; }
    .hl-item.oro { border-color:color-mix(in srgb,var(--amarillo) 55%, var(--borde)); color:var(--amarillo); }
    .hl-item.duelo.gan { border-color:color-mix(in srgb,var(--verde) 45%, var(--borde)); color:var(--verde); }
    .hl-item.duelo.per { border-color:color-mix(in srgb,var(--acento) 45%, var(--borde)); color:var(--acento); }
    .cartas.duelo2 { grid-template-columns:repeat(2,1fr); max-width:320px; margin-left:auto; margin-right:auto; }
    .cartas.duelo1 { grid-template-columns:1fr; max-width:170px; margin-left:auto; margin-right:auto; }
    #rivalFin { margin:8px 0 0; font-size:.92rem; }
    .badge-titulo {
      display:inline-block; margin-top:14px; background:var(--amarillo); color:#150f00; font-weight:850;
      border-radius:999px; padding:6px 16px; font-size:.9rem; animation:pop .4s ease;
    }
    @keyframes pop { 0%{transform:scale(0)} 70%{transform:scale(1.15)} 100%{transform:scale(1)} }

    /* momento / decisión */
    .momento-cab { text-align:center; margin-bottom:12px; }
    .momento-cab h3 { margin:0 0 4px; font-size:1.1rem; }
    .momento-cab .desc { color:var(--texto-tenue); font-size:.85rem; margin:0; }

    /* reveal cartas con flip 3D */
    .cartas { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:14px; }
    @media (max-width:420px) { .cartas { grid-template-columns:repeat(2,1fr); } }
    .carta { aspect-ratio:3/4; perspective:700px; cursor:pointer; -webkit-tap-highlight-color:transparent; }
    .carta .flip { position:relative; width:100%; height:100%; transition:transform .55s cubic-bezier(.2,.7,.2,1.3); transform-style:preserve-3d; }
    .carta.rev .flip { transform:rotateY(180deg); }
    .carta:hover:not(.rev) .flip { transform:translateY(-3px); }
    .cara {
      position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden;
      border:2px solid var(--borde); border-radius:12px; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:6px; background:var(--card); padding:6px;
    }
    .cara.frente { font-size:2rem; color:var(--texto-tenue); }
    .cara.atras { transform:rotateY(180deg); }
    .carta.rev.elegida .cara.atras { border-color:var(--verde); background:var(--card-hover); box-shadow:0 0 0 2px var(--verde) inset; }
    .carta.rev:not(.elegida) { opacity:.5; }
    .cara.atras img { width:44px; height:44px; object-fit:contain; }
    .cara.atras .nom { font-size:.68rem; font-weight:800; text-align:center; line-height:1.15; }
    .cara.atras .em-big { font-size:1.8rem; }

    /* decisión sí/no */
    .botones-sn { display:flex; gap:10px; justify-content:center; margin-bottom:8px; }
    .btn-sn { flex:1; max-width:180px; padding:15px; border-radius:12px; border:1px solid var(--borde); background:var(--card); color:var(--texto); font-weight:800; cursor:pointer; }
    .btn-sn.si { border-color:var(--verde); color:var(--verde); }
    .btn-sn.no { border-color:var(--acento); color:var(--acento); }
    .btn-sn:hover { background:var(--card-hover); }
    .btn-centro { max-width:220px; margin:0 auto; }

    /* penales del Mundial */
    .penal-btns { display:flex; gap:8px; justify-content:center; margin-bottom:8px; }
    .penal-btn { flex:1; max-width:130px; padding:16px 6px; border-radius:12px; border:1px solid var(--borde); background:var(--card); color:var(--texto); font-weight:800; cursor:pointer; font-size:.85rem; -webkit-tap-highlight-color:transparent; }
    .penal-btn .em { font-size:1.7rem; display:block; margin-bottom:3px; }
    .penal-btn:hover { border-color:var(--verde); background:var(--card-hover); }
    /* escena visual del penal */
    .pk-wrap { margin-bottom:6px; animation:subir .3s ease; }
    .pk-campo { position:relative; height:210px; max-width:340px; margin:0 auto; border-radius:14px; overflow:hidden; background:linear-gradient(#2f8149 0%, #1e5c33 100%); border:1px solid var(--borde); }
    .pk-porteria { position:absolute; top:16px; left:50%; transform:translateX(-50%); width:76%; height:82px; border:5px solid #f4f7f4; border-bottom:none; border-radius:5px 5px 0 0; background:repeating-linear-gradient(90deg, transparent 0 13px, rgba(255,255,255,.16) 13px 14px), repeating-linear-gradient(0deg, transparent 0 13px, rgba(255,255,255,.16) 13px 14px); }
    .pk-portero { position:absolute; bottom:52%; left:50%; margin-left:-17px; font-size:2.1rem; transition:left .5s cubic-bezier(.3,0,.5,1); z-index:2; }
    .pk-balon { position:absolute; bottom:6%; left:50%; margin-left:-14px; font-size:1.9rem; transition:left .7s ease-out, bottom .8s cubic-bezier(.3,0,.4,1), font-size .8s ease-out; z-index:3; }
    .pk-result { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:2rem; font-weight:900; text-shadow:0 2px 10px rgba(0,0,0,.65); opacity:0; }
    .pk-result.gol { color:#9dffbd; opacity:1; animation:pop .4s ease; }
    .pk-result.fallo { color:#ffb0b0; opacity:1; animation:pop .4s ease; }

    /* Regate decisivo (final de club) — mismo lenguaje visual que el penal */
    .regate-btns { display:flex; gap:8px; justify-content:center; margin-bottom:8px; }
    .regate-btn { flex:1; max-width:130px; padding:16px 6px; border-radius:12px; border:1px solid var(--borde); background:var(--card); color:var(--texto); font-weight:800; cursor:pointer; font-size:.82rem; -webkit-tap-highlight-color:transparent; }
    .regate-btn .em { font-size:1.7rem; display:block; margin-bottom:3px; }
    .regate-btn:hover { border-color:var(--verde); background:var(--card-hover); }
    .rg-wrap { margin-bottom:6px; animation:subir .3s ease; }
    .rg-campo { position:relative; height:150px; max-width:340px; margin:0 auto; border-radius:14px; overflow:hidden; background:linear-gradient(90deg,#1e5c33,#2f8149); border:1px solid var(--borde); }
    .rg-campo::after { content:""; position:absolute; top:0; right:9%; width:4px; height:100%; background:repeating-linear-gradient(0deg,#f4f7f4 0 10px, transparent 10px 20px); opacity:.55; }
    .rg-def { position:absolute; top:50%; left:48%; transform:translate(-50%,-50%); font-size:2rem; transition:left .5s ease, transform .5s ease; z-index:2; }
    .rg-def.lunge { transform:translate(-50%,-50%) rotate(-22deg) scale(1.05); }
    .rg-balon { position:absolute; top:56%; left:12%; margin-left:-12px; font-size:1.7rem; transition:left .8s cubic-bezier(.25,.6,.3,1); z-index:3; }
    .rg-result { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:1.9rem; font-weight:900; text-shadow:0 2px 10px rgba(0,0,0,.65); opacity:0; }
    .rg-result.gol { color:#9dffbd; opacity:1; animation:pop .4s ease; }
    .rg-result.fallo { color:#ffb0b0; opacity:1; animation:pop .4s ease; }
    /* Prueba del visor: ronda rápida de ¿Quién es? (gate del fichaje a Europa) */
    .qe-marcador { text-align:center; font-size:.8rem; font-weight:800; color:var(--texto-tenue); margin-bottom:10px; }
    .qe-pistas { display:flex; flex-wrap:wrap; gap:6px; justify-content:center; margin-bottom:14px; animation:subir .3s ease; }
    .qe-chip { background:var(--bg-elev); border:1px solid var(--borde); border-radius:999px; padding:6px 12px; font-size:.82rem; font-weight:700; }
    .qe-chip.club { border-color:color-mix(in srgb,var(--amarillo) 45%, var(--borde)); color:var(--amarillo); }
    .qe-ops { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px; }
    .qe-op { padding:13px 8px; border-radius:12px; border:1px solid var(--borde); background:var(--card); color:var(--texto); font-weight:800; cursor:pointer; font-size:.85rem; -webkit-tap-highlight-color:transparent; }
    .qe-op:hover:not(:disabled) { border-color:var(--verde); background:var(--card-hover); }
    .qe-op:disabled { cursor:default; opacity:.55; }
    .qe-op.ok { border-color:var(--verde); color:var(--verde); opacity:1; animation:pop .35s ease; }
    .qe-op.mal { border-color:var(--acento); color:var(--acento); opacity:1; }
    /* Bota de Oro: carrera de goleo con contadores corriendo (delantero) */
    .bota { background:var(--card); border:1px solid var(--borde); border-radius:16px; padding:16px; text-align:center; animation:subir .3s ease; }
    .bota .fila { display:flex; justify-content:space-between; align-items:center; gap:10px; padding:10px 14px; border:1px solid var(--borde); border-radius:12px; margin-bottom:8px; background:var(--bg-elev); font-weight:800; font-size:.92rem; }
    .bota .fila .g { font-size:1.7rem; font-weight:900; font-variant-numeric:tabular-nums; }
    .bota .fila.gana { border-color:var(--verde); color:var(--verde); }
    .bota .fila.pierde { opacity:.7; }
    .bota .veredicto-bota { margin-top:10px; font-weight:900; font-size:1.05rem; animation:pop .4s ease; }
    /* Dos botones enfrentados (negociación de contrato) */
    .dos-botones { display:flex; gap:10px; justify-content:center; margin-bottom:8px; }
    .dos-btn { flex:1; max-width:200px; padding:15px 10px; border-radius:12px; border:1px solid var(--borde); background:var(--card); color:var(--texto); font-weight:800; cursor:pointer; font-size:.9rem; -webkit-tap-highlight-color:transparent; }
    .dos-btn.riesgo { border-color:var(--acento); color:var(--acento); }
    .dos-btn.seguro { border-color:var(--verde); color:var(--verde); }
    .dos-btn:hover { background:var(--card-hover); }
    /* Recuperación de lesión (aprieta para volver) */
    .rec-wrap { text-align:center; animation:subir .3s ease; }
    .rec-timer { font-size:1.7rem; font-weight:900; margin-bottom:10px; font-variant-numeric:tabular-nums; }
    .rec-timer.urgente { color:var(--acento); }
    .rec-bar { height:22px; max-width:320px; margin:0 auto 14px; background:var(--card); border:1px solid var(--borde); border-radius:12px; overflow:hidden; }
    .rec-bar > i { display:block; height:100%; width:0; background:linear-gradient(90deg,#e0a63a,#3ecf6a); transition:width .07s linear; }
    .rec-meta { position:absolute; top:0; bottom:0; width:2px; background:rgba(255,255,255,.5); }
    .rec-btn { display:block; width:100%; padding:18px; border-radius:12px; border:0; background:var(--verde); color:#04140b; font-weight:900; font-size:1.15rem; cursor:pointer; margin-top:6px; -webkit-tap-highlight-color:transparent; user-select:none; }
    .rec-btn:active:not(:disabled) { transform:scale(.97); }
    .rec-btn:disabled { opacity:.4; cursor:default; }

    /* narrativa breve dentro de escena */
    .beat { background:var(--card); border:1px solid var(--borde); border-radius:16px; padding:18px; text-align:center; animation:subir .3s ease; }
    .beat .em-grande { font-size:3rem; display:block; margin-bottom:8px; animation:pop .4s ease; }
    .beat p { margin:0 0 14px; font-size:.95rem; line-height:1.5; }

    /* ---- fin ---- */
    #pantalla-fin { display:none; text-align:center; }
    .veredicto { font-size:1.5rem; font-weight:850; color:var(--amarillo); margin:10px 0 4px; animation:pop .5s ease; }
    .trayectoria-row { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin:14px 0; }
    .trayectoria-row .paso { display:flex; flex-direction:column; align-items:center; gap:3px; }
    .trayectoria-row img { width:36px; height:36px; object-fit:contain; }
    .trayectoria-row span { font-size:.62rem; color:var(--texto-tenue); }
    .tiles-fin { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:14px 0; }
    .tile-fin { background:var(--card); border:1px solid var(--borde); border-radius:10px; padding:12px 6px; }
    .tile-fin .k { font-size:.62rem; color:var(--texto-tenue); text-transform:uppercase; }
    .tile-fin .v { font-size:1.2rem; font-weight:850; margin-top:2px; }
    .acciones-fin { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:16px; }
  </style>
</head>
<body>

  <header class="barra">
    <a class="logo" href="../"><span class="pelota">⚽</span> Cascarita</a>
  </header>

  <main class="contenedor">
    <div class="encabezado">
      <h1>🧑‍🎓 Carrera</h1>
    </div>
    <p class="sub">De la cantera al sueño mundialista. Decide cada 2 años — un mundo nuevo cada día.</p>

    <div class="caja">

      <!-- SETUP -->
      <div id="pantalla-setup">
        <div id="salon"></div>
        <p class="paso-titulo">1. Elige tu posición</p>
        <div class="fila-pos" id="filaPos"></div>
        <input id="nombreJugador" placeholder="Tu apodo (opcional)" maxlength="18" autocomplete="off">
        <button class="btn-grande" id="btnComenzar" disabled>⚽ Comenzar mi carrera</button>
      </div>

      <!-- JUEGO -->
      <div id="pantalla-juego">
        <div class="barra-edad">
          <span>Edad: <b id="edadActual">16</b></span>
          <span class="club-actual"><img id="clubActualImg" src="" alt=""><b id="clubActualNombre"></b></span>
        </div>
        <div id="progresoWrap"><div id="progreso"></div></div>
        <div id="titular"></div>
        <div id="escena"></div>
      </div>

      <!-- FIN -->
      <div id="pantalla-fin">
        <div class="veredicto" id="veredictoTxt"></div>
        <div id="recordFin"></div>
        <p class="sub" id="resumenTxt" style="margin-top:0"></p>
        <div id="rivalFin"></div>
        <div class="trayectoria-row" id="trayectoriaRow"></div>
        <div class="tiles-fin" id="tilesFin"></div>
        <div class="acciones-fin">
          <button class="btn-grande" id="btnTarjeta" style="max-width:220px">🖼️ Tarjeta para compartir</button>
          <button class="btn-grande" id="btnLeyenda" style="max-width:220px; background:var(--amarillo); color:#150f00">🏆 Leyenda del día</button>
          <button class="btn-grande" id="btnOtra" style="max-width:220px; background:var(--gris-cas); color:var(--texto)">🔁 Jugar otra vez</button>
        </div>
      </div>

    </div>
  </main>

  <footer class="pie"></footer>

  <script src="../data/clubes.js"></script>
  <script src="../assets/hub.js"></script>
  <script>
  (function () {
    const $ = id => document.getElementById(id);
    const raf = window.requestAnimationFrame || (cb => setTimeout(() => cb(Date.now()), 16));
    const ahora = () => (window.performance && performance.now) ? performance.now() : Date.now();

    // ---- Datos: clubes reales ----
    const CLUBES = (window.CASCARITA_CLUBES && window.CASCARITA_CLUBES.clubes) || [];
    const MX = CLUBES.filter(c => c.liga === "Liga MX");
    const NOMBRES_EUROPA = ["Real Madrid", "Barcelona", "Manchester City", "Manchester United", "Liverpool",
      "Chelsea", "Arsenal", "Bayern Munich", "Borussia Dortmund", "Paris Saint-Germain", "Juventus", "AC Milan", "FC Porto", "Benfica"];
    const EUROPA = NOMBRES_EUROPA.map(n => CLUBES.find(c => c.nombre === n)).filter(Boolean);
    const crest = c => "../assets/escudos/" + c.id + ".png";

    const POSICIONES = [
      { id: "POR", em: "🧤", nombre: "Portero" },
      { id: "DEF", em: "🛡️", nombre: "Defensa" },
      { id: "MED", em: "🎯", nombre: "Mediocampo" },
      { id: "DEL", em: "⚡", nombre: "Delantero" },
    ];

    // El rival de tu vida: otro crack de tu generación, tu mismo puesto. Su carrera
    // corre en paralelo a la tuya y compite por el Balón de Oro y el legado.
    const NOMBRES = ["Diego", "Luis", "Carlos", "Ángel", "Emiliano", "Santiago", "Hugo", "Marco", "Iván", "Rodrigo", "César", "Óscar", "Bruno", "Pablo"];
    const APELLIDOS = ["Herrera", "Ramírez", "Vega", "Domínguez", "Aguilar", "Cruz", "Robles", "Mendoza", "Fuentes", "Navarro", "Ríos", "Castro", "Salas", "Peña"];
    let ESTADO = null, RNG = null, RIVAL = null;

    function generarRival() {
      const nombre = NOMBRES[Math.floor(RNG() * NOMBRES.length)] + " " + APELLIDOS[Math.floor(RNG() * APELLIDOS.length)];
      const calidad = Math.max(0.35, Math.min(1, ESTADO.calidad + (RNG() - 0.5) * 0.4)); // ±0.2 respecto a ti
      RIVAL = { nombre, calidad, goles: 0, asistencias: 0, atajadas: 0, vallas: 0, titulos: 0, balonDeOro: 0, seleccion: false, club: null };
    }
    function simularRival() {
      const c = RIVAL.calidad * factorEdad(ESTADO.edad);   // el rival también tiene su arco de edad
      const delta = { titulos: 0, balon: 0, lesion: false, fichaje: null };
      const lesionado = RNG() < 0.09;                      // el rival también se lesiona
      const mult = lesionado ? 0.5 : 1;
      for (let i = 0; i < 2; i++) {
        const p = Math.round((24 + RNG() * 12) * mult);
        if (ESTADO.pos === "DEL") { RIVAL.goles += Math.round(p * (0.25 + c * 0.35) * (0.6 + RNG() * 0.8)); RIVAL.asistencias += Math.round(p * 0.10 * (0.5 + RNG())); }
        else if (ESTADO.pos === "MED") { RIVAL.goles += Math.round(p * 0.10 * (0.5 + c) * (0.5 + RNG())); RIVAL.asistencias += Math.round(p * (0.18 + c * 0.22) * (0.6 + RNG())); }
        else if (ESTADO.pos === "DEF") { RIVAL.vallas += Math.round(p * 0.26 * c); }
        else { RIVAL.atajadas += Math.round(p * 3.2 * (0.5 + c)); RIVAL.vallas += Math.round(p * 0.30 * c); }
        if (RNG() < (0.10 + c * 0.14) * mult) { RIVAL.titulos++; delta.titulos++; }
      }
      // El rival elite puede llevarse un Balón por su cuenta (si no está lesionado ese año).
      if (RIVAL.calidad >= 0.7 && !lesionado && RNG() < 0.06 * RIVAL.calidad) { RIVAL.balonDeOro++; delta.balon++; }
      if (lesionado) delta.lesion = true;
      // Fichaje ocasional del rival (su carrera también se mueve).
      if (RNG() < 0.11) {
        const pool = ESTADO.saltoAEuropa ? EUROPA : MX;
        const club = pool[Math.floor(RNG() * pool.length)];
        if (club && club.nombre !== RIVAL.club) { RIVAL.club = club.nombre; delta.fichaje = club.nombre; }
      }
      return delta;
    }
    function statPrincipal() {
      const p = ESTADO.pos;
      if (p === "DEL") return { yo: ESTADO.goles, rival: RIVAL.goles, em: "⚽", lbl: "goles" };
      if (p === "MED") return { yo: ESTADO.asistencias, rival: RIVAL.asistencias, em: "🎯", lbl: "asist." };
      if (p === "DEF") return { yo: ESTADO.vallas, rival: RIVAL.vallas, em: "🛡️", lbl: "vallas" };
      return { yo: ESTADO.atajadas, rival: RIVAL.atajadas, em: "🧤", lbl: "atajadas" };
    }
    function legacyDe(o, esJugador) {
      return (o.goles || 0) + (o.asistencias || 0) + ((o.atajadas || 0) / 3 | 0) + (o.vallas || 0) +
        (o.titulosLiga || o.titulos || 0) * 15 + (o.balonDeOro || 0) * 50 + (o.mundiales || 0) * 8 + (o.champions || 0) * 25 + (o.botaDeOro || 0) * 18 + (o.murosDeOro || 0) * 18 + (o.batutasDeOro || 0) * 18 +
        (esJugador ? (ESTADO.rompioMaleficioVeces || 0) * 40 + (ESTADO.mundialesGanados || 0) * 60 : 0);
    }
    function rarezaDe(ovr) {
      return ovr >= 96 ? "TOP 1%" : ovr >= 91 ? "TOP 5%" : ovr >= 86 ? "TOP 10%" : ovr >= 78 ? "TOP 25%" : "TOP 50%";
    }

    function nuevoEstado(pos, nombre) {
      return {
        pos, nombre: nombre || "Novato", edad: 16, retiroEdad: 36 + 2 * Math.floor(RNG() * 3), // 36/38/40
        clubActual: null, trayectoria: [],
        calidad: 0.3 + RNG() * 0.7, forma: 1,
        partidos: 0, goles: 0, asistencias: 0, atajadas: 0, vallas: 0,
        titulosLiga: 0, mundiales: 0, mundialesGanados: 0, balonDeOro: 0, dinero: 0,
        seleccion: false, rompioQuintoPartido: null, rompioMaleficioVeces: 0, saltoAEuropa: false,
        ofertaInicial: false, europaResuelta: false, seleccionChecada: false,
        lesionUsada: false, marcaOfrecida: false, champions: 0, unAnoMasOfrecido: false,
        europaFallada: false, europaSegunda: false, botaDeOro: 0, murosDeOro: 0, batutasDeOro: 0,
        rivalCompaHecho: false, primeAvisado: false, decliveAvisado: false,
      };
    }

    function setClub(club, inicial) {
      if (!inicial && ESTADO.trayectoria.length) ESTADO.trayectoria[ESTADO.trayectoria.length - 1].hasta = ESTADO.edad;
      ESTADO.trayectoria.push({ club, desde: ESTADO.edad, hasta: null });
      ESTADO.clubActual = club;
      actualizarBarra();
    }

    function actualizarBarra() {
      $("edadActual").textContent = ESTADO.edad;
      if (ESTADO.clubActual) { $("clubActualImg").src = crest(ESTADO.clubActual); $("clubActualNombre").textContent = ESTADO.clubActual.nombre; }
      const p = Math.max(0, Math.min(100, (ESTADO.edad - 16) / (ESTADO.retiroEdad - 16) * 100));
      $("progreso").style.width = p + "%";
    }
    function titular(txt) { $("titular").textContent = txt || ""; }

    // ---- Animaciones ----
    function animarNum(el, hasta, dur) {
      dur = dur || 700; const t0 = ahora();
      (function frame(t) {
        const p = Math.min(1, (t - t0) / dur);
        const e = 0.5 - Math.cos(p * Math.PI) / 2; // easeInOut
        el.textContent = Math.round(hasta * e);
        if (p < 1) raf(frame); else el.textContent = hasta;
      })(t0);
    }
    function confeti() {
      const cv = document.createElement("canvas");
      cv.style.cssText = "position:fixed;inset:0;pointer-events:none;z-index:60";
      cv.width = window.innerWidth; cv.height = window.innerHeight;
      document.body.appendChild(cv);
      const x = cv.getContext("2d");
      if (!x || !x.fillRect) { cv.remove(); return; }
      const cols = ["#f5c518", "#17c964", "#61c8e8", "#ff5d5d", "#c39bf0", "#eaeef2"];
      const parts = [];
      for (let i = 0; i < 140; i++) parts.push({
        x: Math.random() * cv.width, y: -20 - Math.random() * cv.height * 0.4,
        vy: 2 + Math.random() * 5, vx: -2.5 + Math.random() * 5, s: 4 + Math.random() * 7,
        c: cols[Math.random() * cols.length | 0], rot: Math.random() * 6, vr: -0.2 + Math.random() * 0.4,
      });
      let t = 0;
      (function loop() {
        x.clearRect(0, 0, cv.width, cv.height);
        for (const p of parts) {
          p.x += p.vx; p.y += p.vy; p.rot += p.vr;
          x.save(); x.translate(p.x, p.y); x.rotate(p.rot); x.fillStyle = p.c;
          x.fillRect(-p.s / 2, -p.s / 2, p.s, p.s * 0.6); x.restore();
        }
        t++;
        if (t < 130) raf(loop); else cv.remove();
      })();
    }

    // ---- Escena: helpers de render ----
    function limpiar() { $("escena").innerHTML = ""; }
    function botonContinuar(txt, cb) {
      const b = document.createElement("button");
      b.className = "btn-grande btn-centro"; b.textContent = txt || "Continuar →";
      b.addEventListener("click", () => { limpiar(); cb(); });
      $("escena").appendChild(b);
    }

    function beat(emoji, texto, cb, txtBoton) {
      limpiar();  // un beat reemplaza la escena (p.ej. tras revelar las cartas del Balón/Mundial)
      const d = document.createElement("div"); d.className = "beat";
      d.innerHTML = '<span class="em-grande">' + emoji + '</span><p>' + texto + '</p>';
      $("escena").appendChild(d);
      botonContinuar(txtBoton || "Continuar →", cb);
    }

    // reveal de cartas con flip (1 de 4). opciones: [{nombre, club?, emoji?}]
    function cartas(cab, desc, opciones, onElegir) {
      limpiar();
      const head = document.createElement("div"); head.className = "momento-cab";
      head.innerHTML = "<h3>" + cab + "</h3>" + (desc ? '<p class="desc">' + desc + "</p>" : "");
      $("escena").appendChild(head);
      const wrap = document.createElement("div"); wrap.className = "cartas";
      const els = opciones.map(op => {
        const back = op.club
          ? '<img src="' + crest(op.club) + '" alt=""><span class="nom">' + op.nombre + "</span>"
          : '<span class="em-big">' + (op.emoji || "⭐") + '</span><span class="nom">' + op.nombre + "</span>";
        const div = document.createElement("div"); div.className = "carta";
        div.innerHTML = '<div class="flip"><div class="cara frente">❓</div><div class="cara atras">' + back + "</div></div>";
        div.addEventListener("click", () => elegir(div, op));
        wrap.appendChild(div); return div;
      });
      $("escena").appendChild(wrap);
      let hecho = false;
      function elegir(divSel, op) {
        if (hecho) return; hecho = true;
        els.forEach(d => { if (d === divSel) { d.classList.add("rev", "elegida"); } });
        setTimeout(() => els.forEach(d => { if (d !== divSel) d.classList.add("rev"); }), 650);
        setTimeout(() => onElegir(op), 1500);
      }
    }

    function siNo(cab, desc, onSi, onNo) {
      limpiar();
      const head = document.createElement("div"); head.className = "momento-cab";
      head.innerHTML = "<h3>" + cab + "</h3>" + (desc ? '<p class="desc">' + desc + "</p>" : "");
      $("escena").appendChild(head);
      const fila = document.createElement("div"); fila.className = "botones-sn";
      const bSi = document.createElement("button"); bSi.className = "btn-sn si"; bSi.textContent = "Sí";
      const bNo = document.createElement("button"); bNo.className = "btn-sn no"; bNo.textContent = "No";
      bSi.addEventListener("click", () => { limpiar(); onSi(); });
      bNo.addEventListener("click", () => { limpiar(); onNo(); });
      fila.appendChild(bSi); fila.appendChild(bNo); $("escena").appendChild(fila);
    }

    // Revela UNA carta con un destino ya decidido (sin "elegir" un resultado que no toca).
    function revelarUno(titulo, desc, emoji, texto, onDone) {
      limpiar();
      const head = document.createElement("div"); head.className = "momento-cab";
      head.innerHTML = "<h3>" + titulo + "</h3>" + (desc ? '<p class="desc">' + desc + "</p>" : "");
      $("escena").appendChild(head);
      const wrap = document.createElement("div"); wrap.className = "cartas duelo1";
      const div = document.createElement("div"); div.className = "carta";
      div.innerHTML = '<div class="flip"><div class="cara frente">❓</div><div class="cara atras"><span class="em-big">' + emoji + '</span><span class="nom">' + texto + "</span></div></div>";
      let hecho = false;
      div.addEventListener("click", () => { if (hecho) return; hecho = true; div.classList.add("rev", "elegida"); setTimeout(onDone, 1300); });
      wrap.appendChild(div); $("escena").appendChild(wrap);
    }

    // Duelo cara a cara (tú vs el rival). El ganador ya viene decidido (aGana).
    function duelo(titulo, desc, aGana, onDone) {
      limpiar();
      const head = document.createElement("div"); head.className = "momento-cab";
      head.innerHTML = "<h3>" + titulo + "</h3>" + (desc ? '<p class="desc">' + desc + "</p>" : "");
      $("escena").appendChild(head);
      const datos = [{ nom: ESTADO.nombre, ganador: aGana }, { nom: RIVAL.nombre, ganador: !aGana }];
      const wrap = document.createElement("div"); wrap.className = "cartas duelo2";
      const els = datos.map(dd => {
        const div = document.createElement("div"); div.className = "carta";
        div.innerHTML = '<div class="flip"><div class="cara frente">❓</div><div class="cara atras">' +
          '<span class="em-big">' + (dd.ganador ? "🥇" : "😔") + '</span><span class="nom">' + dd.nom + "</span></div></div>";
        div.addEventListener("click", revelar);
        wrap.appendChild(div); return div;
      });
      $("escena").appendChild(wrap);
      let hecho = false;
      function revelar() {
        if (hecho) return; hecho = true;
        els.forEach((d, i) => { d.classList.add("rev"); if (datos[i].ganador) d.classList.add("elegida"); });
        setTimeout(onDone, 1300);
      }
    }

    // Arco de carrera: subes hasta tu prime (~26–31), plateau, y declive tras los 32.
    // Multiplica tu calidad EFECTIVA cada temporada (no borra tu talento base).
    function factorEdad(e) {
      if (e <= 26) return 0.72 + (e - 16) * 0.028;          // 16:0.72 → 26:1.00
      if (e <= 31) return 1.0;                               // prime
      return Math.max(0.62, 1.0 - (e - 31) * 0.05);          // 32:0.95 … declive
    }
    function faseDeEdad(e) {
      if (e < 22) return { em: "🌱", txt: "Promesa" };
      if (e < 26) return { em: "📈", txt: "En ascenso" };
      if (e <= 31) return { em: "🔥", txt: "En tu prime" };
      if (e <= 35) return { em: "🎓", txt: "Veteranía" };
      return { em: "📉", txt: "Últimos años" };
    }

    // ---- Simulación de un bloque de 2 años ----
    function simularBloque() {
      const f = ESTADO.forma;
      let d = { goles: 0, asistencias: 0, atajadas: 0, vallas: 0, partidos: 0, titulo: false };
      for (let i = 0; i < 2; i++) {
        const c = ESTADO.calidad * factorEdad(ESTADO.edad);   // calidad efectiva según tu edad
        const partidos = Math.round((24 + RNG() * 12) * f);
        d.partidos += partidos;
        if (ESTADO.pos === "DEL") { d.goles += Math.round(partidos * (0.25 + c * 0.35) * (0.6 + RNG() * 0.8) * f); d.asistencias += Math.round(partidos * 0.10 * (0.5 + RNG())); }
        else if (ESTADO.pos === "MED") { d.goles += Math.round(partidos * 0.10 * (0.5 + c) * (0.5 + RNG())); d.asistencias += Math.round(partidos * (0.18 + c * 0.22) * (0.6 + RNG()) * f); }
        else if (ESTADO.pos === "DEF") { d.goles += Math.round(partidos * 0.03 * (0.3 + c) * RNG()); d.vallas += Math.round(partidos * 0.26 * c); }
        else { d.atajadas += Math.round(partidos * 3.2 * (0.5 + c)); d.vallas += Math.round(partidos * 0.30 * c); }
        if (RNG() < 0.10 + c * 0.14) d.titulo = true;
        ESTADO.edad++;
      }
      ESTADO.goles += d.goles; ESTADO.asistencias += d.asistencias; ESTADO.atajadas += d.atajadas;
      ESTADO.vallas += d.vallas; ESTADO.partidos += d.partidos;
      if (d.titulo) ESTADO.titulosLiga++;
      ESTADO.forma = 1; // se resetea; los eventos la modifican para el próximo bloque
      d.rival = simularRival();  // el rival avanza en paralelo; guardamos sus hitos del bloque
      actualizarBarra();
      return d;
    }

    function statsDePos(d) {
      if (ESTADO.pos === "POR") return [["🧤", d.atajadas, "Atajadas"], ["🛡️", d.vallas, "Vallas"], ["🎮", d.partidos, "Partidos"]];
      if (ESTADO.pos === "DEF") return [["🛡️", d.vallas, "Vallas"], ["⚽", d.goles, "Goles"], ["🎮", d.partidos, "Partidos"]];
      if (ESTADO.pos === "MED") return [["🎯", d.asistencias, "Asist."], ["⚽", d.goles, "Goles"], ["🎮", d.partidos, "Partidos"]];
      return [["⚽", d.goles, "Goles"], ["🎯", d.asistencias, "Asist."], ["🎮", d.partidos, "Partidos"]];
    }

    // Muestra el resumen de 2 años con números animados, luego cb()
    function mostrarResumen(d, cb) {
      limpiar();
      const fase = faseDeEdad(ESTADO.edad);
      const card = document.createElement("div"); card.className = "resumen";
      card.innerHTML =
        '<div class="cab"><img src="' + crest(ESTADO.clubActual) + '" alt="">' + ESTADO.clubActual.nombre + "</div>" +
        '<div class="anios">Temporadas ' + (ESTADO.edad - 2) + "–" + ESTADO.edad + ' · <span class="fase-badge">' + fase.em + " " + fase.txt + "</span></div>" +
        '<div class="stat-grid">' + statsDePos(d).map(s =>
          '<div class="stat"><div class="em">' + s[0] + '</div><div class="n" data-n="' + s[1] + '">0</div><div class="k">' + s[2] + "</div></div>"
        ).join("") + "</div>" +
        (function () {
          const sp = statPrincipal();
          const gan = sp.yo >= sp.rival;
          const palmares = (RIVAL.balonDeOro ? ' · 🥇' + RIVAL.balonDeOro : "") + (RIVAL.titulos ? ' · 🏆' + RIVAL.titulos : "");
          return '<div class="rival-strip ' + (gan ? "gan" : "per") + '">⚔️ vs ' + RIVAL.nombre +
            ' · ' + sp.em + ' tú <b>' + sp.yo + '</b> · él <b>' + sp.rival + '</b> ' + (gan ? "▲" : "▼") + palmares + "</div>";
        })() +
        (function () {  // noticia del rival ESTE bloque (por relevancia): sigue vivo toda tu carrera
          const rd = d.rival || {};
          let l = "";
          if (rd.balon) l = "🥇 " + RIVAL.nombre + " ganó el <b>Balón de Oro</b> este año";
          else if (rd.fichaje) l = "🔄 " + RIVAL.nombre + " fichó por <b>" + rd.fichaje + "</b>";
          else if (rd.lesion) l = "🤕 " + RIVAL.nombre + " pasó el año lesionado — tu oportunidad";
          else if (rd.titulos) l = "🏆 " + RIVAL.nombre + " levantó un título — no te descuides";
          return l ? '<div class="rival-hito">' + l + "</div>" : "";
        })() +
        (d.titulo ? '<div class="badge-titulo">🏆 ¡Campeón de liga!</div>' : "");
      $("escena").appendChild(card);
      card.querySelectorAll(".n").forEach(el => animarNum(el, +el.dataset.n));
      if (d.titulo) setTimeout(confeti, 250);
      botonContinuar("Continuar →", cb);
    }

    function muestraNClubes(pool, n, excluir) {
      const disp = pool.filter(c => !excluir || c.id !== excluir.id), copia = disp.slice(), out = [];
      for (let i = 0; i < n && copia.length; i++) out.push(copia.splice(Math.floor(RNG() * copia.length), 1)[0]);
      return out.map(c => ({ nombre: c.nombre, club: c }));
    }

    // =====================================================================
    // FLUJO PRINCIPAL
    // =====================================================================
    function iniciarCarrera() {
      $("pantalla-setup").style.display = "none";
      $("pantalla-juego").style.display = "block";
      cargarDatosGlobal(() => {});  // prefetch: que el dataset del visor ya esté listo a los 20
      // 1) Cantera: reveal de 1 de 4 (aleatorio + sorpresa)
      titular("¿En qué cantera empiezas?");
      cartas("🎓 Elige tu cantera", "Cuatro academias de Liga MX te abren las puertas.",
        muestraNClubes(MX, 4), op => {
          setClub(op.club, true);
          titular("Debutas con " + op.club.nombre);
          avanzar();
        });
    }

    // Reproduce 2 años y luego lanza el evento del checkpoint
    function avanzar() {
      if (ESTADO.edad >= ESTADO.retiroEdad) { finDeCarrera(); return; }
      const d = simularBloque();
      mostrarResumen(d, eventoDelPaso);
    }

    function eventoDelPaso() {
      const e = ESTADO.edad;
      if (e >= ESTADO.retiroEdad) { finDeCarrera(); return; }
      titular("Edad " + e);

      if (!ESTADO.ofertaInicial && e >= 18) { ESTADO.ofertaInicial = true; return evOfertaMX(); }
      if (!ESTADO.europaResuelta && e >= 20) { ESTADO.europaResuelta = true; return evEuropa(); }
      if (!ESTADO.seleccionChecada && e >= 22) { ESTADO.seleccionChecada = true; return evSeleccion(); }
      // Arco de carrera: hitos de prime (24) y declive (32) — se sienten los años.
      if (!ESTADO.primeAvisado && e >= 24) { ESTADO.primeAvisado = true; return beat("🔥", "Entras a tu <b>prime</b> — el mejor momento físico y futbolístico de tu carrera. Es <b>ahora</b> o nunca.", avanzar, "¡A comerse el mundo! →"); }
      if (!ESTADO.decliveAvisado && e >= 32) { ESTADO.decliveAvisado = true; return beat("📉", "Empiezas a sentir los años: ya no corres como a los 25, pero ahora mandas con <b>oficio</b>. Cada temporada cuenta el doble.", avanzar); }
      // Mundial cada 4 años (26, 30, 34, 38) mientras estés en la Selección → varios Mundiales.
      if (ESTADO.seleccion && e >= 26 && (e - 26) % 4 === 0) return evMundial();
      // El visor vuelve UNA vez (24+) si fallaste su prueba (después del Mundial: no lo tapa).
      if (ESTADO.europaFallada && !ESTADO.europaSegunda && e >= 24) { ESTADO.europaSegunda = true; return evEuropaSegunda(); }
      // Balón de Oro REPETIBLE en años pico (si estás en lo más alto) → varios Balones.
      if (ESTADO.seleccion && ESTADO.calidad >= 0.68 && e >= 24 && e <= 36 && RNG() < 0.5) return evBalon();
      // Momento estelar por posición en años pico: cada puesto pelea SU premio.
      if (ESTADO.pos === "DEL" && e >= 24 && e <= 36 && RNG() < 0.35) return evBotaDeOro();
      if (ESTADO.pos === "DEF" && e >= 24 && e <= 36 && RNG() < 0.35) return evMuralla();
      if (ESTADO.pos === "MED" && e >= 24 && e <= 36 && RNG() < 0.35) return evMaestro();
      // Rival vivo: tu rival generacional se muda a TU club (una vez, en años pico).
      if (!ESTADO.rivalCompaHecho && ESTADO.clubActual && e >= 24 && e <= 34 && RNG() < 0.25) return evRivalCompa();
      // Final de club (Champions en Europa / Gran Final en México): momento de SKILL por un título.
      if (ESTADO.clubActual && e >= 23 && RNG() < 0.4) return evFinalClub();
      return evGenerico();
    }

    // Carga lazy del dataset de las 5 grandes ligas (377KB): solo cuando el visor aparece.
    let _cargaGlobal = null;
    function cargarDatosGlobal(cb) {
      if (window.CASCARITA_DATA_GLOBAL) return cb(window.CASCARITA_DATA_GLOBAL);

        _cargaGlobal = new Promise(res => {
          const s = document.createElement("script");

          setTimeout(res, 5000);  // sin red: no colgar el juego
          document.head.appendChild(s);

      _cargaGlobal.then(() => cb(window.CASCARITA_DATA_GLOBAL || null));
    }

    // 🕵️ La prueba del visor: ronda rápida de ¿Quién es? con jugadores REALES de las
    // 5 grandes ligas (el mismo dataset del juego del hub). Skill-gate del fichaje.
    function pruebaDelVisor(data, esSegunda) {
      const pozo = (data && data.jugadores)
        ? data.jugadores.filter(j => j.titular && j.dorsal != null && j.edad != null && (j.partidos || 0) >= 10)
        : [];
      if (pozo.length < 40) return elegirEuropa();  // sin datos (offline): el fichaje no se bloquea
      rondaQuienEs(pozo, { rondas: 3, necesarias: 2, titulo: "🕵️ La prueba del visor" }, aciertos => {
        if (aciertos >= 2) {
          ESTADO.calidad = Math.min(1, ESTADO.calidad + 0.04);
          titular("🤝 ¡El visor queda impresionado!"); setTimeout(confeti, 150);
          beat("🤝", "<b>¡Conoces ese futbol como tu casa!</b> (" + aciertos + "/3) El visor te firma con cartel de crack — y llegas mejor preparado.", elegirEuropa, "A Europa ✈️ →");
        } else if (!esSegunda) {
          ESTADO.europaFallada = true;
          beat("😕", "El visor duda: <i>“aún no conoce nuestro futbol”</i> (" + aciertos + "/3). El fichaje se enfría… por ahora. Quizá vuelva a buscarte más adelante.<br><a href='../wordle/' target='_blank' style='color:var(--amarillo)'>🕵️ Entrena en ¿Quién es? del hub</a>", avanzar);
        } else {
          beat("📪", "La prueba no sale (" + aciertos + "/3) y el interés europeo se apaga. Tu historia se escribirá en México — y también puede ser gloriosa.<br><a href='../wordle/' target='_blank' style='color:var(--amarillo)'>🕵️ Afina el ojo en ¿Quién es?</a>", avanzar);

    // Ronda rápida estilo ¿Quién es?: pistas reales (club, liga, posición, país, edad, dorsal)
    // y 4 opciones. Distractores de la misma posición para que pique de verdad.
    function rondaQuienEs(pozo, cfg, cb) {
      let ronda = 0, aciertos = 0;
      (function siguiente() {
        limpiar();
        ronda++;
        const mist = pozo[Math.floor(RNG() * pozo.length)];
        const opciones = [mist];
        const mismos = pozo.filter(j => j.pos === mist.pos && j.nombre !== mist.nombre);
        while (opciones.length < 4 && mismos.length) {
          const cand = mismos.splice(Math.floor(RNG() * mismos.length), 1)[0];
          if (!opciones.some(o => o.nombre === cand.nombre)) opciones.push(cand);
        }
        for (let i = opciones.length - 1; i > 0; i--) { const k = Math.floor(RNG() * (i + 1)); [opciones[i], opciones[k]] = [opciones[k], opciones[i]]; }

        const head = document.createElement("div"); head.className = "momento-cab";
        head.innerHTML = "<h3>" + cfg.titulo + "</h3><p class='desc'>Te enseña a un jugador de las 5 grandes ligas. ¿Quién es?</p>";
        $("escena").appendChild(head);
        const marc = document.createElement("div"); marc.className = "qe-marcador";
        marc.textContent = "Ronda " + ronda + "/" + cfg.rondas + " · Aciertos " + aciertos + " · necesitas " + cfg.necesarias;
        $("escena").appendChild(marc);

        const posInfo = POSICIONES.find(p => p.id === mist.pos);
        const pistas = document.createElement("div"); pistas.className = "qe-pistas";
        pistas.innerHTML =
          '<span class="qe-chip club">🏟️ ' + mist.equipo + "</span>" +
          '<span class="qe-chip">' + (mist.liga || "") + "</span>" +
          '<span class="qe-chip">' + (posInfo ? posInfo.em + " " + posInfo.nombre : mist.pos) + "</span>" +
          '<span class="qe-chip">' + Cascarita.bandera(mist.nac) + " " + Cascarita.paisES(mist.nac) + "</span>" +
          '<span class="qe-chip">🎂 ' + mist.edad + " años</span>" +
          '<span class="qe-chip"># ' + mist.dorsal + "</span>";
        $("escena").appendChild(pistas);

        const ops = document.createElement("div"); ops.className = "qe-ops";
        let resuelto = false;
        opciones.forEach((op, idx) => {
          const b = document.createElement("button"); b.className = "qe-op"; b.textContent = op.nombre;
          if (op === mist) ops._correcta = idx;  // propiedad JS (no atributo): invisible en el HTML
          b.addEventListener("click", () => {
            if (resuelto) return; resuelto = true;
            const bien = op === mist;
            if (bien) { aciertos++; b.classList.add("ok"); }
            else { b.classList.add("mal"); ops.children[ops._correcta].classList.add("ok"); }
            [...ops.children].forEach(x => { x.disabled = true; });
            marc.textContent = "Ronda " + ronda + "/" + cfg.rondas + " · Aciertos " + aciertos + " · necesitas " + cfg.necesarias;
            setTimeout(() => { if (ronda < cfg.rondas) siguiente(); else { limpiar(); cb(aciertos); } }, 950);
          });
          ops.appendChild(b);
        });
        $("escena").appendChild(ops);
      })();
    }
    function evSeleccion() {
      const prob = 0.35 + ESTADO.calidad * 0.5;
      ESTADO.seleccion = RNG() < prob;
      RIVAL.seleccion = RNG() < 0.35 + RIVAL.calidad * 0.5;  // tu rival también pelea el puesto en el Tri
      if (ESTADO.seleccion) { beat("🇲🇽", "¡Te llaman a la <b>Selección Mexicana</b>! El sueño empieza a hacerse realidad.", avanzar, "¡Vamos! →"); setTimeout(confeti, 200); }

    // 👢 Solo DELANTEROS: la carrera de goleo, jornada a jornada, con contadores corriendo.
    // En Europa persigues la Bota de Oro contra una estrella REAL (dataset del hub);
    // en México, el título de goleo contra tu rival generacional.
    function evBotaDeOro() {
      const enEuropa = ESTADO.saltoAEuropa;
      const nombreTitulo = enEuropa ? "la Bota de Oro" : "el título de goleo";
      let estrella = RIVAL.nombre;

      if (enEuropa && gd && gd.jugadores) {
        const tops = gd.jugadores.filter(j => j.pos === "DEL" && (j.goles || 0) >= 8).sort((a, b) => b.goles - a.goles).slice(0, 12);
        if (tops.length) estrella = tops[Math.floor(RNG() * tops.length)].nombre;
      }
      const yo = Math.round((15 + RNG() * 12) * (0.55 + ESTADO.calidad * factorEdad(ESTADO.edad) * 0.55) * ESTADO.forma);
      const el = Math.round(17 + RNG() * 13);
      const gano = yo > el;

      limpiar();
      titular("👢 La carrera por " + nombreTitulo);
      const head = document.createElement("div"); head.className = "momento-cab";

        '<div class="fila" id="botaYo"><span>⚡ ' + ESTADO.nombre + '</span><span class="g" data-n="' + yo + '">0</span></div>' +
        '<div class="fila" id="botaEl"><span>🌟 ' + estrella + '</span><span class="g" data-n="' + el + '">0</span></div>' +
        '<div class="veredicto-bota" id="botaVer" style="visibility:hidden">…</div>';
      $("escena").appendChild(panel);
      panel.querySelectorAll(".g").forEach(x => animarNum(x, +x.dataset.n, 1500));

      setTimeout(() => {
        panel.querySelector("#botaYo").classList.add(gano ? "gana" : "pierde");
        panel.querySelector("#botaEl").classList.add(gano ? "pierde" : "gana");

          ESTADO.botaDeOro++; ESTADO.goles += 3;  // el cierre en racha deja goles extra
          v.textContent = "👢 ¡" + yo + " goles y " + (enEuropa ? "la BOTA DE ORO es tuya!" : "eres el CAMPEÓN DE GOLEO!");
          v.style.color = "var(--amarillo)";
          titular("👢 ¡Máximo goleador!"); setTimeout(confeti, 120);
          botonContinuar("¡Soy el killer! →", avanzar);
        } else {
          v.textContent = (el - yo <= 2 ? "Te quedas a " + (el - yo) + "… cerquísima. " : "") + "Se la lleva " + estrella + " con " + el + ".";
          v.style.color = "var(--texto-tenue)";
          botonContinuar("Habrá revancha →", avanzar);
        }
      }, 1700);
    }

    // Secuencia visual del penal: el balón vuela a una esquina, el portero se lanza,
    // y sale el resultado. exito = lo bueno PARA TI (gol si tiras, atajada si eres portero).
    function penalAnimacion(cornerBall, cornerKeeper, exito, cb, povPortero) {
      limpiar();
      const xs = ["18%", "50%", "82%"];
      const wrap = document.createElement("div"); wrap.className = "pk-wrap";
      wrap.innerHTML =
        '<div class="pk-campo"><div class="pk-porteria"></div>' +

      const portero = wrap.querySelector("#pkPortero"), balon = wrap.querySelector("#pkBalon");

        portero.style.left = xs[cornerKeeper];
        balon.style.left = xs[cornerBall]; balon.style.bottom = "58%"; balon.style.fontSize = "1.1rem";
      }));
      setTimeout(() => {
        const r = wrap.querySelector("#pkResult");

        r.className = "pk-result " + (exito ? "gol" : "fallo");

    // Una tanda de penal: eliges esquina; el portero se "carga" a un lado (pista).
    // Tirar a la esquina contraria = más chance de gol. Skill + tensión.
    function penalRonda(nombre, cb) {
      limpiar();
      const corners = [{ id: 0, em: "⬅️", nom: "izquierda" }, { id: 1, em: "🎯", nom: "centro" }, { id: 2, em: "➡️", nom: "derecha" }];
      const tend = corners[Math.floor(RNG() * 3)];
      const head = document.createElement("div"); head.className = "momento-cab";
      head.innerHTML = "<h3>🏆 Mundial — " + nombre + "</h3><p class='desc'>👀 El portero se carga a su <b>" + tend.nom + "</b>. ¿A qué esquina tiras?</p>";
      $("escena").appendChild(head);
      const row = document.createElement("div"); row.className = "penal-btns";
      corners.forEach(cor => {
        const b = document.createElement("button"); b.className = "penal-btn";
        b.innerHTML = "<span class='em'>" + cor.em + "</span>" + cor.nom;
        b.addEventListener("click", () => {
          const dive = RNG() < 0.6 ? tend : corners[(tend.id + 1 + Math.floor(RNG() * 2)) % 3];
          const gol = cor.id !== dive.id;
          penalAnimacion(cor.id, dive.id, gol, () => cb(gol));
        });
        row.appendChild(b);
      });
      $("escena").appendChild(row);
    }

    // La versión PORTERO: tú no tiras — ATAJAS. El delantero "abre el cuerpo" (pista)
    // y eliges a dónde lanzarte. Lanzarte a donde va el balón = atajada.
    function penalRondaPortero(titulo, cb) {
      limpiar();
      const corners = [{ id: 0, em: "⬅️", nom: "izquierda" }, { id: 1, em: "🎯", nom: "centro" }, { id: 2, em: "➡️", nom: "derecha" }];
      const tend = corners[Math.floor(RNG() * 3)];
      const head = document.createElement("div"); head.className = "momento-cab";
      head.innerHTML = "<h3>🧤 " + titulo + "</h3><p class='desc'>Todo depende de ti. 👀 El delantero abre el cuerpo hacia tu <b>" + tend.nom + "</b>. ¿A dónde te lanzas?</p>";
      $("escena").appendChild(head);
      const row = document.createElement("div"); row.className = "penal-btns";
      corners.forEach(cor => {
        const b = document.createElement("button"); b.className = "penal-btn";
        b.innerHTML = "<span class='em'>" + cor.em + "</span>" + cor.nom;
        b.addEventListener("click", () => {
          const tiro = RNG() < 0.75 ? tend : corners[(tend.id + 1 + Math.floor(RNG() * 2)) % 3];
          const ataja = cor.id === tiro.id;
          if (ataja) ESTADO.atajadas++;
          penalAnimacion(tiro.id, cor.id, ataja, () => cb(ataja), true);
        });
        row.appendChild(b);
      });
      $("escena").appendChild(row);
    }

    function evMundial() {
      ESTADO.mundiales++;
      const rondas = ["Octavos de final", "el Quinto Partido", "Semifinal", "Final"];
      (function jugar(i) {
        if (i >= rondas.length) {
          ESTADO.mundialesGanados++; titular("🏆 ¡CAMPEÓN DEL MUNDO!"); setTimeout(confeti, 150);
          beat("🏆", "<b>¡MÉXICO CAMPEÓN DEL MUNDO!</b> Lo imposible se hizo realidad — eres inmortal.", avanzar, "Inmortal →");
          return;
        }
        // El momento según tu posición: el portero ATAJA el penal decisivo; los demás lo tiran.
        const jugarRonda = ESTADO.pos === "POR"
          ? (cb2 => penalRondaPortero("Mundial — " + rondas[i] + " · el penal decisivo", cb2))
          : (cb2 => penalRonda(rondas[i], cb2));
        jugarRonda(gol => {

          } else jugar(i + 1);  // gol normal: la animación ya fue el premio; avanza directo
        });
      })(0);
    }

    function evGenerico() {
      const pool = [];
      if (!ESTADO.lesionUsada && RNG() < 0.5) pool.push(evLesion);
      if (!ESTADO.marcaOfrecida && RNG() < 0.5) pool.push(evMarca);
      pool.push(evTraspaso, evForma, evRenovacion, evNegociacion);

    // Minijuego de tensión: aprieta rápido para llenar la barra antes de que se acabe el tiempo.
    // Reaching 100% termina al instante; si no, se evalúa al agotarse el tiempo.
    function recuperacion(cb) {
      limpiar();
      const cab = document.createElement("div"); cab.className = "momento-cab";
      cab.innerHTML = "<h3>🏋️ Recuperación</h3><p class='desc'>¡Aprieta rápido para llenar la barra antes de que se acabe el tiempo!</p>";
      $("escena").appendChild(cab);
      const wrap = document.createElement("div"); wrap.className = "rec-wrap";
      wrap.innerHTML =
        "<div class='rec-timer' id='recTimer'>5.0s</div>" +
        "<div class='rec-bar' style='position:relative'><i id='recFill'></i><span class='rec-meta' style='left:55%'></span></div>" +
        "<button class='rec-btn' id='recBtn'>💪 ¡APRIETA!</button>";
      $("escena").appendChild(wrap);
      const fill = wrap.querySelector("#recFill"), timerEl = wrap.querySelector("#recTimer"), btn = wrap.querySelector("#recBtn");
      let prog = 0, fin = false; const total = 5000, t0 = ahora();
      btn.addEventListener("click", () => {
        if (fin) return;
        prog = Math.min(100, prog + 6.5); fill.style.width = prog + "%";
        if (prog >= 100) terminar();
      });
      const iv = setInterval(() => {
        const rest = Math.max(0, total - (ahora() - t0));
        timerEl.textContent = (rest / 1000).toFixed(1) + "s";
        if (rest <= 1500) timerEl.classList.add("urgente");
        if (rest <= 0) terminar();
      }, 100);
      function terminar() {
        if (fin) return; fin = true; clearInterval(iv);
        btn.disabled = true; btn.style.display = "none";
        timerEl.textContent = prog >= 100 ? "¡Al 100%! 💚" : Math.round(prog) + "% recuperado";
        const nivel = prog >= 100 ? 1 : prog >= 55 ? 0.5 : 0;
        botonContinuar(nivel >= 1 ? "¡Recuperado! →" : "Continuar →", () => cb(nivel));
      }
    }
    function evMarca() {

        () => { ESTADO.calidad = Math.min(1, ESTADO.calidad + 0.05); beat("🎯", "Rechazas y te enfocas 100% en el futbol. Se nota en la cancha.", avanzar); });

    // Secuencia visual del regate: el balón cruza al defensa (defines) o se queda (te la quitan).

    // Regate decisivo: el defensa muestra una postura (pista); una jugada la vence mejor. Skill + tensión.

              else { ESTADO.dinero += 4; ESTADO.calidad = Math.min(1, ESTADO.calidad + 0.03); beat("😬", "El club se planta y firmas por poco… pero te lo tomas como motivación. Se notará en la cancha.", avanzar); }

    // =====================================================================
    function calcularVeredicto() {
      const E = ESTADO;
      if (E.mundialesGanados >= 1) return "🌎 Campeón del Mundo";
      if (E.balonDeOro >= 3 || (E.balonDeOro >= 2 && E.rompioQuintoPartido)) return "🐐 El G.O.A.T.";
      if (E.rompioMaleficioVeces >= 2) return "🏆🏆 Doble Maleficio";
      if (E.rompioQuintoPartido) return "🏆 Rompiste el Maleficio";
      if (E.balonDeOro >= 2) return "🥇🥇 Múltiple Balón de Oro";
      if (E.balonDeOro > 0) return "🥇 Balón de Oro";
      if (E.champions >= 2) return "👑 Rey de Europa";
      if (E.botaDeOro >= 2) return "👢 Depredador del área";
      if (E.murosDeOro >= 2) return "🧱 Muro infranqueable";
      if (E.batutasDeOro >= 2) return "🎼 Cerebro del equipo";
      if (E.seleccion && E.titulosLiga >= 2) return "🇲🇽 Leyenda del Tri";
      if (RIVAL && legacyDe(E, true) > legacyDe(RIVAL, false) * 1.4) return "🏅 El mejor de tu generación";
      if (E.trayectoria.length === 1) return "❤️ Ídolo de la cantera";
      if (E.saltoAEuropa && E.titulosLiga === 0 && E.dinero >= 20) return "💰 Mercenario";
      if (E.goles > 120 || E.asistencias > 100 || E.atajadas > 900) return "⚽ Crack de Liga MX";
      if (E.seleccion) return "🎽 Seleccionado nacional";
      return "📋 Carrera decente";
    }

    // Carga una imagen (escudo) con fallback a null si falla/tarda (no cuelga la tarjeta).
    function cargarImg(src) {
      return new Promise(res => {
        const im = new Image(); let listo = false;
        const fin = v => { if (!listo) { listo = true; res(v); } };
        im.onload = () => fin(im); im.onerror = () => fin(null);
        setTimeout(() => fin(null), 4000); im.src = src;
      });
    }

    // OVR/LEYENDA: mapea el legado a un número presumible 50–99.
    function calcularOVR() {
      let ovr = 56 + legacyDe(ESTADO, true) * 0.10 + ESTADO.balonDeOro * 3 +
        (ESTADO.rompioMaleficioVeces || 0) * 4 + (ESTADO.mundialesGanados || 0) * 5;
      return Math.max(50, Math.min(99, Math.round(ovr)));
    }

    // Tarjeta custom 1080×1080 de la carrera (escudos reales + OVR + trofeos + rival).
    async function tarjetaCarrera() {
      const cv = document.createElement("canvas"); cv.width = 1080; cv.height = 1080;
      const c = cv.getContext("2d"); if (!c || !cv.toBlob) return null;
      const T = ESTADO;
      const imgs = await Promise.all(T.trayectoria.slice(0, 7).map(t => cargarImg(crest(t.club))));

      const ovr = calcularOVR();
      const posInfo = POSICIONES.find(p => p.id === T.pos);
      const veredicto = calcularVeredicto();
      const leGanaste = legacyDe(T, true) >= legacyDe(RIVAL, false);
      let stats;
      if (T.pos === "DEL") stats = [["PJ", T.partidos], ["GOL", T.goles], ["AST", T.asistencias]];
      else if (T.pos === "MED") stats = [["PJ", T.partidos], ["AST", T.asistencias], ["GOL", T.goles]];
      else if (T.pos === "DEF") stats = [["PJ", T.partidos], ["VAL", T.vallas], ["GOL", T.goles]];
      else stats = [["PJ", T.partidos], ["ATA", T.atajadas], ["VAL", T.vallas]];
      const trofeos = [];
      if (T.titulosLiga) trofeos.push(["🏆", T.titulosLiga]);
      if (T.champions) trofeos.push(["🌟", T.champions]);
      if (T.botaDeOro) trofeos.push(["👢", T.botaDeOro]);
      if (T.murosDeOro) trofeos.push(["🧱", T.murosDeOro]);
      if (T.batutasDeOro) trofeos.push(["🎼", T.batutasDeOro]);
      if (T.balonDeOro) trofeos.push(["🥇", T.balonDeOro]);
      if (T.mundialesGanados) trofeos.push(["🌎", T.mundialesGanados]);
      else if (T.mundiales) trofeos.push(["🌍", T.mundiales]);
      if (T.rompioMaleficioVeces) trofeos.push(["🔓", T.rompioMaleficioVeces]);

      const rr = (a, b, w, h, r) => { c.beginPath(); c.moveTo(a + r, b); c.arcTo(a + w, b, a + w, b + h, r); c.arcTo(a + w, b + h, a, b + h, r); c.arcTo(a, b + h, a, b, r); c.arcTo(a, b, a + w, b, r); c.closePath(); };
      const fit = (t, maxW, size, peso) => { let s = size; do { c.font = (peso || "bold ") + s + "px system-ui, sans-serif"; s -= 3; } while (s > 22 && c.measureText(t || "").width > maxW); };
      const txt = (t, px, xx, yy, color, align, peso) => { c.font = (peso || "bold ") + px + "px system-ui, sans-serif"; c.fillStyle = color; c.textAlign = align || "center"; c.fillText(t, xx, yy); };

      // fondo estilo cancha
      const g = c.createLinearGradient(0, 0, 0, 1080); g.addColorStop(0, "#0e2b1c"); g.addColorStop(1, "#071b11");
      c.fillStyle = g; c.fillRect(0, 0, 1080, 1080);
      c.fillStyle = "rgba(255,255,255,.03)"; for (let i = 0; i < 1080; i += 120) c.fillRect(0, i, 1080, 60);
      c.strokeStyle = "rgba(52,209,127,.5)"; c.lineWidth = 10; rr(24, 24, 1032, 1032, 28); c.stroke();

      // header
      txt("⚽ Cascarita", 40, 540, 100, "#eaf1ea", "center");
      txt("CARRERA", 24, 540, 138, "#8fd9ae", "center", "800 ");

      // OVR badge
      c.fillStyle = "#f5c518"; rr(70, 178, 210, 244, 22); c.fill();
      txt("LEYENDA", 25, 175, 230, "#3a2b00", "center", "800 ");
      txt(String(ovr), 128, 175, 352, "#150f00", "center", "900 ");
      txt(T.pos, 34, 175, 402, "#3a2b00", "center", "800 ");

      // nombre + posición + veredicto
      c.textAlign = "left"; c.fillStyle = "#ffffff"; fit(T.nombre, 700, 62, "800 "); c.fillText(T.nombre, 310, 252);
      txt("🇲🇽 " + posInfo.nombre, 30, 310, 302, "#8fd9ae", "left", "600 ");
      fit(veredicto, 640, 34, "800 ");
      const vw = Math.min(700, c.measureText(veredicto).width + 44);
      c.fillStyle = "rgba(245,197,24,.16)"; c.strokeStyle = "#f5c518"; c.lineWidth = 2; rr(310, 336, vw, 58, 14); c.fill(); c.stroke();
      c.fillStyle = "#f5c518"; c.textAlign = "center"; c.fillText(veredicto, 310 + vw / 2, 375);
      txt("🏅 " + rarezaDe(ovr) + " de las carreras", 25, 312, 428, "#8fd9ae", "left", "800 ");

      // stats
      const sx = [70, 385, 700], sw = 310;
      stats.forEach((s, i) => {
        c.fillStyle = "rgba(255,255,255,.05)"; rr(sx[i], 462, sw, 132, 16); c.fill();
        txt(s[0], 26, sx[i] + sw / 2, 512, "#8fd9ae", "center", "700 ");
        txt(String(s[1]), 58, sx[i] + sw / 2, 572, "#ffffff", "center", "900 ");
      });

      // trayectoria (escudos reales)
      txt("TRAYECTORIA", 26, 540, 660, "#8fd9ae", "center", "800 ");
      const n = imgs.length || 1, gap = Math.min(96, 700 / n), startX = 540 - (n - 1) * gap / 2;
      imgs.forEach((im, i) => { if (im) c.drawImage(im, startX + i * gap - 34, 690, 68, 68); });

      // títulos
      txt("TÍTULOS", 26, 540, 816, "#8fd9ae", "center", "800 ");
      if (trofeos.length) {
        const tg = Math.min(160, 640 / trofeos.length), tsx = 540 - (trofeos.length - 1) * tg / 2;
        trofeos.forEach((tr, i) => { txt(tr[0], 58, tsx + i * tg, 884, "#fff", "center", "400 "); txt("×" + tr[1], 30, tsx + i * tg, 922, "#eaf1ea", "center", "800 "); });
      } else txt("Sin títulos — pero una gran historia", 28, 540, 884, "#9db0a4", "center", "600 ");

      // rival + footer
      const rivTxt = "⚔️ vs " + RIVAL.nombre + ": " + (leGanaste ? "le ganó 💪" : "a su sombra 😔");
      fit(rivTxt, 920, 30, "700 "); c.fillStyle = leGanaste ? "#5fd08a" : "#e8654f"; c.textAlign = "center"; c.fillText(rivTxt, 540, 980);
      txt("¿Superas mi carrera?", 34, 540, 1026, "#f5c518", "center", "800 ");

      return new Promise(res => cv.toBlob(res, "image/png"));
    }

    // Comparte/descarga la tarjeta custom (mismo patrón que Cascarita.compartirTarjeta).
    async function compartirCarrera(texto) {
      try {
        const blob = await tarjetaCarrera(); if (!blob) throw new Error("sin canvas");
        const file = new File([blob], "carrera-cascarita.png", { type: "image/png" });
        if (navigator.canShare && navigator.canShare({ files: [file] })) { await navigator.share({ files: [file], text: texto }); return; }
        const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "carrera-cascarita.png"; a.click();
        setTimeout(() => URL.revokeObjectURL(a.href), 5000);
      } catch (e) { Cascarita.compartir(texto, location.href); }
    }

    function ofrecerUnAnoMas() {

      dosBotones("🎬 El final se acerca",
        "Tienes " + ESTADO.edad + " años. ¿Te retiras como leyenda… o juegas <b>un año más</b> y apuestas tu despedida a una última jugada?",
        "🔥 Un año más<br><small style='font-weight:600;opacity:.8'>gloria o pifia</small>",
        "🎩 Retirarme<br><small style='font-weight:600;opacity:.8'>como leyenda</small>",
        () => unAnoMasSkill(),
        () => retiro()
      );
    }

    // La última jugada de tu carrera: reutiliza el regate decisivo. Aciertas = gloria; fallas = humillación.
    function unAnoMasSkill() {
      ESTADO.edad += 1; actualizarBarra();
      titular("🔥 Un año más… la última jugada");
      const ultima = ESTADO.pos === "POR"
        ? (cb2 => penalRondaPortero("La última atajada de tu carrera", cb2))
        : (cb2 => regateDecisivo("Última jugada de tu carrera", cb2));
      ultima(exito => {
        if (exito) {
          ESTADO.titulosLiga++;
          // un último destello según posición, para que el highlight tenga sustancia
          if (ESTADO.pos === "DEL") ESTADO.goles += 9;
          else if (ESTADO.pos === "MED") ESTADO.asistencias += 8;
          else if (ESTADO.pos === "DEF") ESTADO.vallas += 6;
          else ESTADO.atajadas += 40;
          titular("🏆 ¡DESPEDIDA DE LEYENDA!"); setTimeout(confeti, 150);
          beat("🏆", "<b>¡Cierras con una jugada para la historia!</b> El estadio entero corea tu nombre — te retiras en la cima, justo como lo soñaste.", retiro, "Retirarme como leyenda →");
        } else {
          ESTADO.forma = 0.6;
          beat("😔", "La última jugada no cae… te retiras entre pifias y algo de nostalgia. Quizá debiste irte antes. Aun así, <b>tu carrera ya está escrita</b> y nadie te la quita.", retiro);
        }
      });
    }

    // Repaso animado de los mejores momentos, en escena, ANTES de revelar la pantalla final.
    function repasoHighlights(cb) {
      limpiar();
      const E = ESTADO, items = [];  // [emoji, texto, claseExtra]
      if (E.trayectoria.length) items.push(["🎓", "Debutaste con <b>" + E.trayectoria[0].club.nombre + "</b>", ""]);
      if (E.champions) items.push(["🏆⭐", "Campeón de Europa" + (E.champions > 1 ? " ×" + E.champions : ""), "oro"]);
      if (E.titulosLiga) items.push(["🏆", E.titulosLiga + (E.titulosLiga > 1 ? " títulos de liga" : " título de liga"), ""]);
      if (E.balonDeOro) items.push(["🥇", "Balón de Oro" + (E.balonDeOro > 1 ? " ×" + E.balonDeOro : ""), "oro"]);
      if (E.botaDeOro) items.push(["👢", "Máximo goleador" + (E.botaDeOro > 1 ? " ×" + E.botaDeOro : ""), "oro"]);
      if (E.murosDeOro) items.push(["🧱", "Mejor defensa del año" + (E.murosDeOro > 1 ? " ×" + E.murosDeOro : ""), "oro"]);
      if (E.batutasDeOro) items.push(["🎼", "Mejor mediocampista" + (E.batutasDeOro > 1 ? " ×" + E.batutasDeOro : ""), "oro"]);
      if (E.mundialesGanados) items.push(["🌎", "Campeón del Mundo" + (E.mundialesGanados > 1 ? " ×" + E.mundialesGanados : ""), "oro"]);
      else if (E.mundiales) items.push(["🌍", E.mundiales + (E.mundiales > 1 ? " Mundiales jugados" : " Mundial jugado"), ""]);
      if (E.rompioQuintoPartido) items.push(["🎉", "Rompiste el Maleficio del Quinto Partido", "oro"]);
      const sp = statPrincipal();
      items.push([sp.em, "<b>" + sp.yo + "</b> " + sp.lbl + " en tu carrera", ""]);
      if (E.dinero) items.push(["💰", "$" + E.dinero + "M en la cuenta", ""]);
      const gan = legacyDe(E, true) >= legacyDe(RIVAL, false);
      items.push(["⚔️", "vs <b>" + RIVAL.nombre + "</b>: " + (gan ? "le ganaste el duelo 💪" : "viviste a su sombra 😔"), "duelo " + (gan ? "gan" : "per")]);

      const card = document.createElement("div"); card.className = "highlights";
      card.innerHTML = "<h3>📽️ Tus mejores momentos</h3><p class='hl-sub'>" + E.nombre + " · el repaso de una carrera</p>" +
        items.map((it, i) => '<div class="hl-item ' + it[2] + '" style="animation-delay:' + (i * 0.12).toFixed(2) + 's">' +
          '<span class="hl-em">' + it[0] + '</span><span>' + it[1] + "</span></div>").join("");
      $("escena").appendChild(card);
      botonContinuar("Ver mi carta →", cb);
    }

    function retiro() {
      if (ESTADO.trayectoria.length) ESTADO.trayectoria[ESTADO.trayectoria.length - 1].hasta = ESTADO.edad;
      repasoHighlights(mostrarFin);  // primero el repaso animado; luego revela la pantalla final
    }

    function mostrarFin() {
      $("pantalla-juego").style.display = "none";
      $("pantalla-fin").style.display = "block";

      const veredicto = calcularVeredicto();
      $("veredictoTxt").textContent = veredicto;
      $("resumenTxt").textContent = ESTADO.nombre + " · " + POSICIONES.find(p => p.id === ESTADO.pos).nombre + " · retirado a los " + ESTADO.edad + " años";

      const yoLeg = legacyDe(ESTADO, true), rivalLeg = legacyDe(RIVAL, false);
      const leGanaste = yoLeg >= rivalLeg;
      $("rivalFin").innerHTML = "⚔️ El duelo de tu generación vs <b>" + RIVAL.nombre + "</b>: " +
        (leGanaste ? '<b style="color:var(--verde)">le ganaste 💪</b>' : '<b style="color:var(--acento)">viviste a su sombra 😔</b>') +
        '<div class="sub" style="margin:4px 0 0">' +
        (RIVAL.balonDeOro ? "Él cerró con " + RIVAL.balonDeOro + " Balón(es) de Oro · " : "") +
        "legado " + Math.round(yoLeg) + " vs " + Math.round(rivalLeg) + "</div>";

      $("trayectoriaRow").innerHTML = ESTADO.trayectoria.map(t =>
        '<div class="paso"><img src="' + crest(t.club) + '" alt=""><span>' + t.desde + (t.hasta ? "–" + t.hasta : "+") + "</span></div>").join("");

      const tiles = [];
      if (ESTADO.goles) tiles.push(["Goles", ESTADO.goles]);
      if (ESTADO.asistencias) tiles.push(["Asistencias", ESTADO.asistencias]);
      if (ESTADO.atajadas) tiles.push(["Atajadas", ESTADO.atajadas]);
      if (ESTADO.vallas) tiles.push(["Vallas invictas", ESTADO.vallas]);
      tiles.push(["Partidos", ESTADO.partidos], ["Títulos de liga", ESTADO.titulosLiga]);
      if (ESTADO.botaDeOro) tiles.push(["Botas de goleo", ESTADO.botaDeOro]);
      if (ESTADO.murosDeOro) tiles.push(["Muros del año", ESTADO.murosDeOro]);
      if (ESTADO.batutasDeOro) tiles.push(["Batutas del año", ESTADO.batutasDeOro]);
      if (ESTADO.balonDeOro) tiles.push(["Balón de Oro", ESTADO.balonDeOro]);
      if (ESTADO.mundiales) tiles.push(["Mundiales", ESTADO.mundiales]);
      $("tilesFin").innerHTML = tiles.slice(0, 6).map(t =>
        '<div class="tile-fin"><div class="k">' + t[0] + '</div><div class="v" data-n="' + t[1] + '">0</div></div>').join("");
      $("tilesFin").querySelectorAll(".v").forEach(el => animarNum(el, +el.dataset.n, 900));
      if (ESTADO.rompioQuintoPartido || ESTADO.balonDeOro) setTimeout(confeti, 300);

      const puntaje = ESTADO.goles + ESTADO.asistencias + (ESTADO.atajadas / 3 | 0) +
        ESTADO.titulosLiga * 15 + ESTADO.balonDeOro * 50 + (ESTADO.rompioQuintoPartido ? 40 : 0);
      const gano = !!(ESTADO.rompioQuintoPartido || ESTADO.balonDeOro || (ESTADO.seleccion && ESTADO.titulosLiga >= 2));

      const textoCompartir = "⚽ Terminé mi carrera en Cascarita — OVR " + calcularOVR() + " (" + rarezaDe(calcularOVR()) + "), " + veredicto +
        " (" + ESTADO.titulosLiga + " títulos" + (ESTADO.balonDeOro ? ", " + ESTADO.balonDeOro + " Balón de Oro" : "") + (ESTADO.mundialesGanados ? ", Campeón del Mundo 🌎" : "") + "). ¿Superas mi carrera?";

      // 🏛️ Salón de la Fama: guarda tu mejor carrera y celebra récord nuevo.
      const ovrFinal = calcularOVR();
      const best = Cascarita.cargar("carrera:mejor", null);
      const esRecord = !best || puntaje > (best.puntaje || 0);
      if (esRecord) {
        Cascarita.guardar("carrera:mejor", {
          ovr: ovrFinal, veredicto, puntaje,
          posNombre: POSICIONES.find(p => p.id === ESTADO.pos).nombre,
          goles: ESTADO.goles, titulos: ESTADO.titulosLiga, balon: ESTADO.balonDeOro,
          quinto: !!ESTADO.rompioQuintoPartido, clubes: ESTADO.trayectoria.map(t => t.club.nombre),
          edad: ESTADO.edad, fecha: Cascarita.fechaHoy(),
        });
      }
      $("recordFin").innerHTML =
        '<div class="record-sub" style="color:var(--amarillo);font-weight:800">🏅 ' + rarezaDe(ovrFinal) + " de las carreras · OVR " + ovrFinal + "</div>" +
        (esRecord ? '<div class="record-nuevo">🏆 ¡Nuevo récord personal!</div>'
          : (best ? '<div class="record-sub">Tu récord sigue en OVR ' + best.ovr + " (" + best.veredicto + ")</div>" : ""));

      Cascarita.guardarResultado("carrera", { puntaje, gano });
      $("btnTarjeta").onclick = () => compartirCarrera(textoCompartir);
      $("btnLeyenda").onclick = () => Cascarita.abrirRanking("carrera");
      $("btnOtra").onclick = () => location.reload();

      if (/[?&]peek/.test(location.search)) window.__sol = "Carrera: aleatoria cada partida (sin respuesta fija).";
    }

    // ---- Setup UI ----
    let posSel = null;
    function pintarSetup() {
      POSICIONES.forEach(p => {
        const b = document.createElement("div");
        b.className = "pos-btn"; b.dataset.pos = p.id;
        b.innerHTML = '<span class="em">' + p.em + "</span>" + p.nombre;
        b.addEventListener("click", () => {
          posSel = p.id;
          document.querySelectorAll(".pos-btn").forEach(x => x.classList.remove("sel"));
          b.classList.add("sel"); $("btnComenzar").disabled = false;
        });
        $("filaPos").appendChild(b);
      });
    }
    $("btnComenzar").addEventListener("click", () => {
      RNG = Math.random;  // cada carrera es única (un simulador se rejuega; NO semilla del día)
      ESTADO = nuevoEstado(posSel, $("nombreJugador").value.trim());
      generarRival();
      iniciarCarrera();
    });

    // 🏛️ Salón de la Fama: tu mejor carrera guardada (local), visible al volver.
    function pintarSalon() {
      const b = Cascarita.cargar("carrera:mejor", null);
      const el = $("salon"); if (!el) return;
      if (!b) { el.innerHTML = ""; return; }
      const clubes = b.clubes || [], ultimo = clubes[clubes.length - 1] || "";
      el.innerHTML = '<div class="salon-card"><div class="salon-ovr">' + b.ovr + "</div>" +
        '<div class="salon-txt"><div class="cab">🏛️ Tu mejor carrera</div>' +
        '<div class="ver">' + b.veredicto + "</div>" +
        '<div class="sub">' + b.posNombre + (ultimo ? " · " + ultimo : "") + (b.titulos ? " · " + b.titulos + " títulos" : "") + "</div></div></div>";
    }

    pintarSetup();
    pintarSalon();
    window.__car = { get ESTADO() { return ESTADO; }, get RIVAL() { return RIVAL; }, calcularVeredicto, calcularOVR, tarjetaCarrera, pintarSalon };
  })();
  </script>
</body>
</html>
